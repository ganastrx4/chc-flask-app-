<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>CharlyCoin - World ID</title>
  <script src="https://developer.worldcoin.org/idkit.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .btn { background: #00bcd4; color: #fff; padding: 15px 30px; border-radius: 30px; border: none; font-size: 1.2em; cursor: pointer; display: none; }
    .loader { border: 4px solid #333; border-top: 4px solid #00bcd4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>CharlyCoin 🌍</h1>
  <p id="msg">Cargando SDK de World ID...</p>
  <div id="loader" class="loader"></div>
  <button id="world-id-button" class="btn">🚀 Verificar Identidad</button>

  <script>
    // Forzamos esperar a que todo cargue
    window.onload = function() {
      if (typeof IDKit !== 'undefined') {
        console.log("IDKit cargado correctamente desde la nube");
        document.getElementById('loader').style.display = 'none';
        document.getElementById('msg').innerText = 'Listo para verificar';
        document.getElementById('world-id-button').style.display = 'block';

        IDKit.init({
          app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
          action: "login",
          onSuccess: (result) => {
            console.log("Éxito:", result);
            fetch('http://127.0.0.1:5000/api/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(result)
            }).finally(() => { window.location.href = "buscador.html"; });
          }
        });

        document.getElementById("world-id-button").onclick = () => { IDKit.open(); };
      } else {
        document.getElementById('msg').innerText = 'Error: No se pudo conectar con World ID. Revisa tu internet.';
        console.error("IDKit no se cargó.");
      }
    };
  </script>
</body>
</html>
