<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyCoin - Acceso Web3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0d1117, #000);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #00bcd4;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 { color: #00bcd4; margin-bottom: 10px; }
        .btn-connect {
            background: linear-gradient(90deg, #00bcd4, #9c27b0);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
        }
        .btn-connect:hover { transform: scale(1.05); filter: brightness(1.2); }
        #status { margin-top: 20px; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="card">
        <h1>CharlyCoin 🌍</h1>
        <p>Conecta tu billetera para validar tu identidad en World Chain</p>
        
        <button id="btnConnect" class="btn-connect">🦊 Conectar MetaMask</button>
        
        <p id="status">Esperando conexión...</p>
    </div>

    <script>
        const btnConnect = document.getElementById('btnConnect');
        const statusText = document.getElementById('status');

        btnConnect.onclick = async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    statusText.innerText = "Solicitando cuenta...";
                    
                    // 1. Pedir acceso a MetaMask
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    const signer = provider.getSigner();
                    const address = await signer.getAddress();

                    statusText.innerText = "Validando dirección: " + address.substring(0, 10) + "...";

                    // 2. Enviar la dirección a Flask
                    const response = await fetch('/api/validar_billetera', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ address: address })
                    });

                    const result = await response.json();

                    if (result.success) {
                        statusText.style.color = "#00ff00";
                        statusText.innerText = "¡Acceso concedido! Redirigiendo...";
                        setTimeout(() => {
                            window.location.href = "buscador.html";
                        }, 1500);
                    } else {
                        statusText.style.color = "#ff4444";
                        statusText.innerText = "Error: " + result.message;
                    }

                } catch (error) {
                    console.error(error);
                    statusText.innerText = "Error al conectar.";
                }
            } else {
                alert("Instala MetaMask en tu laptop para usar CharlyCoin.");
            }
        };
    </script>
</body>
</html>
