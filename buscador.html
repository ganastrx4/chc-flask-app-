<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyCoin - Autenticación Segura</title>
    <script src="https://cdn.jsdelivr.net/npm/@web3modal/standalone@2.4.3/dist/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        .box { border: 2px solid #00bcd4; padding: 40px; border-radius: 15px; text-align: center; background: #0d1117; }
        button { background: #00bcd4; color: #000; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        button:hover { background: #fff; }
        #log { margin-top: 20px; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="box">
        <h1>CHARLYCOIN SYSTEM</h1>
        <p>Se requiere firma digital para acceder</p>
        <button id="btnConnect">CONECTAR BILLETERA</button>
        <div id="log">Estado: Esperando interacción...</div>
    </div>

    <script>
        const btn = document.getElementById('btnConnect');
        const log = document.getElementById('log');

        async function conectar() {
            if (typeof window.ethereum === 'undefined') {
                alert("No detectamos billetera. Si estás en celular, abre este link dentro de la App de MetaMask/Trust.");
                return;
            }

            try {
                log.innerText = "Abriendo billetera...";
                
                // FORZAR la apertura de la cuenta y pedir firma
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                
                // Esto obliga a MetaMask a saltar a la pantalla
                await provider.send("eth_requestAccounts", []);
                
                const signer = provider.getSigner();
                const address = await signer.getAddress();
                
                // CREAR UN MENSAJE DE FIRMA (Para que no se salte solo)
                // Esto hace que el usuario TENGA que darle a "Firmar" en su celular/pc
                const mensaje = "Accediendo a CharlyCoin Core: " + Date.now();
                const firma = await signer.signMessage(mensaje);

                log.innerText = "Verificando credenciales...";

                // Enviar firma y dirección al backend
                const res = await fetch('/api/validar_billetera', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ address, firma, mensaje })
                });

                const data = await res.json();
                if (data.success) {
                    window.location.href = "buscador.html";
                } else {
                    log.innerText = "Error: Firma inválida.";
                }

            } catch (err) {
                log.innerText = "Conexión cancelada.";
                console.error(err);
            }
        }

        btn.onclick = conectar;
    </script>
</body>
</html>
