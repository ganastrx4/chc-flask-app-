<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyCoin - Selector de Billetera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0d1117, #000);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #00bcd4;
            text-align: center;
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
        }
        .wallet-option {
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 0;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .wallet-option:hover {
            background: rgba(0, 188, 212, 0.2);
            border-color: #00bcd4;
        }
        .wallet-option img { width: 30px; height: 30px; }
        #status { margin-top: 20px; color: #00bcd4; font-weight: bold; }
        .loading { color: #aaa; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <h1>CharlyCoin 🌍</h1>
        <p>Selecciona tu billetera para ingresar</p>
        
        <div class="wallet-option" onclick="connectWallet('metamask')">
            <span>MetaMask</span>
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Logo.svg" alt="MetaMask">
        </div>

        <div class="wallet-option" onclick="connectWallet('trust')">
            <span>Trust Wallet</span>
            <img src="https://trustwallet.com/assets/images/media/assets/trust_platform.svg" alt="Trust">
        </div>

        <div class="wallet-option" onclick="connectWallet('binance')">
            <span>Binance Web3</span>
            <img src="https://bin.bnbstatic.com/static/images/common/favicon.ico" alt="Binance">
        </div>

        <p id="status">Esperando selección...</p>
    </div>

    <script>
        const statusText = document.getElementById('status');

        async function connectWallet(type) {
            statusText.className = "loading";
            statusText.innerText = "Abriendo " + type + "...";

            // Si es celular, intentamos el Deep Link para "saltar" del navegador a la App
            if (/Android|iPhone/i.test(navigator.userAgent)) {
                if (type === 'metamask') {
                    window.location.href = "https://metamask.app.link/dapp/" + window.location.host;
                } else if (type === 'trust') {
                    window.location.href = "https://link.trustwallet.com/open_url?url=" + window.location.href;
                }
            }

            // Lógica de conexión Web3 estándar
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    const signer = provider.getSigner();
                    const address = await signer.getAddress();

                    statusText.innerText = "Conectado: " + address.substring(0, 6) + "...";

                    // Enviar a tu Flask
                    const response = await fetch('/api/validar_billetera', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ address: address, wallet_type: type })
                    });

                    const result = await response.json();
                    if (result.success) {
                        window.location.href = "buscador.html";
                    }
                } catch (error) {
                    statusText.innerText = "Error al conectar.";
                    console.error(error);
                }
            } else {
                statusText.innerText = "Billetera no detectada en este navegador.";
            }
        }
    </script>
</body>
</html>
