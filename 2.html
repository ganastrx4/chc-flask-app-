<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido a CharlyCoin</title>
  
  <script src="https://developer.worldcoin.org/idkit.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #0d1117, #000);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Poppins", sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 2.5em;
      color: #00bcd4;
      margin-bottom: 10px;
      letter-spacing: 2px;
      animation: fadeIn 1.5s ease-in-out;
    }

    h2 {
      color: #aaa;
      font-weight: 400;
      animation: fadeIn 2s ease-in-out;
    }

    /* Botón de World ID */
    .btn-verify {
      background: linear-gradient(90deg, #00bcd4, #9c27b0);
      border: none;
      color: white;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      display: none; /* Se oculta al inicio */
      transition: transform 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 188, 212, 0.4);
    }

    .btn-verify:hover {
      transform: scale(1.05);
    }

    .loader {
      border: 6px solid #222;
      border-top: 6px solid #00bcd4;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite, fadeIn 2.5s ease-in-out;
      margin-top: 25px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: absolute;
      bottom: 20px;
      color: #555;
      font-size: 0.9em;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>CharlyCoin 🌍</h1>
  <h2 id="status-text">Iniciando sistema...</h2>
  
  <div id="loader" class="loader"></div>

  <button id="world-id-button" class="btn-verify">
    🚀 Verificar con World ID
  </button>

  <footer>© 2026 CharlyCoin. World Chain Ecosystem.</footer>

  <script>
    // 1. Simular carga y mostrar botón
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('status-text').innerText = 'Verifica tu identidad para continuar';
      document.getElementById('world-id-button').style.display = 'block';
    }, 2500);

    // 2. Configurar World ID
    if (typeof IDKit !== 'undefined') {
      IDKit.init({
        app_id: "app_7686f9027d3e3c0b53d987a3caf1e111", // Tu App ID
        action: "login",
        onSuccess: (result) => {
          console.log("Verificación exitosa:", result);
          
          // 3. Notificar a tu Flask local
          fetch('http://127.0.0.1:5000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(result)
          })
          .then(() => {
            // Redirigir al buscador interno después del éxito
            window.location.href = "buscador.html"; 
          })
          .catch(err => {
            console.error("Error conectando a Flask, redirigiendo de todos modos...", err);
            window.location.href = "buscador.html";
          });
        },
      });

      // 4. Abrir modal al dar clic
      document.getElementById("world-id-button").onclick = () => {
        IDKit.open();
      };
    } else {
      console.error("Error: IDKit no se cargó correctamente.");
      document.getElementById('status-text').innerText = 'Error al cargar World ID';
    }
  </script>
</body>
</html>
