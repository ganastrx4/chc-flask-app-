<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Chain Scanner RPC</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
:root{
--primary:#f39c12;
--bg1:#111827;
--bg2:#1f2937;
--bg3:#374151;
--ok:#22c55e;
--bad:#ef4444;
--txt:#fff;
}
body{
margin:0;
font-family:Arial;
background:var(--bg1);
color:var(--txt);
text-align:center;
padding:20px;
}
.container{
max-width:700px;
margin:auto;
background:var(--bg2);
padding:20px;
border-radius:15px;
}
input,button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}
input{background:#fff;color:#000;}
button{
background:var(--primary);
font-weight:bold;
cursor:pointer;
}
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:var(--bg3);
}
th,td{
padding:10px;
border-bottom:1px solid #444;
}
th{
background:var(--primary);
color:#000;
}
h3{color:var(--primary);}
.green{color:var(--ok);}
.red{color:var(--bad);}
#cryptoInfo{
display:none;
padding:15px;
background:var(--bg3);
border-radius:10px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>🌍 World Chain Scanner RPC</h1>

<input id="cryptoInput" placeholder="Token o contrato 0x...">
<button id="searchBtn">Buscar</button>

<div id="cryptoInfo">
<h2 id="cryptoName"></h2>
<p>Precio: $<span id="priceUSD"></span></p>
<p>Contrato: <span id="contract"></span></p>
</div>

<h3>🏆 Ganadores</h3>
<table id="winners"></table>

<h3>🔥 Populares</h3>
<table id="popular"></table>

<h3>📉 Perdedores</h3>
<table id="losers"></table>

<h3>🆕 Nuevos</h3>
<table id="new"></table>

<h3>🔁 Pares World Chain</h3>
<table id="pairs"></table>

</div>

<script>
/* ===================================
 CONFIG
=================================== */
const RPC = "https://worldchain-mainnet.g.alchemy.com/public";
const DEX = "https://api.dexscreener.com/latest/dex/search?q=worldchain";

/* ===================================
 INIT
=================================== */
$(document).ready(function(){

loadScanner();
loadPairs();

$('#searchBtn').click(async function(){
const q = $('#cryptoInput').val().trim();
if(!q) return;

const token = await searchToken(q);

if(token){
$('#cryptoName').text(token.name + " ("+token.symbol+")");
$('#priceUSD').text(token.price);
$('#contract').text(token.address);
$('#cryptoInfo').show();
}else{
alert("Token no encontrado");
}
});

setInterval(loadScanner,60000);

});

/* ===================================
 SEARCH TOKEN
=================================== */
async function searchToken(q){

try{

const r = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${q}`);
const j = await r.json();

if(!j.pairs) return null;

const list = j.pairs.filter(x=>x.chainId=="worldchain");

if(!list.length) return null;

let item = list[0];

for(let x of list){
if(x.baseToken.symbol.toUpperCase()==q.toUpperCase()) item=x;
}

return {
name:item.baseToken.name,
symbol:item.baseToken.symbol,
price:parseFloat(item.priceUsd||0).toFixed(8),
address:item.baseToken.address
};

}catch(e){
return null;
}

}

/* ===================================
 SCANNER
=================================== */
async function loadScanner(){

try{

const r = await fetch(DEX);
const j = await r.json();

if(!j.pairs) return;

const data = j.pairs.filter(x=>x.chainId=="worldchain");

const winners=[...data].sort((a,b)=>(b.priceChange?.h24||0)-(a.priceChange?.h24||0));
const losers=[...data].sort((a,b)=>(a.priceChange?.h24||0)-(b.priceChange?.h24||0));
const popular=[...data].sort((a,b)=>(b.volume?.h24||0)-(a.volume?.h24||0));
const newest=[...data].reverse();

render("#winners", winners.slice(0,6));
render("#popular", popular.slice(0,6));
render("#losers", losers.slice(0,6));
render("#new", newest.slice(0,6));

}catch(e){
console.log(e);
}

}

function render(id,list){

let html=`
<tr>
<th>Token</th>
<th>Precio</th>
<th>24h</th>
</tr>
`;

list.forEach(x=>{

const sym=x.baseToken.symbol;
const price=parseFloat(x.priceUsd||0).toFixed(6);
const ch=parseFloat(x.priceChange?.h24||0).toFixed(2);

html+=`
<tr>
<td>${sym}</td>
<td>$${price}</td>
<td class="${ch>=0?'green':'red'}">${ch}%</td>
</tr>
`;

});

$(id).html(html);

}

/* ===================================
 PAIRS CUSTOM
=================================== */
function loadPairs(){

const list = [
["WLD","https://worldscan.org/"],
["CHC","https://worldscan.org/"],
["USDC","https://worldscan.org/"]
];

let html=`
<tr>
<th>Token</th>
<th>Explorer</th>
</tr>
`;

list.forEach(x=>{
html+=`
<tr>
<td>${x[0]}</td>
<td><a href="${x[1]}" target="_blank">Ver</a></td>
</tr>
`;
});

$("#pairs").html(html);

}
</script>

</body>
</html>
