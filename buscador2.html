<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Buscador World Chain</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
:root{
--primary:#f39c12;
--primary2:#e67e22;
--bg1:#111827;
--bg2:#1f2937;
--bg3:#374151;
--txt:#ffffff;
--ok:#22c55e;
--bad:#ef4444;
}

*{box-sizing:border-box;}

body{
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg1);
color:var(--txt);
text-align:center;
padding-bottom:90px;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:var(--bg2);
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

h1{
margin-top:0;
color:var(--primary);
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}

input{
background:#fff;
color:#000;
}

button{
background:var(--primary);
color:#000;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:var(--primary2);
}

#cryptoInfo{
display:none;
margin-top:15px;
padding:15px;
border-radius:12px;
background:var(--bg3);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:var(--bg2);
border-radius:10px;
overflow:hidden;
font-size:14px;
}

th,td{
padding:10px;
border-bottom:1px solid #444;
}

th{
background:var(--primary);
color:#000;
}

h3{
margin-top:30px;
color:var(--primary);
}

.green{color:var(--ok);}
.red{color:var(--bad);}

a{
color:#fff;
text-decoration:none;
font-weight:bold;
}

a:hover{
color:var(--primary);
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #333;
}

.bottom-nav a{
color:#fff;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🌍 Buscador World Chain</h1>

<input type="text" id="cryptoInput" placeholder="Ejemplo: WLD, CHUN, USDC">
<button id="searchBtn">Buscar Token</button>

<div id="cryptoInfo">
<h2 id="cryptoName"></h2>
<p>💲 Precio USD: $<span id="priceUSD"></span></p>
</div>

<h3>🏆 Ganadores</h3>
<table id="winners"></table>

<h3>🔥 Populares</h3>
<table id="popular"></table>

<h3>📉 Perdedores</h3>
<table id="losers"></table>

<h3>🆕 Nuevos</h3>
<table id="new"></table>

<h3>🔁 Pares World Chain</h3>
<table id="pairs"></table>

</div>
</div>

<nav class="bottom-nav">
<a href="#">Inicio</a>
<a href="#">Wallet</a>
<a href="#">Swap</a>
</nav>

<script>
$(document).ready(function(){

$('#searchBtn').click(async function(){
const symbol = $('#cryptoInput').val().trim();

if(!symbol){
alert("Escribe token");
return;
}

const token = await getToken(symbol);

if(token){
$('#cryptoName').text(token.name + " (" + token.symbol + ")");
$('#priceUSD').text(token.price);
$('#cryptoInfo').show();
}else{
alert("Token no encontrado");
}
});

loadLists();
loadPairs();

});

/* ===========================
 BUSCAR TOKEN WORLDCHAIN
=========================== */
async function getToken(symbol){

try{

const r = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${symbol}`);
const j = await r.json();

if(!j.pairs) return null;

const pairs = j.pairs.filter(x=>x.chainId=="worldchain");

if(!pairs.length) return null;

const p = pairs[0];

return{
name:p.baseToken.name,
symbol:p.baseToken.symbol,
price:parseFloat(p.priceUsd||0).toFixed(6)
};

}catch(e){
return null;
}

}

/* ===========================
 CARGAR LISTAS
=========================== */
async function loadLists(){

try{

const r = await fetch("https://api.dexscreener.com/latest/dex/search?q=worldchain");
const j = await r.json();

if(!j.pairs) return;

const pairs = j.pairs.filter(x=>x.chainId=="worldchain");

const winners = [...pairs].sort((a,b)=>(b.priceChange?.h24||0)-(a.priceChange?.h24||0));
const volume = [...pairs].sort((a,b)=>(b.volume?.h24||0)-(a.volume?.h24||0));
const losers = [...pairs].sort((a,b)=>(a.priceChange?.h24||0)-(b.priceChange?.h24||0));

render("#winners", winners.slice(0,6));
render("#popular", volume.slice(0,6));
render("#losers", losers.slice(0,6));
render("#new", pairs.slice(0,6));

}catch(e){}

}

/* ===========================
 RENDER TABLAS
=========================== */
function render(id,data){

let html = `
<tr>
<th>Token</th>
<th>Precio</th>
<th>24h</th>
</tr>
`;

data.forEach(x=>{

let name = x.baseToken.symbol;
let price = parseFloat(x.priceUsd||0).toFixed(6);
let chg = parseFloat(x.priceChange?.h24||0).toFixed(2);

html += `
<tr>
<td>${name}</td>
<td>$${price}</td>
<td class="${chg>=0?'green':'red'}">${chg}%</td>
</tr>
`;

});

$(id).html(html);

}

/* ===========================
 PARES FIJOS WORLDCHAIN
=========================== */
const MY_PAIRS = [
{
name:"WLD / USDC",
url:"https://worldscan.org/"
},
{
name:"CHUN / WLD",
url:"https://worldscan.org/"
},
{
name:"TOKEN / WLD",
url:"https://worldscan.org/"
}
];

function loadPairs(){

let html = `
<tr>
<th>Par</th>
<th>Link</th>
</tr>
`;

MY_PAIRS.forEach(p=>{
html += `
<tr>
<td>${p.name}</td>
<td><a href="${p.url}" target="_blank">Ver</a></td>
</tr>
`;
});

$("#pairs").html(html);

}
</script>

</body>
</html>
