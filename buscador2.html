<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Buscador World Chain</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
:root{
--primary:#f39c12;
--primary2:#e67e22;
--bg1:#111827;
--bg2:#1f2937;
--bg3:#374151;
--txt:#ffffff;
--ok:#22c55e;
--bad:#ef4444;
}

*{box-sizing:border-box;}

body{
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg1);
color:var(--txt);
text-align:center;
padding-bottom:90px;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:var(--bg2);
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

h1{
margin-top:0;
color:var(--primary);
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}

input{
background:#fff;
color:#000;
}

button{
background:var(--primary);
color:#000;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:var(--primary2);
}

#cryptoInfo{
display:none;
margin-top:15px;
padding:15px;
border-radius:12px;
background:var(--bg3);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:var(--bg2);
border-radius:10px;
overflow:hidden;
font-size:14px;
}

th,td{
padding:10px;
border-bottom:1px solid #444;
}

th{
background:var(--primary);
color:#000;
}

h3{
margin-top:30px;
color:var(--primary);
}

.green{color:var(--ok);}
.red{color:var(--bad);}

a{
color:#fff;
text-decoration:none;
font-weight:bold;
}

a:hover{
color:var(--primary);
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #333;
}

.bottom-nav a{
color:#fff;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🌍 Buscador World Chain</h1>

<input type="text" id="cryptoInput" placeholder="Ejemplo: WLD, CHUN, USDC">
<button id="searchBtn">Buscar Token</button>

<div id="cryptoInfo">
<h2 id="cryptoName"></h2>
<p>💲 Precio USD: $<span id="priceUSD"></span></p>
</div>

<h3>🏆 Ganadores</h3>
<table id="winners"></table>

<h3>🔥 Populares</h3>
<table id="popular"></table>

<h3>📉 Perdedores</h3>
<table id="losers"></table>

<h3>🆕 Nuevos</h3>
<table id="new"></table>

<h3>🔁 Pares World Chain</h3>
<table id="pairs"></table>

</div>
</div>

<nav class="bottom-nav">
<a href="#">Inicio</a>
<a href="#">Wallet</a>
<a href="#">Swap</a>
</nav>

<script>
$(document).ready(function(){

    $('#searchBtn').click(async function(){
        const query = $('#cryptoInput').val().trim();

        if(!query){
            alert("Ingresa nombre, símbolo o contrato");
            return;
        }

        $('#cryptoName').text("Buscando...");
        $('#priceUSD').text("...");
        $('#cryptoInfo').show();

        const token = await searchWorldToken(query);

        if(token){
            $('#cryptoName').text(token.name + " (" + token.symbol + ")");
            $('#priceUSD').text(token.price);
        }else{
            $('#cryptoName').text("No encontrado");
            $('#priceUSD').text("--");
        }
    });

});

/* ===============================
 BUSCADOR REAL WORLDCHAIN
=================================*/
async function searchWorldToken(query){

    try{

        const isAddress = /^0x[a-fA-F0-9]{40}$/.test(query);

        /* ======================
           1. BUSCAR ADDRESS
        ====================== */
        if(isAddress){

            const r = await fetch(
              `https://api.dexscreener.com/latest/dex/search?q=${query}`
            );

            const j = await r.json();

            if(j.pairs && j.pairs.length){

                const found = j.pairs.find(
                    x =>
                    x.chainId &&
                    x.chainId.toLowerCase() === "worldchain"
                );

                if(found){
                    return normalizeToken(found);
                }
            }
        }

        /* ======================
           2. BUSCAR NOMBRE/SIMBOLO
        ====================== */
        const r2 = await fetch(
          `https://api.dexscreener.com/latest/dex/search?q=${encodeURIComponent(query)}`
        );

        const j2 = await r2.json();

        if(j2.pairs && j2.pairs.length){

            const worlds = j2.pairs.filter(
                x =>
                x.chainId &&
                x.chainId.toLowerCase() === "worldchain"
            );

            /* Coincidencia exacta símbolo */
            let exact = worlds.find(
                x => x.baseToken.symbol.toUpperCase() === query.toUpperCase()
            );

            if(exact) return normalizeToken(exact);

            /* Coincidencia nombre */
            let nameMatch = worlds.find(
                x => x.baseToken.name.toUpperCase().includes(query.toUpperCase())
            );

            if(nameMatch) return normalizeToken(nameMatch);

            /* cualquiera */
            if(worlds.length) return normalizeToken(worlds[0]);
        }

        return null;

    }catch(e){
        console.error(e);
        return null;
    }
}

/* =============================== */
function normalizeToken(p){
    return {
        name: p.baseToken?.name || "Token",
        symbol: p.baseToken?.symbol || "---",
        price: parseFloat(p.priceUsd || 0).toFixed(8)
    };
}
</script>

</body>
</html>
