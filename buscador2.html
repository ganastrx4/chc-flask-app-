<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌍 World Chain Scanner PRO</title>

<style>
:root{
--bg:#0f1117;
--card:#171a21;
--line:#2a2f3a;
--gold:#f39c12;
--txt:#ffffff;
--muted:#9aa4b2;
--green:#22c55e;
--red:#ef4444;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:var(--txt);
padding:20px;
}

.wrap{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:var(--gold);
margin-bottom:20px;
}

.search{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
background:#fff;
color:#000;
}

button{
padding:14px 22px;
border:none;
border-radius:10px;
background:var(--gold);
color:#000;
font-weight:bold;
cursor:pointer;
}

button:hover{opacity:.9;}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:16px;
padding:18px;
margin-bottom:18px;
}

.row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
margin-top:14px;
}

.box{
background:#11151d;
padding:14px;
border-radius:12px;
border:1px solid var(--line);
}

.label{
font-size:12px;
color:var(--muted);
margin-bottom:6px;
}

.val{
font-size:18px;
font-weight:bold;
word-break:break-word;
}

.green{color:var(--green);}
.red{color:var(--red);}
.muted{color:var(--muted);}

a{
color:var(--gold);
text-decoration:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:12px;
}

th,td{
padding:10px;
border-bottom:1px solid var(--line);
font-size:14px;
text-align:center;
}

th{
background:#11151d;
color:var(--gold);
}

.small{
font-size:12px;
color:var(--muted);
}

.loader{
display:none;
margin:10px 0;
color:var(--gold);
font-weight:bold;
}
</style>
</head>
<body>

<div class="wrap">

<h1>🌍 World Chain Scanner PRO</h1>

<div class="search">
<input id="q" placeholder="Token, símbolo o contrato 0x..." />
<button onclick="buscar()">Buscar</button>
<button onclick="loadTrending()">🔥 Nuevos</button>
</div>

<div id="loader" class="loader">Consultando blockchain...</div>

<div id="result"></div>

<div class="card">
<h3>🚀 Tokens Nuevos / Tendencia</h3>
<table>
<thead>
<tr>
<th>Token</th>
<th>Precio</th>
<th>24h</th>
<th>Liquidez</th>
</tr>
</thead>
<tbody id="trend"></tbody>
</table>
</div>

</div>

<script>
const RPC="https://worldchain-mainnet.g.alchemy.com/public";

/* ==============================
 BUSCAR
============================== */
async function buscar(){

const query=document.getElementById("q").value.trim();
if(!query) return;

showLoader(true);

let token=null;

/* contrato */
if(/^0x[a-fA-F0-9]{40}$/.test(query)){
token=await readContract(query);
if(token){
token.market=await searchDex(query);
}
}else{
token=await searchDex(query);
if(token && token.address){
const on=await readContract(token.address);
token.name=on.name || token.name;
token.symbol=on.symbol || token.symbol;
}
}

showLoader(false);

if(!token){
document.getElementById("result").innerHTML=
`<div class="card">No encontrado</div>`;
return;
}

renderToken(token);
}

/* ==============================
 RENDER
============================== */
function renderToken(t){

const price=t.market?.priceUsd || "--";
const change=t.market?.change24 || "--";
const liq=t.market?.liquidity || "--";
const mc=t.market?.fdv || "--";
const buys=t.market?.buys || 0;
const sells=t.market?.sells || 0;

document.getElementById("result").innerHTML=`

<div class="card">

<h2>${t.name || "Token"} (${t.symbol || "???"})</h2>

<div class="small">
Contrato:
${t.address}
</div>

<div class="row">

<div class="box">
<div class="label">💲 Precio</div>
<div class="val">$${price}</div>
</div>

<div class="box">
<div class="label">📈 Cambio 24h</div>
<div class="val ${parseFloat(change)>=0?'green':'red'}">
${change}%
</div>
</div>

<div class="box">
<div class="label">💧 Liquidez</div>
<div class="val">$${liq}</div>
</div>

<div class="box">
<div class="label">🏦 Market Cap</div>
<div class="val">$${mc}</div>
</div>

<div class="box">
<div class="label">🟢 Compras</div>
<div class="val green">${buys}</div>
</div>

<div class="box">
<div class="label">🔴 Ventas</div>
<div class="val red">${sells}</div>
</div>

</div>

<br>

<a target="_blank"
href="https://worldscan.org/address/${t.address}">
🔎 Ver en WorldScan
</a>

<br><br>

<a target="_blank"
href="https://puf.world/token/${t.address}">
🚀 Ver en PUF
</a>

</div>
`;
}

/* ==============================
 CONTRACT READ
============================== */
async function readContract(addr){

try{

const name=await callString(addr,"0x06fdde03");
const symbol=await callString(addr,"0x95d89b41");

return{
address:addr,
name:name || "Token",
symbol:symbol || "???"
};

}catch(e){
return null;
}
}

async function callString(to,data){

const r=await fetch(RPC,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
jsonrpc:"2.0",
id:1,
method:"eth_call",
params:[{to,data},"latest"]
})
});

const j=await r.json();

if(!j.result || j.result==="0x") return null;

return hexToString(j.result);
}

function hexToString(hex){

hex=hex.replace("0x","");

let out="";

for(let i=0;i<hex.length;i+=2){
const code=parseInt(hex.substr(i,2),16);
if(code>31 && code<127) out+=String.fromCharCode(code);
}

return out.replace(/\u0000/g,"").trim();
}

/* ==============================
 DEX SEARCH
============================== */
async function searchDex(q){

try{

const r=await fetch(
"https://api.dexscreener.com/latest/dex/search?q="+q
);

const j=await r.json();

if(!j.pairs || !j.pairs.length) return null;

const p=j.pairs.find(x=>x.chainId==="worldchain");

if(!p) return null;

return{
address:p.baseToken.address,
name:p.baseToken.name,
symbol:p.baseToken.symbol,
market:{
priceUsd:num(p.priceUsd),
change24:num(p.priceChange?.h24),
liquidity:num(p.liquidity?.usd),
fdv:num(p.fdv),
buys:p.txns?.h24?.buys || 0,
sells:p.txns?.h24?.sells || 0
}
};

}catch(e){
return null;
}
}

/* ==============================
 TRENDING
============================== */
async function loadTrending(){

document.getElementById("trend").innerHTML=
"<tr><td colspan='4'>Cargando...</td></tr>";

const r=await fetch(
"https://api.dexscreener.com/latest/dex/search?q=worldchain"
);

const j=await r.json();

if(!j.pairs){
document.getElementById("trend").innerHTML="";
return;
}

const arr=j.pairs
.filter(x=>x.chainId==="worldchain")
.sort((a,b)=>
(parseFloat(b.volume?.h24||0)-parseFloat(a.volume?.h24||0))
)
.slice(0,10);

let html="";

arr.forEach(x=>{

const ch=parseFloat(x.priceChange?.h24||0).toFixed(2);

html+=`
<tr>
<td>${x.baseToken.symbol}</td>
<td>$${num(x.priceUsd)}</td>
<td class="${ch>=0?'green':'red'}">${ch}%</td>
<td>$${num(x.liquidity?.usd)}</td>
</tr>
`;

});

document.getElementById("trend").innerHTML=html;
}

function num(v){
if(v===undefined || v===null) return "--";
v=parseFloat(v);
if(isNaN(v)) return "--";
if(v>=1) return v.toLocaleString(undefined,{maximumFractionDigits:2});
return v.toFixed(8);
}

function showLoader(x){
document.getElementById("loader").style.display=x?"block":"none";
}

loadTrending();
</script>

</body>
</html>
