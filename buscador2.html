<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Chain Scanner RPC</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
:root{
--primary:#f39c12;
--bg1:#111827;
--bg2:#1f2937;
--bg3:#374151;
--ok:#22c55e;
--bad:#ef4444;
--txt:#fff;
}
body{
margin:0;
font-family:Arial;
background:var(--bg1);
color:var(--txt);
text-align:center;
padding:20px;
}
.container{
max-width:700px;
margin:auto;
background:var(--bg2);
padding:20px;
border-radius:15px;
}
input,button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}
input{background:#fff;color:#000;}
button{
background:var(--primary);
font-weight:bold;
cursor:pointer;
}
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:var(--bg3);
}
th,td{
padding:10px;
border-bottom:1px solid #444;
}
th{
background:var(--primary);
color:#000;
}
h3{color:var(--primary);}
.green{color:var(--ok);}
.red{color:var(--bad);}
#cryptoInfo{
display:none;
padding:15px;
background:var(--bg3);
border-radius:10px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>🌍 World Chain Scanner RPC</h1>

<input id="cryptoInput" placeholder="Token o contrato 0x...">
<button id="searchBtn">Buscar</button>

<div id="cryptoInfo">
<h2 id="cryptoName"></h2>
<p>Precio: $<span id="priceUSD"></span></p>
<p>Contrato: <span id="contract"></span></p>
</div>

<h3>🏆 Ganadores</h3>
<table id="winners"></table>

<h3>🔥 Populares</h3>
<table id="popular"></table>

<h3>📉 Perdedores</h3>
<table id="losers"></table>

<h3>🆕 Nuevos</h3>
<table id="new"></table>

<h3>🔁 Pares World Chain</h3>
<table id="pairs"></table>

</div>

<script>
/* =====================================================
   WORLD CHAIN + PUF.WORLD INTEGRACIÓN
   Reemplaza tu <script> actual por este completo
===================================================== */

const DEX_URL = "https://api.dexscreener.com/latest/dex/search?q=";

/* =========================================
   INICIO
========================================= */
$(document).ready(function(){

    loadScanner();
    loadPairs();

    $('#searchBtn').click(async function(){

        const query = $('#cryptoInput').val().trim();

        if(!query){
            alert("Escribe símbolo o contrato");
            return;
        }

        $('#cryptoName').text("Buscando...");
        $('#priceUSD').text("...");
        $('#contract').text("...");
        $('#cryptoInfo').show();

        const token = await searchEverywhere(query);

        if(token){
            $('#cryptoName').text(token.name + " ("+token.symbol+")");
            $('#priceUSD').text(token.price);
            $('#contract').text(token.address);
        }else{
            $('#cryptoName').text("No encontrado");
            $('#priceUSD').text("--");
            $('#contract').text("--");
        }

    });

    setInterval(loadScanner,60000);

});

/* =====================================================
   BUSCADOR TOTAL
   1 Dexscreener
   2 PUF.WORLD
===================================================== */
async function searchEverywhere(query){

    let token = await searchDex(query);

    if(token) return token;

    token = await searchPUF(query);

    if(token) return token;

    return null;
}

/* =====================================================
   BUSCAR EN DEXSCREENER
===================================================== */
async function searchDex(query){

    try{

        const r = await fetch(DEX_URL + encodeURIComponent(query));
        const j = await r.json();

        if(!j.pairs) return null;

        const worlds = j.pairs.filter(
            x => x.chainId &&
            x.chainId.toLowerCase() === "worldchain"
        );

        if(!worlds.length) return null;

        let found = worlds[0];

        for(let x of worlds){
            if(
              x.baseToken.symbol.toUpperCase() === query.toUpperCase() ||
              x.baseToken.address.toLowerCase() === query.toLowerCase()
            ){
                found = x;
                break;
            }
        }

        return {
            name: found.baseToken.name,
            symbol: found.baseToken.symbol,
            price: parseFloat(found.priceUsd || 0).toFixed(8),
            address: found.baseToken.address
        };

    }catch(e){
        return null;
    }
}

/* =====================================================
   BUSCAR EN PUF.WORLD
   lee tokens no listados aún
===================================================== */
async function searchPUF(query){

    try{

        let contract = query;

        /* Si no puso contrato, intentamos símbolo */
        if(!query.startsWith("0x")){
            return null;
        }

        const url = `https://puf.world/token/${contract}`;

        const r = await fetch(url);
        const html = await r.text();

        /* extraer nombre */
        let name = "PUF Token";
        let symbol = "TOKEN";

        const m1 = html.match(/<title>(.*?)<\/title>/i);
        if(m1) name = m1[1].replace(" | PUF","").trim();

        const m2 = html.match(/\(([A-Z0-9]{2,10})\)/i);
        if(m2) symbol = m2[1];

        return {
            name:name,
            symbol:symbol,
            price:"0.00000000",
            address:contract
        };

    }catch(e){
        return null;
    }
}

/* =====================================================
   SCANNER WORLDCHAIN
===================================================== */
async function loadScanner(){

    try{

        const r = await fetch(DEX_URL + "worldchain");
        const j = await r.json();

        if(!j.pairs) return;

        const data = j.pairs.filter(
            x => x.chainId &&
            x.chainId.toLowerCase() === "worldchain"
        );

        const winners = [...data].sort((a,b)=>(b.priceChange?.h24||0)-(a.priceChange?.h24||0));
        const losers  = [...data].sort((a,b)=>(a.priceChange?.h24||0)-(b.priceChange?.h24||0));
        const popular = [...data].sort((a,b)=>(b.volume?.h24||0)-(a.volume?.h24||0));
        const newest  = [...data].reverse();

        renderTable("#winners", winners.slice(0,6));
        renderTable("#popular", popular.slice(0,6));
        renderTable("#losers", losers.slice(0,6));
        renderTable("#new", newest.slice(0,6));

    }catch(e){}
}

/* =====================================================
   TABLAS
===================================================== */
function renderTable(id,list){

    let html = `
    <tr>
        <th>Token</th>
        <th>Precio</th>
        <th>24h</th>
    </tr>
    `;

    list.forEach(x=>{

        const symbol = x.baseToken.symbol;
        const price = parseFloat(x.priceUsd || 0).toFixed(6);
        const chg = parseFloat(x.priceChange?.h24 || 0).toFixed(2);

        html += `
        <tr>
            <td>${symbol}</td>
            <td>$${price}</td>
            <td style="color:${chg>=0?'lime':'red'}">${chg}%</td>
        </tr>
        `;
    });

    $(id).html(html);
}

/* =====================================================
   TUS TOKENS PUF / WORLDCHAIN
===================================================== */
function loadPairs(){

    const list = [
        ["CHC","https://puf.world/token/0xde8239aEb9730D74548D65DD2fD3Ce3F42517395"],
        ["WLD","https://worldscan.org/"],
        ["USDC","https://worldscan.org/"]
    ];

    let html = `
    <tr>
        <th>Token</th>
        <th>Link</th>
    </tr>
    `;

    list.forEach(x=>{
        html += `
        <tr>
            <td>${x[0]}</td>
            <td><a href="${x[1]}" target="_blank">Ver</a></td>
        </tr>
        `;
    });

    $("#pairs").html(html);
}
</script>

</body>
</html>
