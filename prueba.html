<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyScan - Economy & Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #070b14; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .neon-text { color: #00f2ff; text-shadow: 0 0 15px rgba(0, 242, 255, 0.6); }
        .neon-border:focus { border-color: #00f2ff; box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        .mining-anim { animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .swap-card { background: linear-gradient(145deg, #111827, #1f2937); border: 1px solid #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-5xl font-black neon-text tracking-tighter">CHARLYSCAN</h1>
                <p class="text-slate-500 font-mono text-sm">Economy Bridge: Chimalhuacán ⇄ Binance</p>
            </div>
            
            <button id="connect-wallet" onclick="connectMetaMask()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full font-bold transition-all flex items-center gap-2">
                🦊 CONECTAR METAMASK
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card p-8 border-l-4 border-l-yellow-500">
                    <h3 class="text-slate-400 text-xs font-bold uppercase mb-2">Mi Saldo Acumulado</h3>
                    <p id="user-balance" class="text-4xl font-black text-yellow-400 font-mono">0.00 CHC</p>
                    <button onclick="sincronizarConBinance()" class="mt-4 text-[10px] bg-slate-800 hover:bg-slate-700 p-2 rounded text-slate-300 transition-all">
                        🔄 ACTUALIZAR VALOR EN BLOCKCHAIN (Gasta gas)
                    </button>
                </div>
                <div class="card p-8">
                    <h3 class="text-slate-400 text-xs font-bold uppercase mb-2">Suministro Global</h3>
                    <p id="total-supply" class="text-4xl font-black text-white font-mono">0 CHC</p>
                    <p id="status-bridge" class="text-[10px] text-green-500 mt-2 font-mono">PUENTE SINCRONIZADO</p>
                </div>
            </div>

            <div class="swap-card p-6 rounded-2xl flex flex-col justify-center">
                <h3 class="text-blue-400 text-center font-black uppercase text-sm mb-4">Panel de Canje BCHC</h3>
                <div class="bg-black/40 p-4 rounded-xl mb-4">
                    <p class="text-[10px] text-slate-500 uppercase">Vas a recibir (BCHC)</p>
                    <p id="bchc-preview" class="text-2xl font-bold text-white">0.00</p>
                </div>
                <button onclick="ejecutarSwap()" class="w-full bg-blue-500 hover:bg-blue-400 py-4 rounded-xl font-black text-black transition-transform active:scale-95 shadow-lg shadow-blue-500/20">
                    INTERCAMBIAR AHORA
                </button>
                <p class="text-[9px] text-slate-500 text-center mt-3 uppercase italic">Requiere BNB para el intercambio</p>
            </div>
        </div>

        <div class="card p-6 mb-8 border-l-4 border-l-cyan-500">
            <div class="flex gap-2">
                <input type="text" id="wallet-input" placeholder="Dirección de billetera para rastrear..." class="w-full bg-black/50 border border-slate-700 p-4 rounded-xl focus:outline-none neon-border text-cyan-400 font-mono transition-all">
                <button onclick="updateDashboard()" class="bg-cyan-600 hover:bg-cyan-500 px-6 rounded-xl font-bold">BUSCAR</button>
            </div>
        </div>

        <div class="card overflow-hidden">
            <div class="p-5 border-b border-slate-800 bg-slate-900/50">
                <h2 class="font-bold text-lg">Historial de Minería</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/80 text-slate-500 text-xs">
                        <tr><th class="p-5">ID</th><th class="p-5">Minero</th><th class="p-5">Monto</th><th class="p-5">Hash</th></tr>
                    </thead>
                    <tbody id="blockchain-table" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/cadena';
        const BRIDGE_URL = 'https://chc-economy.onrender.com/sincronizar-ahora';
        const POOL_ADDRESS = '0x02E309e567c1783B5b3a9c67D00d9393d0219412';

        // 1. Conectar MetaMask
        async function connectMetaMask() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('connect-wallet').innerText = "✅ " + accounts[0].substring(0,6) + "...";
                document.getElementById('wallet-input').value = accounts[0];
                updateDashboard();
            } else {
                alert("Por favor instala MetaMask");
            }
        }

        // 2. Sincronizar (Gasta Gas del servidor)
        async function sincronizarConBinance() {
            document.getElementById('status-bridge').innerText = "Sincronizando...";
            try {
                const res = await fetch(BRIDGE_URL);
                const data = await res.json();
                if(data.status === "Sincronizado") {
                    alert("¡Sincronización Exitosa! Hash: " + data.tx_hash);
                    document.getElementById('status-bridge').innerText = "PUENTE ACTUALIZADO ✅";
                }
            } catch (e) {
                alert("Error al sincronizar");
            }
        }

        // 3. Ejecutar Intercambio (Swap)
        async function ejecutarSwap() {
            if (!window.ethereum) return alert("Conecta MetaMask");
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            
            // ABI para la función de intercambio
            const abi = [{"inputs":[{"internalType":"uint256","name":"cantidadCHC","type":"uint256"}],"name":"intercambiar","outputs":[],"stateMutability":"payable","type":"function"}];
            const contract = new ethers.Contract(POOL_ADDRESS, abi, signer);
            
            const monto = prompt("¿Cuántos CHC deseas cambiar?");
            if(!monto) return;

            try {
                // Enviamos el intercambio con 0.001 BNB para dar valor (puedes ajustar el valor)
                const tx = await contract.intercambiar(monto, { value: ethers.utils.parseEther("0.001") });
                alert("Transacción enviada. Esperando confirmación...");
                await tx.wait();
                alert("¡Intercambio completado con éxito!");
            } catch (e) {
                console.error(e);
                alert("Error en el intercambio: " + e.message);
            }
        }

        // 4. Lógica de la tabla (Tu código original mejorado)
        async function updateDashboard() {
            try {
                const response = await fetch(API_URL);
                const chain = await response.json();
                const myWallet = document.getElementById('wallet-input').value.trim().toLowerCase();
                
                let userBalance = 0;
                let totalSupply = 0;
                let tableHtml = '';

                chain.reverse().forEach(block => {
                    const tx = block.transacciones[0];
                    if(tx) {
                        const monto = parseFloat(tx.monto);
                        totalSupply += monto;
                        if(myWallet && tx.receptor.toLowerCase() === myWallet) userBalance += monto;

                        tableHtml += `<tr><td class="p-5">#${block.indice}</td><td class="p-5 font-mono text-[10px]">${tx.receptor}</td><td class="p-5 text-yellow-500">+${monto}</td><td class="p-5 text-[8px] text-slate-600">${block.hash.substring(0,20)}...</td></tr>`;
                    }
                });

                document.getElementById('blockchain-table').innerHTML = tableHtml;
                document.getElementById('user-balance').innerText = userBalance.toFixed(2) + ' CHC';
                document.getElementById('total-supply').innerText = totalSupply.toLocaleString() + ' CHC';
                document.getElementById('bchc-preview').innerText = (userBalance / 10).toFixed(2); // Ejemplo de tasa
            } catch (err) { console.log(err); }
        }

        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
