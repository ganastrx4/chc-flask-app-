<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CharlyCoin Ads & Mining</title>
  <style>
    /* Estilo Base de App Moderna */
    body {
      background-color: #0b0e11; /* Fondo oscuro estilo Binance/WorldApp */
      color: #eaecef;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 15px;
      padding-bottom: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Tarjeta Principal */
    .app-card {
      background: #181a20;
      width: 100%;
      max-width: 450px;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      border: 1px solid #2b3139;
    }

    h2 { font-size: 1.1rem; color: #f0b90b; margin-top: 0; text-align: center; }

    /* Contenedor del Iframe (Publicidad) */
    #iframeContainer {
      width: 100%;
      height: 250px;
      background: #000;
      border-radius: 12px;
      margin: 15px 0;
      overflow: hidden;
      border: 1px solid #444;
    }
    iframe { width: 100%; height: 100%; border: none; }

    /* Formulario de Publicidad */
    .promo-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }
    input {
      background: #2b3139;
      border: 1px solid #444;
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
    }
    input:focus { outline: 1px solid #f0b90b; }

    /* Botones de Acción */
    .btn-buy {
      background: linear-gradient(90deg, #f0b90b, #f8d33a);
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    /* Zona de Minería */
    .mining-zone {
      margin-top: 20px;
      padding: 15px;
      background: #2b3139;
      border-radius: 15px;
      text-align: center;
    }
    .mining-status { font-size: 13px; color: #848e9c; margin-bottom: 10px; }
    .mining-buttons { display: flex; gap: 10px; justify-content: center; }
    .btn-mine {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      font-size: 12px;
    }
    .btn-stop { background: #ff4d4f; color: white; }
    .btn-start { background: #02c076; color: white; }

    /* Nota de Pago */
    .payment-notice {
      background: rgba(240, 185, 11, 0.1);
      border: 1px solid #f0b90b;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
      color: #f0b90b;
      margin-bottom: 15px;
      word-break: break-all;
    }

    /* Barra Inferior Nativa */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      background: #181a20;
      border-top: 1px solid #2b3139;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 1000;
    }
    .nav-item {
      text-decoration: none;
      color: #848e9c;
      font-size: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .nav-item:hover { color: #f0b90b; }
    .nav-icon { width: 22px; height: 22px; margin-bottom: 4px; }
  </style>
</head>
<body>

<div class="app-card">
  <h2>ADS & MINING TERMINAL</h2>

  <div class="payment-notice">
    <strong>Pago:</strong> 1 WLD (o 135371 CHUN) a:<br>
    0xdc178d65c502f9589bb1a35af08b5723f85ec168
  </div>

  <!-- PUBLICIDAD ROTATIVA -->
  <div id="iframeContainer">
    <iframe id="iframeRedireccion" src=""></iframe>
  </div>

  <!-- FORMULARIO DE COMPRA -->
  <div class="promo-form">
    <input type="email" id="correo" placeholder="Tu correo electrónico" />
    <input type="text" id="urlPromocion" placeholder="URL de tu Proyecto / Video" />
    <button class="btn-buy" onclick="guardarDatos()">COMPRAR PUBLICIDAD</button>
  </div>

  <!-- PANEL DE MINERÍA -->
  <div class="mining-zone">
    <div class="mining-status">💰 Balance: <span id="balance">0</span> CHC</div>
    <div class="mining-buttons">
      <button class="btn-mine btn-stop" onclick="pararMineria()">PAUSAR</button>
      <button class="btn-mine btn-start" onclick="continuarMineria()">MINAR</button>
    </div>
  </div>
</div>

<script>
  let tiempoTotal = 0;
  let interval;
  let minando = true;
  let ventanaActiva = true;

  // Tu token y chatID se mantienen igual
  const telegramToken = '8010490851:AAGXRC8_OlcfCeL53VgJ_ALqmbRuT691Wlk';
  const chatId = '7613604212';

  const urls = [
    "https://tareasunamyunadm.blogspot.com",
    "https://faucentminialtcrypto.blogspot.com",
    "https://solotareasmex.blogspot.com",
    "https://juegospcmexico.blogspot.com",
    "https://besthserchblogger.blogspot.com",
    "https://mundogamermejico.blogspot.com",
    "https://backtrackingchesscaso.blogspot.com",
    "https://charly4kminerbycaso.blogspot.com"
  ];

  function redireccionAleatoria() {
    const indiceAleatorio = Math.floor(Math.random() * urls.length);
    document.getElementById('iframeRedireccion').src = urls[indiceAleatorio];
    setTimeout(redireccionAleatoria, 10000);
  }
  redireccionAleatoria();

  function contarTiempo() {
    if (minando && ventanaActiva) {
      tiempoTotal++;
      document.getElementById('balance').innerText = tiempoTotal; // Actualiza balance en pantalla
      if (tiempoTotal % 100 === 0) {
        enviarMensajeTelegram(`¡Usuario ha ganado 1 CHC!`);
      }
    }
  }
  interval = setInterval(contarTiempo, 1000);

  // --- El resto de tus funciones (guardarDatos, enviarMensajeTelegram, etc.) se mantienen igual ---
  function guardarDatos() {
    const correo = document.getElementById('correo').value;
    const urlPromocion = document.getElementById('urlPromocion').value;
    if (!correo || !urlPromocion) { alert('Completa los campos'); return; }
    const mensaje = `Publicidad Solicitada:\nCorreo: ${correo}\nURL: ${urlPromocion}`;
    enviarMensajeTelegram(mensaje);
    alert('Solicitud enviada!');
  }

  function pararMineria() {
    clearInterval(interval);
    minando = false;
    alert(`Ganaste ${tiempoTotal} CHC!`);
  }

  function continuarMineria() {
    if (!minando) {
      minando = true;
      interval = setInterval(contarTiempo, 1000);
    }
  }

  function enviarMensajeTelegram(mensaje) {
    const url = `https://api.telegram.org/bot${telegramToken}/sendMessage`;
    fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ chat_id: chatId, text: mensaje })
    });
  }

  document.addEventListener("visibilitychange", () => { ventanaActiva = !document.hidden; });
</script>
