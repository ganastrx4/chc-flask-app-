<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WLD App | CharlyScan</title>
  
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <style>
    :root {
      --gold: #f1c40f;
      --dark-bg: #0a0a0a;
      --card-bg: #161616;
      --text-green: #2ecc71;
    }

    body {
      background-color: var(--dark-bg);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: white;
      padding: 10px;
      display: flex;
      justify-content: center;
    }

    /* Marco Estilo App */
    .app-frame {
      max-width: 450px;
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8);
      position: relative;
      padding-bottom: 80px; /* Espacio para el nav */
    }

    /* Cabecera */
    .app-header {
      background: #222;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    .container-content {
      padding: 15px;
    }

    h1 {
      font-size: 1.2rem;
      margin: 0;
      font-weight: bold;
      color: var(--gold);
    }

    #price {
      font-size: 2rem;
      color: var(--text-green);
      font-weight: 800;
      margin: 10px 0;
      text-align: center;
      letter-spacing: -1px;
    }

    /* Botones estilo píldora */
    .btn-timeframe {
      border-radius: 20px;
      font-size: 0.75rem;
      padding: 5px 12px;
      background: #222;
      border: 1px solid #444;
      color: #bbb;
      transition: 0.3s;
    }

    .btn-timeframe.active, .btn-timeframe:hover {
      background: var(--gold);
      color: black;
      border-color: var(--gold);
    }

    canvas {
      background: #161616;
      border-radius: 15px;
      padding: 10px;
      margin: 15px 0;
      height: 200px !important;
    }

    /* Caja de Enlaces / Minería */
    .wallet-section {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 15px;
      border: 1px solid #333;
      margin-top: 10px;
    }

    input {
      width: 100%;
      background: #000;
      border: 1px solid #444;
      color: var(--text-green);
      border-radius: 10px;
      padding: 10px;
      font-family: monospace;
      text-align: center;
      margin-bottom: 10px;
    }

    .btn-app {
      border-radius: 12px;
      font-weight: bold;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-size: 0.85rem;
      padding: 10px;
    }

    /* Nav Inferior */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      width: 100%;
      background-color: #1a1a1a;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #333;
    }

    .nav-item {
      text-decoration: none;
      color: #777;
      font-size: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .nav-item.active { color: var(--gold); }
    .nav-icon { width: 22px; height: 22px; margin-bottom: 2px; }
  </style>
</head>
<body onload="verificarMemoria()">

<div class="app-frame">
  <div class="app-header">
    <a href="index.html" style="text-decoration:none; color:white;">🏠</a>
    <h1>CHARLY SCAN WLD</h1>
    <span style="font-size: 12px;">v5.2</span>
  </div>

  <div class="container-content">
    <div id="price">0.0000 USDT</div>

    <div class="d-flex justify-content-center gap-1 mb-2">
      <button class="btn btn-timeframe active" onclick="loadChart('1m')">1M</button>
      <button class="btn btn-timeframe" onclick="loadChart('5m')">5M</button>
      <button class="btn btn-timeframe" onclick="loadChart('15m')">15M</button>
      <button class="btn btn-timeframe" onclick="loadChart('1h')">1H</button>
    </div>

    <canvas id="lightChart"></canvas>

    <div class="wallet-section">
      <small style="color:#888; display:block; margin-bottom:5px;">TU BILLETERA CHARLY MINER:</small>
      <input type="text" id="userWallet" placeholder="Pega o genera tu dirección..." />
      
      <button class="btn btn-warning w-100 btn-app" onclick="gestionarIdentidad()">
        ✨ GENERAR NUEVA KEY (JSON)
      </button>
      
      <div class="mt-3">
        <a href="./ganarchun.html" class="btn btn-outline-primary w-100 btn-app">🏆 Ganar CHUN y CHC</a>
        <a href="./faucets.html" class="btn btn-outline-success w-100 btn-app">🤑 FAUCET💲</a>
        <a href="./wdd.html" class="btn btn-outline-info w-100 btn-app">📦 GANA WDD</a>
      </div>
    </div>
  </div>

  <!-- Navegación Estilo Mobile -->
  <nav class="bottom-nav">
    <a href="./enviarwld.html" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M4 10v10a1 1 0 001 1h3m10-11v10a1 1 0 01-1 1h-3m-4 0h4" /></svg>
      <span>DONA</span>
    </a>
    <a href="./next_page.html" class="nav-item active">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 1.343-3 3a3 3 0 006 0c0-1.657-1.343-3-3-3zm0 9c-4.418 0-8-1.79-8-4v1c0 2.21 3.582 4 8 4s8-1.79 8-4v-1c0 2.21-3.582 4-8 4z" /></svg>
      <span>GRAFICA</span>
    </a>
    <a href="./chun.html" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5.121 17.804A9 9 0 0112 15a9 9 0 016.879 2.804M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
      <span>RECLAMA</span>
    </a>
  </nav>
</div>

<script>
  let chart;
  let currentInterval = '1m';

  // --- LÓGICA DE PRECIO Y GRÁFICA ---
  function fetchPrice() {
    $.getJSON("https://api.binance.com/api/v3/ticker/price?symbol=WLDUSDT", function (data) {
      let price = parseFloat(data.price).toFixed(4);
      $("#price").text(`${price} USDT`);
    });
  }

  function loadChart(interval) {
    $(".btn-timeframe").removeClass("active");
    event?.target?.classList?.add("active");
    
    currentInterval = interval;
    $.getJSON(`https://api.binance.com/api/v3/klines?symbol=WLDUSDT&interval=${interval}&limit=12`, function (data) {
      const labels = data.map(c => new Date(c[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
      const prices = data.map(c => parseFloat(c[4]));

      if (!chart) {
        chart = new Chart(document.getElementById("lightChart"), {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              data: prices,
              borderColor: '#f1c40f',
              backgroundColor: 'rgba(241, 196, 15, 0.1)',
              tension: 0.4,
              fill: true,
              pointRadius: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { ticks: { color: '#555', font: {size: 9} } }, y: { grid: { color: '#222' }, ticks: { color: '#555' } } }
          }
        });
      } else {
        chart.data.labels = labels;
        chart.data.datasets[0].data = prices;
        chart.update();
      }
    });
  }

  // --- LÓGICA DE BILLETERA (Autorrelleno y Memoria) ---
  function verificarMemoria() {
    const saved = localStorage.getItem("last_chc_wallet");
    if (saved) {
      $("#userWallet").val(saved);
    }
  }

  function gestionarIdentidad() {
    let plataforma = prompt("¿ANDROID o PC?").toLowerCase();
    if (plataforma === "android") {
      const array = new Uint8Array(32);
      window.crypto.getRandomValues(array);
      const privateKey = Array.from(array).map(b => b.toString(16).padStart(2, '0')).join('');
      const publicKey = "chc_" + privateKey.substring(0, 35);

      const walletData = { proyecto: "CharlyScan", public_key: publicKey, private_key: privateKey, date: new Date() };
      
      // Descarga JSON
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(walletData, null, 4));
      const dl = document.createElement('a');
      dl.setAttribute("href", dataStr);
      dl.setAttribute("download", "charly_key.json");
      dl.click();

      // Auto-completar
      $("#userWallet").val(publicKey);
      localStorage.setItem("last_chc_wallet", publicKey);
      alert("✅ ¡Billetera creada! JSON descargado y clave autorrellenada.");
    } else {
      window.location.href = "https://github.com/ganastrx4/binance-bot/releases/download/v1.0/charlycoin_miner.exe";
    }
  }

  // Inicio
  fetchPrice();
  loadChart('1m');
  setInterval(() => { fetchPrice(); loadChart(currentInterval); }, 30000);
</script>

</body>
</html>
