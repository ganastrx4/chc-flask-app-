<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino CharlyScan | Volados</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; }
        
        .card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 20px; max-width: 450px; margin: 15px auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* MONEDA UNIFORME */
        .coin-container { perspective: 1000px; width: 140px; height: 140px; margin: 30px auto; }
        #coin { 
            width: 100%; height: 100%; 
            position: relative; 
            transform-style: preserve-3d; 
            transition: transform 4s cubic-bezier(0.1, 0.5, 0.1, 1);
        }
        .side { 
            position: absolute; width: 100%; height: 100%; 
            border-radius: 50%; backface-visibility: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: bold; border: 6px solid #d4af37; box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        
        /* CARA (CHC) */
        .cara { background: radial-gradient(circle, #f1c40f, #997a00); color: black; font-size: 1.2em; }
        
        /* CRUZ (X ROJA) */
        .cruz { 
            background: radial-gradient(circle, #222, #000); 
            color: #d4af37; transform: rotateY(180deg); 
        }
        .x-roja { color: var(--red); font-size: 4em; position: absolute; font-family: Arial; text-shadow: 0 0 10px var(--red); }

        /* CONTROLES */
        .selector { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .option { 
            padding: 10px 20px; border: 2px solid #333; border-radius: 10px; 
            cursor: pointer; background: #000; transition: 0.3s; font-weight: bold;
        }
        .option.active { border-color: var(--gold); background: #222; color: var(--gold); }

        .wallet-input { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: var(--green); font-family: monospace; font-size: 12px; margin-bottom: 15px; text-align: center; }
        input[type="number"] { padding: 10px; background: #000; color: white; border: 1px solid var(--gold); border-radius: 5px; width: 60px; text-align: center; }
        
        .btn-play { padding: 15px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; width: 95%; background: var(--gold); color: black; font-size: 1.2em; transition: 0.3s; }
        .btn-play:disabled { background: #555; cursor: not-allowed; }
        
        .status { margin-top: 20px; font-size: 1.2em; font-weight: bold; min-height: 30px; }
    </style>
</head>
<body>

    <a href="/" style="color:#666; text-decoration:none; font-size:0.8em; display: block; margin-top: 10px;">🏠 SALIR AL PANEL</a>
    <h2>CHC LUCK GAMES</h2>

    <div class="card">
        <!-- Selector de elección -->
        <p>¿Qué eliges?</p>
        <div class="selector">
            <div id="opt-cara" class="option active" onclick="seleccionar('cara')">CARA (CHC)</div>
            <div id="opt-cruz" class="option" onclick="seleccionar('cruz')">CRUZ (X)</div>
        </div>

        <div class="coin-container">
            <div id="coin">
                <div class="side cara">
                    <span>CHC</span>
                    <small style="font-size: 0.5em;">CHARLYCOIN</small>
                </div>
                <div class="side cruz">
                    <span class="x-roja">X</span>
                    <span style="margin-top: 60px; font-size: 0.8em;">CASA</span>
                </div>
            </div>
        </div>

        <input type="text" id="userWallet" class="wallet-input" placeholder="Tu Dirección CharlyMiner..." />
        
        <div style="margin-bottom: 20px;">
            <span>Apuesta: </span>
            <input type="number" id="betAmount" value="1" min="1" max="10" />
            <span style="color: var(--gold); font-weight: bold;"> CHC</span>
        </div>

        <button id="playBtn" class="btn-play" onclick="procesarApuesta()">¡LANZAR VOLADO!</button>
        <div id="status" class="status">¡Suerte!</div>
    </div>

<script>
    const NODO_URL = "https://binance-bot-hna7.onrender.com";
    const MASTER_PUBLIC = "93aab2b2ee274042d81954cd6569085ac3f1f660d600e6c7ca3aa11adbf94e62544ff783541316f3c7269d751079414e879f18804dde24c1b83c70c4e13cd4ee";
    
    let eleccionUsuario = 'cara';
    let perdidasConsecutivas = 0;
    let maxApuesta = 10;

    function seleccionar(tipo) {
        eleccionUsuario = tipo;
        document.getElementById('opt-cara').classList.toggle('active', tipo === 'cara');
        document.getElementById('opt-cruz').classList.toggle('active', tipo === 'cruz');
    }

    async function procesarApuesta() {
        const wallet = document.getElementById('userWallet').value.trim();
        const betInput = document.getElementById('betAmount');
        const apuesta = parseFloat(betInput.value);
        const status = document.getElementById('status');
        const coin = document.getElementById('coin');

        if (wallet.length < 10) return alert("Ingresa tu dirección.");
        
        document.getElementById('playBtn').disabled = true;
        status.innerText = "Lanzando...";
        
        // Reset posición
        coin.style.transition = "none";
        coin.style.transform = `rotateY(0deg)`;
        await new Promise(r => setTimeout(r, 50));
        
        // Lógica de probabilidad (60% casa gana / 40% usuario gana)
        const resultadoGanaUsuario = Math.random() > 0.60;
        
        // Calculamos la rotación final
        // Si el usuario eligió cara y gana, debe caer cara (0 o 360).
        // Si el usuario eligió cruz y gana, debe caer cruz (180).
        let finalRotation = 3600; // 10 vueltas base
        
        if (eleccionUsuario === 'cara') {
            finalRotation += resultadoGanaUsuario ? 0 : 180;
        } else {
            finalRotation += resultadoGanaUsuario ? 180 : 0;
        }

        coin.style.transition = "transform 4s cubic-bezier(0.1, 0.5, 0.1, 1)";
        coin.style.transform = `rotateY(${finalRotation}deg)`;

        setTimeout(async () => {
            if (resultadoGanaUsuario) {
                status.innerHTML = `<span style="color:var(--green)">¡GANASTE! +${apuesta} CHC</span>`;
                await enviarTokens(MASTER_PUBLIC, wallet, apuesta);
            } else {
                status.innerHTML = `<span style="color:var(--red)">PERDISTE -${apuesta} CHC</span>`;
                await enviarTokens(wallet, MASTER_PUBLIC, apuesta);
            }
            document.getElementById('playBtn').disabled = false;
        }, 4000);
    }

    async function enviarTokens(emisor, receptor, monto) {
        try {
            await fetch(`${NODO_URL}/transferir`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    emisor: emisor,
                    receptor: receptor,
                    monto: monto,
                    firma: "CASINO_VOLADOS"
                })
            });
        } catch (e) { console.log("Error de red"); }
    }
</script>
</body>
</html>
