<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minería CHC | CharlyScan Pro</title>
    <style>
        :root { --gold: #f1c40f; --dark-bg: #0a0a0a; --card-bg: #161616; --blue-scan: #2980b9; }
        body { text-align: center; padding: 10px; font-family: 'Segoe UI', Arial, sans-serif; background: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* Contenedor Principal */
        .window-container { max-width: 600px; margin: 20px auto; border: 1px solid #333; border-radius: 15px; overflow: hidden; background: #111; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .window-header { background: #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        
        .card-panel { background: var(--card-bg); padding: 20px; margin: 10px; border-radius: 12px; border: 1px solid #222; }
        
        /* Iframe de los Blogs (Minería) */
        #iframeContainer { width: 95%; height: 300px; border: 2px solid var(--gold); margin: 15px auto; border-radius: 10px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        input { margin: 10px; padding: 12px; width: 85%; border-radius: 5px; border: 1px solid #444; background: #000; color: #2ecc71; font-family: monospace; text-align: center; }
        
        button { margin: 10px; padding: 12px; width: 90%; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; background: var(--gold); color: black; transition: 0.3s; }
        button:hover { transform: scale(1.02); }
        
        .chc-counter { font-size: 1.8em; color: var(--gold); margin: 10px 0; font-weight: bold; }
        .wallet-link { color: #3498db; text-decoration: underline; font-size: 0.85em; display: block; margin: 10px 0; cursor: pointer; }
        .btn-home { background: #333; color: white; padding: 5px 15px; border-radius: 5px; text-decoration: none; font-size: 0.8em; }

        /* Capa Flotante (Fullscreen Modal) */
        #modalExplorador {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
        }
        .modal-header {
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--blue-scan);
        }
        .btn-cerrar {
            background: #e74c3c;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 0.9em;
            text-decoration: none;
            cursor: pointer;
            border: none;
            width: auto;
        }
        #iframeExplorador {
            flex-grow: 1;
            width: 100%;
            border: none;
        }
    </style>
</head>
<body onload="verificarMemoria()">

<!-- VENTANA FLOTANTE (CHARLY SCAN) -->
<div id="modalExplorador">
    <div class="modal-header">
        <span style="color: var(--blue-scan); font-weight: bold;">🔍 CHARLY SCAN EXPLORER</span>
        <button class="btn-cerrar" onclick="cerrarExplorador()">← VOLVER A MINAR</button>
    </div>
    <iframe id="iframeExplorador" src=""></iframe>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="window-container">
    <div class="window-header">
        <a href="index.html" class="btn-home">🏠 HOME</a>
        <span style="font-size: 0.9em; font-weight: bold; color: var(--gold);">CHARLY MINER PRO</span>
        <a href="ganarchun.html" class="btn-home" style="background: #27ae60;">RECLAMAR</a>
    </div>

    <div class="card-panel">
        <h2>MINERÍA ACTIVA</h2>
        <input type="text" id="userWallet" placeholder="Pega tu dirección CHC aquí..." onkeypress="handleKeyPress(event)" list="prevWallets" />
        <datalist id="prevWallets"></datalist> 
        
        <span onclick="gestionarIdentidad()" class="wallet-link">¿No tienes cuenta? Generar nueva</span>

        <div class="chc-counter">💰 <span id="chcCount">0</span> CHC</div>
        <div id="minerStatus" style="font-size: 0.8em; color: #888;">Panel de control listo</div>
    </div>

    <!-- Visor de Blogs de minería -->
    <div id="iframeContainer">
      <iframe id="iframeRedireccion" src="https://tareasunamyunadm.blogspot.com"></iframe>
    </div>

    <div style="padding: 10px;">
        <button onclick="continuarMineria()">🚀 INICIAR MINERÍA</button>
        <button style="background:#e74c3c; color:white;" onclick="pararMineria()">🛑 DETENER</button>
        
        <!-- Este botón ahora abre la flotante -->
        <button style="background: var(--blue-scan); color: white;" onclick="abrirExplorador()">🔍 ABRIR CHARLY SCAN (FULLSCREEN)</button>
    </div>
</div>

<script>
    const NODO_URL = "https://binance-bot-hna7.onrender.com";
    const MASTER_PUBLIC = "93aab2b2ee274042d81954cd6569085ac3f1f660d600e6c7ca3aa11adbf94e62544ff783541316f3c7269d751079414e879f18804dde24c1b83c70c4e13cd4ee";
    const urls = ["https://tareasunamyunadm.blogspot.com", "https://faucentminialtcrypto.blogspot.com", "https://solotareamsmex.blogspot.com", "https://juegospcmexico.blogspot.com"];
    
    let segundos = 0, chcGanados = 0, interval, minando = false;

    // --- MANEJO DEL EXPLORADOR FLOTANTE ---
    function abrirExplorador() {
        const modal = document.getElementById('modalExplorador');
        const frame = document.getElementById('iframeExplorador');
        
        // Solo cargamos el SRC si está vacío para ahorrar datos
        if (frame.src !== NODO_URL + "/") {
            frame.src = NODO_URL;
        }
        
        modal.style.display = "flex";
        document.body.style.overflow = "hidden"; // Bloquea scroll del fondo
    }

    function cerrarExplorador() {
        document.getElementById('modalExplorador').style.display = "none";
        document.body.style.overflow = "auto"; // Libera scroll
    }

    // --- ROTACIÓN DE PÁGINAS DE MINERÍA ---
    function redireccionAleatoria() {
        document.getElementById('iframeRedireccion').src = urls[Math.floor(Math.random() * urls.length)];
    }
    setInterval(redireccionAleatoria, 25000);

    // --- LÓGICA DE MINERÍA ---
    function verificarMemoria() {
        const saved = localStorage.getItem("last_chc_wallet");
        if (saved) {
            document.getElementById('userWallet').value = saved;
            const dl = document.getElementById('prevWallets');
            const opt = document.createElement('option');
            opt.value = saved;
            dl.appendChild(opt);
        }
    }

    function contarTiempo() {
        const wallet = document.getElementById('userWallet').value.trim();
        if (minando && wallet.length > 5) {
            segundos++;
            if (segundos % 2 === 0) {
                chcGanados++;
                document.getElementById('chcCount').innerText = chcGanados;
                enviarAlNodo(wallet, 1);
            }
            document.getElementById('minerStatus').innerText = `Minando... (La minería sigue aunque abras el explorador)`;
        }
    }

    async function enviarAlNodo(receptor, monto) {
        try {
            await fetch(`${NODO_URL}/transferir`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ emisor: MASTER_PUBLIC, receptor: receptor, monto: monto, firma: "WEB_MINING_REWARD" })
            });
        } catch (e) {}
    }

    function continuarMineria() {
        const wallet = document.getElementById('userWallet').value.trim();
        if (wallet.length < 5) return alert("Pon tu billetera.");
        if (!minando) {
            minando = true;
            localStorage.setItem("last_chc_wallet", wallet);
            if (!interval) interval = setInterval(contarTiempo, 1000);
            alert("Minería iniciada con éxito.");
        }
    }

    function pararMineria() {
        minando = false;
        alert(`Sesión pausada. Ganaste ${chcGanados} CHC`);
    }

    function gestionarIdentidad() {
        let p = prompt("¿ANDROID o PC?").toLowerCase();
        if (p === "android") {
            const array = new Uint8Array(32);
            window.crypto.getRandomValues(array);
            const privateKey = Array.from(array).map(b => b.toString(16).padStart(2, '0')).join('');
            const publicKey = "chc_" + privateKey.substring(0, 40);
            alert("Nueva llave CHC: " + publicKey + "\n\nCopiada al panel.");
            document.getElementById('userWallet').value = publicKey;
            localStorage.setItem("last_chc_wallet", publicKey);
        }
    }

    function handleKeyPress(e) { if (e.keyCode === 13) { continuarMineria(); } }
</script>

</body>
</html>
