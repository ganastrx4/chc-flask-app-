<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db;
            --dark-bg: #0a0a0a;
            --window-bg: #161b22;
            --accent: #f1c40f;
            --glow-blue: rgba(52, 152, 219, 0.6);
            --glow-gold: rgba(241, 196, 15, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(52, 152, 219, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(241, 196, 15, 0.1) 0%, transparent 40%);
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor tipo Ventana */
        .app-window {
            width: 90%;
            max-width: 500px;
            background: var(--window-bg);
            border: 2px solid #30363d;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 15px var(--glow-blue);
            position: relative;
            overflow: hidden;
        }

        /* Brillo de la imagen principal */
        .logo-main {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 0 10px var(--accent));
            animation: pulse-gold 2s infinite alternate;
        }

        @keyframes pulse-gold {
            from { filter: drop-shadow(0 0 5px var(--accent)); }
            to { filter: drop-shadow(0 0 15px var(--accent)); }
        }

        h1 { font-size: 20px; color: var(--accent); text-align: center; letter-spacing: 1px; margin: 15px 0 5px; }
        .tagline { font-size: 12px; color: #8b949e; text-align: center; margin-bottom: 20px; }

        /* Estilo de los Grids */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #30363d;
        }

        .app-icon {
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s;
        }

        .app-icon:hover { transform: scale(1.05); }

        .app-icon img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 8px var(--glow-gold);
        }

        .app-icon span { display: block; font-size: 10px; color: #c9d1d9; margin-top: 5px; }

        /* Botón Principal Scaner */
        .main-btn {
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin: 20px 0;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(46, 160, 67, 0.4);
        }

        /* Footer & Estrellas */
        .footer-section {
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #30363d;
            padding-top: 15px;
        }

        .rating { color: var(--accent); font-size: 18px; text-shadow: 0 0 10px var(--accent); }

        /* Botones Especiales Inferiores */
        .bottom-nav {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-special {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 5px;
            border-radius: 8px;
            font-size: 10px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            box-shadow: inset 0 0 5px var(--glow-gold);
            transition: 0.3s;
        }

        .btn-special:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 15px var(--accent);
        }

        .copyright { font-size: 9px; color: #484f58; margin-top: 10px; }
    </style>
</head>
