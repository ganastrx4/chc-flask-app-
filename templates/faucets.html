    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db;
            --dark-bg: #0a0a0a;
            --window-bg: #161b22;
            --accent: #f1c40f;
            --glow-blue: rgba(52, 152, 219, 0.4);
            --glow-gold: rgba(241, 196, 15, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 5% 10%, rgba(52, 152, 219, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 95% 90%, rgba(241, 196, 15, 0.1) 0%, transparent 50%);
            color: #ffffff;
            margin: 0;
            padding: 20px 0;
            display: flex;
            justify-content: center;
        }

        .app-window {
            width: 90%;
            max-width: 500px;
            background: var(--window-bg);
            border: 1px solid #30363d;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 20px var(--glow-blue);
        }

        /* Logo y Header */
        .logo-main {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 0 12px var(--accent));
        }

        h1 { font-size: 22px; color: var(--accent); text-align: center; margin: 15px 0 5px; text-transform: uppercase; }
        .tagline { font-size: 13px; color: #8b949e; text-align: center; margin-bottom: 25px; font-style: italic; }

        /* Títulos de Sección */
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            margin: 20px 0 12px;
            padding-left: 10px;
            border-left: 3px solid var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grid de Apps */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .app-icon {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .app-icon:hover { transform: translateY(-5px); }

        .app-icon img {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            background: #fff;
            padding: 3px;
            box-shadow: 0 0 10px var(--glow-gold);
        }

        .app-icon span { font-size: 11px; color: #c9d1d9; margin-top: 8px; font-weight: 400; }

        /* Chips / Links de Texto */
        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .chip {
            background: #21262d;
            border: 1px solid #30363d;
            padding: 8px 14px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .chip:hover { background: var(--primary); border-color: var(--primary); }

        /* Botón Scaner Principal */
        .main-btn {
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            margin: 25px 0;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(46, 160, 67, 0.3);
            display: block;
            width: 100%;
            text-transform: uppercase;
        }

        /* Footer y Nav Inferior */
        .footer-section {
            text-align: center;
            margin-top: 30px;
            border-top: 1px solid #30363d;
            padding-top: 20px;
        }

        .rating { color: var(--accent); font-size: 20px; margin-bottom: 15px; }

        .bottom-nav {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .btn-special {
            background: rgba(241, 196, 15, 0.05);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 5px;
            border-radius: 10px;
            font-size: 10px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: inset 0 0 8px rgba(241, 196, 15, 0.1);
        }

        .btn-special:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .copyright { font-size: 10px; color: #484f58; margin-top: 15px; letter-spacing: 0.5px; }
    </style>
</head>
