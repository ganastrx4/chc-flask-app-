    <title>CharlyCoin App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db;
            --dark: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #f1c40f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
        }

        /* Header Estilo App */
        .app-header {
            text-align: center;
            padding: 20px 0;
        }

        .logo-main {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            margin: 10px 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        /* Secciones de Tarjetas */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin: 25px 0 15px 10px;
            color: var(--accent);
            text-align: left;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            background: var(--card);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .app-icon {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .app-icon:active {
            transform: scale(0.9);
        }

        .app-icon img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: white;
            padding: 5px;
            object-fit: contain;
        }

        .app-icon span {
            font-size: 10px;
            color: #bbb;
            margin-top: 5px;
            text-align: center;
            font-weight: 500;
        }

        /* Enlaces de Texto Estilo Lista */
        .text-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .chip {
            background: #333;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-size: 12px;
            border: 1px solid #444;
        }

        /* Botón de Acción Principal */
        .main-btn {
            background: linear-gradient(135deg, #2d2c2c 0%, #000 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 30px 0;
            border: 1px solid #555;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .rating {
            color: #f1c40f;
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>
