<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyCoin | Dashboard Elite</title>
    
    <style>
        :root {
            --gold: #f1c40f;
            --gold-glow: rgba(241, 196, 15, 0.5);
            --bg-dark: #0a0a0a;
            --glass: rgba(44, 44, 62, 0.4);
        }

        body {
            background: var(--bg-dark);
            margin: 0;
            padding: 20px 0 80px 0; /* Ajuste de rellenos */
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center; /* Esto centra todo el contenido del body */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- LOGO --- */
        .logo-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrapper::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            animation: rotateLight 6s linear infinite;
            z-index: -1;
        }

        .gif-container img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            position: relative;
            z-index: 2;
            animation: pulseGlow 3s ease-in-out infinite;
            box-shadow: 0 0 30px var(--gold-glow);
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px var(--gold-glow), inset 0 0 10px var(--gold-glow); transform: scale(1); }
            50% { box-shadow: 0 0 50px var(--gold), inset 0 0 20px var(--gold); transform: scale(1.02); }
        }

        @keyframes rotateLight {
            from { transform: rotate(0deg); opacity: 0.5; }
            50% { opacity: 0.8; }
            to { transform: rotate(360deg); opacity: 0.5; }
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            width: 90%;
            max-width: 400px; /* Un poco más estrecho para mejor estética */
            margin: 0 auto; /* Centrado horizontal */
            padding: 25px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* Soporte Android/Safari */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            box-sizing: border-box; /* Evita que el padding ensanche la caja */
        }

        .btn-menu {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 800;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            color: white;
            background: linear-gradient(135deg, #2c2c3e 0%, #1e1e2f 100%);
            border: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }

        .btn-menu::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(30deg);
            transition: 0.5s;
        }

        .btn-menu:hover::after { left: 120%; }
        .btn-menu:hover { transform: scale(1.03); filter: brightness(1.2); }

        .btn-gold { background: linear-gradient(135deg, #f39c12 0%, #d35400 100%); color: black; }
        .btn-blue { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
        .btn-green { background: linear-gradient(135deg, #27ae60 0%, #16a085 100%); }
        .btn-purple { background: linear-gradient(135deg, #8e44ad 0%, #2c3e50 100%); }

        /* --- BOTÓN UNISWAP CORREGIDO --- */
        .uniswap-link {
            width: 100%;
            display: flex;
            justify-content: center; /* Centra el botón hijo */
            text-decoration: none;
            margin-top: 30px;
        }

        .uniswap-banner {
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff00c8, #6c47ff, #00d4ff);
            background-size: 200% 200%;
            animation: gradientMove 3s ease infinite;
            color: white;
            font-weight: 900;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 0, 200, 0.3);
            text-align: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- LOGO -->
        <div class="logo-wrapper">
            <div class="gif-container">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgs4uyyEce9czJNopvAJUC-EuqRY0GilYfi7dguE0OEkUjTcrn6PVYsIFXo2NbemRvavHvVWsD8ru9ZGJXUpfhSVsUyrNYeJri7NP2XU6-9NUjbyrVjQtYUNjt7N9dUaouupuqlczAJlDqpYVhdArBcT7MRvEAwVfQv8JeOKD-EWAecMuSsfAE4gizyojtT/s1024/0ed01250-9b4a-4d44-924c-7c0011004aa0.webp" alt="CharlyCoin Logo">
            </div>
        </div>
               
        <!-- BOTONES CORREGIDOS: Enrutamiento directo a Flask para evitar errores 404 -->
        <a href="/ganarchun.html" class="btn-menu btn-gold">💰 GANAR CHUN / CHC</a>
        <a href="/jugar" class="btn-menu btn-blue">🎲 JUGAR VOLADOS</a>
        <a href="/faucets" class="btn-menu">🚰 FAUCETS GRATIS</a>
        <a href="/multiplicador" class="btn-menu btn-green">💹 MULTIPLICADOR WDD</a>
        <a href="/explorador" class="btn-menu">📊 EXPLORADOR</a>
        <a href="/ganarchun" class="btn-menu btn-purple" style="border: 1px solid var(--gold);">⛏️ MINERO WEB y PC (CHC)</a>
    </div>

    <!-- BOTÓN INFERIOR CENTRADO -->
    <a href="https://app.uniswap.org/swap?outputCurrency=0x6b2ba4159916017267c39a3b70b507f7c1af5edb" target="_blank" class="uniswap-link">
        <button class="uniswap-banner">
            💎 APOYA CHC EN UNISWAP <br>
            <span style="font-size: 11px; opacity: 0.9;">HODL: SOLO LOS FUERTES LLEGAN AL PUMP</span>
        </button>
    </a>

    <!-- SCRIPTS -->
    <script src="https://cdn.worldcoin.org/idkit/idkit.umd.min.js"></script>
    <script>
        window.IDKit.init({
            app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
            action: "login",
            signal: "rp_aa5ead0710fce1dc",
            credential_types: ["orb", "device"],
            onSuccess: async (proof) => {
                console.log("Verificado localmente. Comunicando con el servidor...");
                
                // Envía el token de verificación de World ID a la API de Flask
                try {
                    const response = await fetch('/api/verify-proof', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(proof)
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        console.log("Sesión autorizada con éxito.");
                        // Una vez guardada la sesión en el Backend, redirigimos al panel protegido
                        window.location.href = "/panel";
                    } else {
                        console.error("Error en la autorización de sesión:", data.error);
                        alert("Error al iniciar sesión.");
                    }
                } catch (error) {
                    console.error("Error de conexión con el backend:", error);
                }
            }
        });
    </script>
</body>
</html>
