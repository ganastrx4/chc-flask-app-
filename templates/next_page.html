    <style>
        :root {
            --gold: #f1c40f;
            --gold-glow: rgba(241, 196, 15, 0.5);
            --bg-dark: #0a0a0a;
            --glass: rgba(44, 44, 62, 0.4);
        }

        body {
            background: var(--bg-dark);
            margin-bottom: 80px;
            overflow-x: hidden;
        }

        /* --- EFECTO DE LUZ DETRÁS DEL LOGO --- */
        .logo-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Resplandor giratorio */
        .logo-wrapper::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            animation: rotateLight 6s linear infinite;
            z-index: -1;
        }

        .gif-container img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            position: relative;
            z-index: 2;
            /* Irradiación de luz constante */
            animation: pulseGlow 3s ease-in-out infinite;
            box-shadow: 0 0 30px var(--gold-glow);
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px var(--gold-glow), inset 0 0 10px var(--gold-glow); transform: scale(1); }
            50% { box-shadow: 0 0 50px var(--gold), inset 0 0 20px var(--gold); transform: scale(1.02); }
        }

        @keyframes rotateLight {
            from { transform: rotate(0deg); opacity: 0.5; }
            50% { opacity: 0.8; }
            to { transform: rotate(360deg); opacity: 0.5; }
        }

        /* --- CONTENEDOR Y BOTONES --- */
        .container {
            max-width: 450px;
            margin: 20px auto;
            padding: 25px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .btn-menu {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 800;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: none;
            color: white;
            background: linear-gradient(135deg, #2c2c3e 0%, #1e1e2f 100%);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Efecto de brillo que cruza el botón al pasar el mouse */
        .btn-menu::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(30deg);
            transition: 0.5s;
        }

        .btn-menu:hover::after {
            left: 120%;
        }

        .btn-menu:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            filter: brightness(1.2);
        }

        /* Colores específicos para botones */
        .btn-gold { background: linear-gradient(135deg, #f39c12 0%, #d35400 100%); color: black; }
        .btn-blue { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
        .btn-green { background: linear-gradient(135deg, #27ae60 0%, #16a085 100%); }
        .btn-purple { background: linear-gradient(135deg, #8e44ad 0%, #2c3e50 100%); }

        /* Botón Uniswap */
        .uniswap-banner {
            width: 90%;
            max-width: 450px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff00c8, #6c47ff, #00d4ff);
            background-size: 200% 200%;
            animation: gradientMove 3s ease infinite, pulse 2s infinite;
            color: white;
            font-weight: 900;
            border: none;
            cursor: pointer;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
