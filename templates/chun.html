<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyScan | Casino & Multi-Bridge</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 25px; width: 100%; max-width: 500px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        h3 { color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-top: 0; }
        
        /* Coin Style */
        .coin-wrap { width: 100px; height: 100px; margin: 20px auto; perspective: 1000px; }
        #coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 3s; }
        .side { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border: 4px solid var(--gold); }
        .cara { background: var(--gold); color: black; }
        .aguila { background: #222; color: var(--gold); transform: rotateY(180deg); }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 12px; color: #aaa; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: var(--green); border-radius: 5px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-play { background: var(--gold); color: black; }
        .btn-buy { background: var(--green); color: black; }
        
        #log-status { font-size: 11px; background: #000; padding: 10px; border-radius: 5px; margin-top: 15px; color: #888; overflow-x: hidden; white-space: nowrap; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <!-- SECCIÓN CASINO -->
    <div class="card">
        <h3>🎰 CASINO CHC</h3>
        <div class="coin-wrap">
            <div id="coin">
                <div class="side cara">CHC</div>
                <div class="side aguila">CASA</div>
            </div>
        </div>
        <div class="input-group">
            <label>ID BILLETERA CHARLYSCAN (USUARIO)</label>
            <input type="text" id="chcUser" placeholder="93aab2b2ee274042d8..." value="">
        </div>
        <div class="input-group">
            <label>CANTIDAD APOSTADA</label>
            <input type="number" id="bet" value="1" min="1">
        </div>
        <button class="btn btn-play" onclick="playGame()">APOSTAR Y LANZAR</button>
        <div id="game-info" style="text-align:center; margin-top:10px;"></div>
    </div>

    <!-- SECCIÓN BRIDGE / ENVÍO A POOL -->
    <div class="card">
        <h3>💱 ENVÍO A POOL (BUY CHC)</h3>
        <button class="btn" style="background:#3498db; color:white;" onclick="connect()">🔗 CONECTAR WALLET EXTERNA</button>
        
        <div class="input-group" style="margin-top:15px;">
            <label>SELECCIONAR RED Y ASSET</label>
            <select id="net" onchange="changePool()">
                <option value="WLD" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">World Chain (WLD)</option>
                <option value="BNB" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">BNB Chain (BNB)</option>
                <option value="BTC" data-addr="bc1qg6d27ghf4v26sc87r06798j56qf6vjuxr3fzv4">Bitcoin (BTC)</option>
                <option value="SOL" data-addr="CJrnbCpnYfU8p4L1KxWv8rZ5m1k7f9rZ5m1k7f9rZ8tx">Solana (SOL)</option>
            </select>
        </div>

        <div class="input-group">
            <label>BILLETERA POOL (DESTINO)</label>
            <input type="text" id="pool" value="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae" readonly>
        </div>

        <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex:1;">
                <label>ENVIAR MONEDA</label>
                <input type="number" id="amt" step="0.0001" oninput="calc(this.value)">
            </div>
            <div class="input-group" style="flex:1;">
                <label>OBTENER CHC</label>
                <input type="text" id="chcRes" readonly placeholder="0">
            </div>
        </div>

        <button class="btn btn-buy" onclick="sendToPool()">CONFIRMAR ENVÍO Y GENERAR HASH</button>
        
        <div id="log-status">Esperando transacción...</div>
    </div>

<script>
    const NODO_URL = "https://binance-bot-hna7.onrender.com";
    const RATE = 100000;
    let externalAcc = null;

    async function connect() {
        if (window.ethereum) {
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            externalAcc = accs[0];
            document.getElementById('log-status').innerText = "Wallet conectada: " + externalAcc;
        }
    }

    function changePool() {
        const s = document.getElementById('net');
        document.getElementById('pool').value = s.options[s.selectedIndex].getAttribute('data-addr');
    }

    function calc(v) {
        document.getElementById('chcRes').value = (v * RATE) + " CHC";
    }

    // --- BASE DE TRANSACCIÓN RECUPERADA ---
    async function sendToPool() {
        const amount = document.getElementById('amt').value;
        const poolAddr = document.getElementById('pool').value;
        const userCHC = document.getElementById('chcUser').value;

        if (!externalAcc || !amount || !userCHC) return alert("Faltan datos o conexión.");

        try {
            const web3 = new Web3(window.ethereum);
            const valWei = web3.utils.toWei(amount, 'ether');

            // Ejecución del envío real a la billetera colocada
            const tx = await web3.eth.sendTransaction({
                from: externalAcc,
                to: poolAddr,
                value: valWei
            });

            // Generación del Hash de bloque para el Nodo (Como tus registros #6948...)
            if (tx.transactionHash) {
                const hashRegistro = `#6948${tx.transactionHash.substring(2,20)}...${userCHC.substring(0,10)}`;
                document.getElementById('log-status').innerText = hashRegistro;

                // Notificar al Nodo para que valide y entregue CHC
                fetch(`${NODO_URL}/confirmar-pool`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        hash: tx.transactionHash,
                        user: userCHC,
                        monto: amount,
                        pool: poolAddr,
                        log: hashRegistro
                    })
                });
                alert("Envío exitoso. Hash registrado en el pool.");
            }
        } catch (e) {
            document.getElementById('log-status').innerText = "Error en envío.";
        }
    }

    function playGame() {
        const u = document.getElementById('chcUser').value;
        const b = document.getElementById('bet').value;
        if(!u) return alert("Ingresa tu ID CHC");

        const win = Math.random() > 0.6;
        const rot = 1800 + (win ? 0 : 180);
        document.getElementById('coin').style.transform = `rotateY(${rot}deg)`;

        setTimeout(() => {
            document.getElementById('game-info').innerHTML = win ? `<b style="color:var(--green)">GANASTE +${b} CHC</b>` : `<b style="color:var(--red)">CASA GANA -${b} CHC</b>`;
            
            fetch(`${NODO_URL}/casino-update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user: u, amount: b, win: win })
            });
        }, 3000);
    }
</script>
</body>
</html>
