<!DOCTYPE html>
<html>
<head>
    <style>
        /* --- ESTILOS DE LA ANIMACIÓN --- */
        .coin-container {
            perspective: 1000px;
            width: 150px;
            height: 150px;
            margin: 50px auto;
            cursor: pointer;
        }

        #coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 4s cubic-bezier(0.1, 0.5, 0.1, 1); /* 4 SEGUNDOS DE GIRO */
        }

        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
            border: 4px solid #f1c40f;
        }

        .cara {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #000;
        }

        .aguila {
            background: linear-gradient(135deg, #bdc3c7, #2c3e50);
            color: #fff;
            transform: rotateY(180deg);
        }

        .btn-lanzar {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="coin-container">
    <div id="coin">
        <div class="side cara">CHC (CARA)</div>
        <div class="side aguila">ÁGUILA</div>
    </div>
</div>

<button class="btn-lanzar" onclick="lanzarMoneda()">¡LANZAR PARA GANAR!</button>
<p id="resultado" style="text-align: center; font-weight: bold;"></p>

<script>
    async function lanzarMoneda() {
        const coin = document.getElementById('coin');
        const resultadoTexto = document.getElementById('resultado');
        
        // 1. Decidir resultado (0 = Cara, 1 = Águila)
        const esCara = Math.random() < 0.5;
        const girosExtra = esCara ? 0 : 180;
        
        // 2. Ejecutar Animación de 4 segundos (múltiples rotaciones)
        const rotacionTotal = 3600 + girosExtra; // 10 vueltas completas + resultado
        coin.style.transform = `rotateY(${rotacionTotal}deg)`;
        
        resultadoTexto.innerText = "La moneda está en el aire...";

        // 3. Esperar a que termine la animación (4000ms = 4s)
        setTimeout(async () => {
            if (esCara) {
                resultadoTexto.innerText = "¡GANASTE! Procesando tu regalo de CHC...";
                resultadoTexto.style.color = "#2ecc71";
                
                // --- LÓGICA INTERNA PARA REGALAR TOKENS ---
                try {
                    const response = await fetch('/regalo_bienvenida', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ 
                            wallet: "USUARIO_LOGUEADO", // Aquí pasas la wallet del usuario
                            monto: 18.0 // Tu recompensa estándar
                        })
                    });
                    const data = await response.json();
                    alert(data.mensaje);
                } catch (e) {
                    console.error("Error al conectar con el nodo:", e);
                }

            } else {
                resultadoTexto.innerText = "Salió Águila. ¡Sigue intentando!";
                resultadoTexto.style.color = "#e74c3c";
            }
            
            // Resetear rotación después de un tiempo para poder lanzar de nuevo
            setTimeout(() => {
                coin.style.transition = 'none';
                coin.style.transform = esCara ? 'rotateY(0deg)' : 'rotateY(180deg)';
                setTimeout(() => coin.style.transition = 'transform 4s cubic-bezier(0.1, 0.5, 0.1, 1)', 50);
            }, 2000);

        }, 4000);
    }
</script>

</body>
</html>
