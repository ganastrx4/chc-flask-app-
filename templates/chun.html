<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino & Multi-Bridge CharlyScan</title>
    
    <!-- LIBRERÍAS WEB3 PARA COMPATIBILIDAD UNIVERSAL -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>

    <style>
        :root { --gold: #f1c40f; --iron: #bdc3c7; --bg: #0a0a0a; --green: #2ecc71; --red: #e74c3c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; }
        
        /* Contenedor de Moneda (TU ORIGINAL) */
        .coin-container { perspective: 1000px; width: 150px; height: 150px; margin: 20px auto; }
        #coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }
        .spinning { transition: transform 4s cubic-bezier(0.1, 0.5, 0.1, 1); }
        .side { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            backface-visibility: hidden; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; border: 4px solid var(--gold);
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
        }
        .cara { background: linear-gradient(135deg, var(--gold), #d4af37); color: black; }
        .aguila { background: linear-gradient(135deg, #333, #000); color: var(--gold); transform: rotateY(180deg); }

        /* Panel de Apuestas (TU ORIGINAL) */
        .bet-panel { background: #1a1a1a; padding: 20px; border-radius: 15px; max-width: 400px; margin: 0 auto; border: 1px solid #333; }
        .wallet-input { width: 90%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: var(--green); font-family: monospace; font-size: 11px; margin-bottom: 15px; }
        input[type="number"], select { padding: 10px; background: #000; color: white; border: 1px solid var(--gold); border-radius: 5px; width: 60px; }
        
        .btn { padding: 12px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        .btn-play { background: var(--gold); color: black; width: 100%; font-size: 1.1em; }
        .btn-play:disabled { background: #555; cursor: not-allowed; }
        .btn-bridge { background: var(--green); color: black; width: 100%; margin-top: 15px; }
        .btn-home { background: transparent; color: #888; text-decoration: none; font-size: 0.9em; }

        #status { margin-top: 15px; min-height: 40px; font-weight: bold; }
        #bridgeStatus { color: #888; font-size: 0.8em; margin-top: 5px; }
        .martingala-info { color: var(--iron); font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>

    <a href="https://binance-bot-2kbp.onrender.com/" class="btn-home">🏠 SALIR DE LA MESA</a>
    <h2>CASINO CHARLYSCAN</h2>
    
    <div class="coin-container">
        <div id="coin">
            <div class="side cara">CHC<br>CARA</div>
            <div class="side aguila">CASA<br>ÁGUILA</div>
        </div>
    </div>

    <div class="bet-panel">
        <input type="text" id="userWallet" class="wallet-input" placeholder="Tu Dirección CharlyMiner..." />
        
        <div style="margin-bottom: 15px;">
            <span>Apuesta CHC: </span>
            <input type="number" id="betAmount" value="1" min="1" max="10" />
        </div>

        <button id="playBtn" class="btn btn-play" onclick="procesarApuesta()">APOSTAR Y LANZAR</button>
        <div id="status">Selecciona tu apuesta</div>
        <div id="streakInfo" class="martingala-info">Racha de pérdidas: 0</div>

        <!-- SECCIÓN BRIDGE RECUPERADA -->
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <button class="btn btn-bridge" onclick="conectarWeb3()">🔗 CONECTAR BILLETERA WEB3</button>
        <div id="bridgeStatus">Esperando conexión (MetaMask, Trust, etc.)</div>
    </div>

<script>
    // --- TUS CONSTANTES ORIGINALES ---
    const MASTER_PUBLIC = "93aab2b2ee274042d81954cd6569085ac3f1f660d600e6c7ca3aa11adbf94e62544ff783541316f3c7269d751079414e879f18804dde24c1b83c70c4e13cd4ee";
    const NODO_URL = "https://binance-bot-hna7.onrender.com";
    const AUTH_KEY = "e52bcda04bcebb7dfebf42b2ddcfac46"; // Tu Hash MD5 de seguridad

    let perdidasConsecutivas = 0;
    let maxApuesta = 10;
    let userExternalAccount = null;

    // --- CONFIGURACIÓN WEB3 MODAL PARA MÓVILES ---
    const Web3Modal = window.Web3Modal.default;
    const WalletConnectProvider = window.WalletConnectProvider.default;
    let web3Modal;

    function initWeb3() {
        const providerOptions = {
            walletconnect: {
                package: WalletConnectProvider,
                options: { infuraId: "8043bb2cf99347b1bf59be0d49e048c0" } // ID genérico o el tuyo
            }
        };
        web3Modal = new Web3Modal({ cacheProvider: false, providerOptions, theme: "dark" });
    }

    async function conectarWeb3() {
        try {
            initWeb3();
            const provider = await web3Modal.connect();
            const web3 = new Web3(provider);
            const accounts = await web3.eth.getAccounts();
            userExternalAccount = accounts[0];
            document.getElementById('bridgeStatus').innerText = "Conectado: " + userExternalAccount.substring(0,10) + "...";
            alert("Billetera vinculada con éxito");
        } catch(e) { console.log("Conexión cancelada"); }
    }

    // --- LÓGICA DE APUESTA (TU ORIGINAL RESTAURADA) ---
    async function procesarApuesta() {
        const wallet = document.getElementById('userWallet').value.trim();
        const betInput = document.getElementById('betAmount');
        const apuesta = parseFloat(betInput.value);
        const status = document.getElementById('status');
        const coin = document.getElementById('coin');
        const playBtn = document.getElementById('playBtn');

        if (wallet.length < 10) return alert("Ingresa tu dirección de minero.");
        if (apuesta > maxApuesta) return alert(`Límite actual de apuesta: ${maxApuesta} CHC`);

        playBtn.disabled = true;
        coin.classList.remove('spinning');
        coin.style.transform = `rotateY(0deg)`;
        await new Promise(r => setTimeout(r, 50));
        
        const ganaUsuario = Math.random() > 0.60;
        const totalRotation = 3600 + (ganaUsuario ? 0 : 180);
        
        coin.classList.add('spinning');
        coin.style.transform = `rotateY(${totalRotation}deg)`;
        status.innerText = "¡La suerte está echada!";

        setTimeout(async () => {
            if (ganaUsuario) {
                perdidasConsecutivas = 0;
                maxApuesta = 10;
                betInput.max = 10;
                status.innerHTML = `<span style="color:var(--green)">¡GANASTE! +${apuesta} CHC</span>`;
                await enviarTokens(MASTER_PUBLIC, wallet, apuesta);
            } else {
                perdidasConsecutivas++;
                status.innerHTML = `<span style="color:var(--red)">PERDISTE. -${apuesta} CHC enviado a la Casa.</span>`;
                
                if(perdidasConsecutivas < 5) {
                    maxApuesta = 20;
                    alert("¡Oportunidad de Martingala! Ahora puedes apostar hasta 20 CHC.");
                } else {
                    maxApuesta = 300;
                    status.innerHTML += "<br><small>Nivel 5: Capacidad máxima 300 CHC</small>";
                }
                betInput.max = maxApuesta;
                await enviarTokens(wallet, MASTER_PUBLIC, apuesta);
            }
            document.getElementById('streakInfo').innerText = `Racha de pérdidas: ${perdidasConsecutivas}`;
            playBtn.disabled = false;
        }, 4000);
    }

    async function enviarTokens(emisor, receptor, monto) {
        try {
            await fetch(`${NODO_URL}/transferir`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': AUTH_KEY // Seguridad MD5
                },
                body: JSON.stringify({
                    emisor: emisor,
                    receptor: receptor,
                    monto: monto,
                    firma: "CASINO_CHARLY_SYSTEM"
                })
            });
        } catch (e) {
            console.log("Error de red, pero la apuesta fue procesada localmente.");
        }
    }
</script>
</body>
</html>
