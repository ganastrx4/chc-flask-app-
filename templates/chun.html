<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyScan | Casino & Multichain Bridge</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <style>
        :root {
            --gold: #f1c40f;
            --gold-dark: #9a7d0a;
            --bg-main: #050505;
            --card-bg: #121212;
            --accent: #2ecc71;
            --danger: #e74c3c;
            --text-muted: #888;
        }

        body {
            background-color: var(--bg-main);
            color: white;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header & Wallet Section */
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            box-sizing: border-box;
        }

        .btn-connect {
            background: linear-gradient(45deg, var(--gold), var(--gold-dark));
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-connect:hover { transform: scale(1.05); }

        /* Contenedores Principales */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            width: 95%;
            max-width: 900px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2, h3 { margin-top: 0; color: var(--gold); }

        /* Estilos del Casino */
        .coin-box {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }
        
        .coin-visual {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f1c40f, #d4af37);
            border: 4px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            font-weight: 900;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
            transition: transform 3s cubic-bezier(0.1, 0.5, 0.1, 1);
        }

        /* Form Elements */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; margin-left: 5px; }

        input, select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-family: monospace;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--gold); outline: none; }

        .btn-action {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-play { background: var(--gold); color: black; }
        .btn-buy { background: var(--accent); color: black; }
        .btn-sell { background: var(--danger); color: white; }

        /* Bridge Specifics */
        .address-display {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            font-size: 11px;
            color: var(--accent);
            word-break: break-all;
            border: 1px dashed #444;
            margin-bottom: 15px;
        }

        .status-msg { font-size: 13px; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; font-size: 1.2em;">CHARLY<span style="color:var(--gold)">SCAN</span></div>
        <button class="btn-connect" id="walletBtn" onclick="connectWallet()">CONECTAR WALLET</button>
    </header>

    <div class="main-grid">
        
        <!-- SECCIÓN: CASINO -->
        <div class="card">
            <h3>🎰 CASINO CHC</h3>
            <div class="coin-box">
                <div id="coinVisual" class="coin-visual">CHC</div>
            </div>
            
            <div class="input-group">
                <label>BILLETERA DEL JUGADOR (CHC)</label>
                <input type="text" id="userWallet" placeholder="0x..." readonly>
            </div>

            <div class="input-group">
                <label>CANTIDAD A APOSTAR (Límite: 1-300 CHC)</label>
                <input type="number" id="betAmount" value="1" min="1">
            </div>

            <button class="btn-action btn-play" id="playBtn" onclick="procesarApuesta()">LANZAR MONEDA</button>
            <div id="gameStatus" class="status-msg">¿Listo para ganar?</div>
        </div>

        <!-- SECCIÓN: BRIDGE MULTICHAIN -->
        <div class="card">
            <h3>💱 MULTICHAIN BRIDGE</h3>
            
            <div class="input-group">
                <label>RED DE PAGO / RETIRO</label>
                <select id="networkSelect" onchange="updateBridgeUI()">
                    <option value="WLD" data-addr="0x2cFc85d8E48F8EAB294be644d9E25C3030863003">World Chain</option>
                    <option value="ETH" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">Ethereum</option>
                    <option value="BTC" data-addr="bc1qg6d27ghf4v26sc87r06798j56qf6vjuxr3fzv4">Bitcoin</option>
                    <option value="SOL" data-addr="CJrnbCpnYfU8p4L1KxWv8rZ5m1k7f9rZ5m1k7f9rZ8tx">Solana</option>
                    <option value="BNB" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">BNB Chain</option>
                    <option value="BASE" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">Base</option>
                    <option value="LINEA" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">Linea</option>
                    <option value="POLYGON" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">Polygon</option>
                    <option value="ARB" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">Arbitrum</option>
                    <option value="OP" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">Optimism</option>
                </select>
            </div>

            <label>DIRECCIÓN DE DEPÓSITO PARA EL NODO</label>
            <div id="depositAddr" class="address-display">0x2cFc85d8E48F8EAB294be644d9E25C3030863003</div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>CANTIDAD ENVIADA</label>
                    <input type="number" id="bridgeInput" step="0.0001" oninput="calcBridge(this.value)">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>RECIBES CHC</label>
                    <input type="text" id="bridgeOutput" readonly placeholder="0">
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn-action btn-buy" onclick="execSwap('BUY')">COMPRAR</button>
                <button class="btn-action btn-sell" onclick="execSwap('SELL')">VENDER</button>
            </div>
            <div id="bridgeStatus" class="status-msg" style="color: var(--text-muted)">El nodo verificará tu TX automáticamente.</div>
        </div>
    </div>

    <script>
        const NODO_URL = "https://binance-bot-hna7.onrender.com";
        const RATE = 100000;
        let userAccount = null;

        // --- CONECTIVIDAD WEB3 ---
        async function connectWallet() {
            if (window.ethereum) {
                const web3 = new Web3(window.ethereum);
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAccount = accounts[0];
                    document.getElementById('userWallet').value = userAccount;
                    document.getElementById('walletBtn').innerText = userAccount.substring(0,6) + "..." + userAccount.substring(38);
                    document.getElementById('walletBtn').style.background = "#2ecc71";
                } catch (e) { console.error("Conexión rechazada"); }
            } else { alert("Instala MetaMask"); }
        }

        // --- LÓGICA DEL BRIDGE ---
        function updateBridgeUI() {
            const select = document.getElementById('networkSelect');
            const addr = select.options[select.selectedIndex].getAttribute('data-addr');
            document.getElementById('depositAddr').innerText = addr;
            calcBridge(document.getElementById('bridgeInput').value);
        }

        function calcBridge(val) {
            document.getElementById('bridgeOutput').value = Math.floor(val * RATE).toLocaleString() + " CHC";
        }

        async function execSwap(type) {
            if(!userAccount) return alert("Conecta tu wallet");
            const amt = document.getElementById('bridgeInput').value;
            const net = document.getElementById('networkSelect').value;
            
            document.getElementById('bridgeStatus').innerText = "Solicitud enviada al Nodo CharlyScan...";
            
            try {
                const res = await fetch(`${NODO_URL}/bridge-request`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        type, net, amount: amt, user: userAccount
                    })
                });
                alert("Nodo notificado. Procesa tu pago a la dirección mostrada.");
            } catch (e) { alert("Error de red con el Nodo."); }
        }

        // --- LÓGICA DEL CASINO ---
        async function procesarApuesta() {
            if(!userAccount) return alert("Conecta tu wallet");
            const btn = document.getElementById('playBtn');
            const coin = document.getElementById('coinVisual');
            const status = document.getElementById('gameStatus');
            const bet = parseFloat(document.getElementById('betAmount').value);

            btn.disabled = true;
            status.innerText = "¡La moneda está en el aire!";
            
            // Animación
            const rotation = 1800 + (Math.random() > 0.5 ? 0 : 180);
            coin.style.transform = `rotateY(${rotation}deg)`;

            setTimeout(async () => {
                const gano = rotation % 360 === 0;
                status.innerHTML = gano ? `<span style="color:var(--accent)">¡GANASTE! +${bet} CHC</span>` : `<span style="color:var(--danger)">CASA GANA -${bet} CHC</span>`;
                
                // Envío al Nodo
                await fetch(`${NODO_URL}/transferir`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        monto: bet,
                        receptor: gano ? userAccount : "MASTER_WALLET",
                        firma: "CASINO_PRO_SECURE"
                    })
                });
                
                btn.disabled = false;
            }, 3000);
        }
    </script>

    <!-- SECCIÓN: MONITOR DE MERCADO (ORÁCULO) -->
<div class="card" style="grid-column: 1 / -1; background: linear-gradient(145deg, #121212, #000); border: 1px solid var(--gold);">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0;">📈 MONITOR DE VALOR CHC/WLD</h3>
        <div id="priceBadge" style="background: var(--accent); color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 1.2em;">
            1 CHC = 0.00001 WLD
        </div>
    </div>
    <div style="display: flex; gap: 20px; margin-top: 15px; text-align: left;">
        <div style="flex: 1;">
            <label>ÚLTIMO HASH DE PRECIO (NODO)</label>
            <div id="priceHash" class="address-display" style="color: var(--gold); border-color: var(--gold-dark);">
                HASH_PRICE_INIT_0000000000000000
            </div>
        </div>
        <div style="width: 150px; text-align: center;">
            <label>TENDENCIA</label>
            <div id="trend" style="color: var(--accent); font-size: 20px;">▲ ESTABLE</div>
        </div>
    </div>
</div>

<!-- Debajo de tu script anterior, actualiza las funciones de intercambio -->
<script>
    // Variables de Estado de Mercado
    let currentPrice = 0.00001; // Precio base: 1 WLD / 100,000 CHC
    let lastHash = "HASH_PRICE_INIT_0000000000000000";

    async function actualizarPrecioNodo(tipo, cantidad) {
        // Lógica de Impacto en el Precio:
        // Compra sube el precio, Venta lo baja un 1% por cada unidad de WLD
        const impacto = (cantidad * 0.01); 
        if (tipo === 'BUY') {
            currentPrice += (currentPrice * impacto);
        } else {
            currentPrice -= (currentPrice * impacto);
        }

        // Actualizar UI
        document.getElementById('priceBadge').innerText = `1 CHC = ${currentPrice.toFixed(8)} WLD`;
        document.getElementById('trend').innerHTML = tipo === 'BUY' ? '▲ ALCISTA' : '▼ BAJISTA';
        document.getElementById('trend').style.color = tipo === 'BUY' ? 'var(--accent)' : 'var(--danger)';

        // Enviar Hash Extra al Nodo
        try {
            const res = await fetch(`${NODO_URL}/update-price`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    price: currentPrice,
                    type: tipo,
                    volume: cantidad,
                    auth: "CHARLYSCAN_ORACLE_SECURE"
                })
            });
            const data = await res.json();
            document.getElementById('priceHash').innerText = data.price_hash;
        } catch (e) {
            // Hash simulado para visualización si el nodo está offline
            lastHash = "0x" + Math.random().toString(16).slice(2) + "VALUACION";
            document.getElementById('priceHash').innerText = lastHash;
        }
    }

    // Modificamos tu función execSwap anterior para incluir el oráculo
    async function execSwap(type) {
        if(!userAccount) return alert("Conecta tu wallet");
        const amt = parseFloat(document.getElementById('bridgeInput').value);
        if(!amt || amt <= 0) return alert("Cantidad inválida");

        document.getElementById('bridgeStatus').innerText = "Generando Hash de Valuación...";
        
        // 1. Ejecutar el Bridge
        await fetch(`${NODO_URL}/bridge-request`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ type, amount: amt, user: userAccount })
        });

        // 2. Ejecutar la actualización de precio (El Hash Extra que pediste)
        actualizarPrecioNodo(type, amt);

        alert(`Solicitud procesada. El CHC ahora vale ${currentPrice.toFixed(8)} WLD`);
    }
</script>
</body>
</html>
