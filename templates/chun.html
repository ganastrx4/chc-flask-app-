<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --gold: #f1c40f; --iron: #bdc3c7; --bg: #121212; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        
        /* Moneda 3D */
        .coin-container { perspective: 1000px; width: 150px; height: 150px; margin: 30px auto; }
        #coin { 
            width: 100%; height: 100%; position: relative; 
            transform-style: preserve-3d; 
            transition: transform 4s cubic-bezier(0.1, 0.5, 0.1, 1); 
        }
        .side { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            backface-visibility: hidden; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; border: 4px solid var(--gold); 
        }
        .cara { background: linear-gradient(135deg, var(--gold), #d4af37); color: black; }
        .aguila { background: linear-gradient(135deg, var(--iron), #2c3e50); transform: rotateY(180deg); }

        /* Interfaz */
        .wallet-input { 
            width: 80%; max-width: 400px; padding: 12px; border-radius: 8px; 
            border: 1px solid #444; background: #222; color: #00ff00; 
            font-family: monospace; font-size: 10px; margin-bottom: 20px;
        }
        .btn { 
            padding: 12px 25px; border-radius: 25px; border: none; cursor: pointer; 
            font-weight: bold; text-transform: uppercase; margin: 10px;
        }
        .btn-play { background: var(--gold); color: black; }
        .btn-home { background: #333; color: white; text-decoration: none; display: inline-block; }
        #status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <h2>RED CHARLYSCAN: SORTEO CHC</h2>
    
    <!-- Botón de regreso a la App Principal -->
    <a href="https://binance-bot-2kbp.onrender.com/" class="btn btn-home">🏠 VOLVER A CASA</a>

    <div class="coin-container">
        <div id="coin">
            <div class="side cara">CHC<br>CARA</div>
            <div class="side aguila">CHC<br>ÁGUILA</div>
        </div>
    </div>

    <div>
        <p>Introduce tu dirección de CharlyMiner:</p>
        <input type="text" id="userWallet" class="wallet-input" 
               placeholder="Ej: 6b32cd3910223ee7cf28a4046859761918988e1e72eeb3dd77..." />
    </div>

    <button class="btn btn-play" onclick="jugar()">LANZAR MONEDA (4s)</button>
    
    <div id="status">Esperando lanzamiento...</div>

<script>
    const MASTER_PUBLIC = "93aab2b2ee274042d81954cd6569085ac3f1f660d600e6c7ca3aa11adbf94e62544ff783541316f3c7269d751079414e879f18804dde24c1b83c70c4e13cd4ee";
    const NODO_URL = "https://binance-bot-hna7.onrender.com";

    async function jugar() {
        const wallet = document.getElementById('userWallet').value.trim();
        const status = document.getElementById('status');
        const coin = document.getElementById('coin');

        if (wallet.length < 10) {
            alert("Por favor, ingresa una dirección de minero válida.");
            return;
        }

        // Lógica de resultado
        const gana = Math.random() < 0.5;
        const totalRotation = 3600 + (gana ? 0 : 180);
        
        status.innerText = "Sincronizando con CharlyScan...";
        coin.style.transform = `rotateY(${totalRotation}deg)`;

        // Esperar los 4 segundos de la animación
        setTimeout(async () => {
            if (gana) {
                status.innerHTML = "<span style='color:#00ff00'>¡CARA! Enviando recompensa...</span>";
                
                // Petición interna al nodo hna7 (CharlyScan)
                try {
                    const response = await fetch(`${NODO_URL}/transferir`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            emisor: MASTER_PUBLIC,
                            receptor: wallet,
                            monto: 18.0,
                            firma: "SISTEMA_AUTO_SORTEO" // El nodo debe permitir esta firma interna
                        })
                    });
                    
                    const resData = await response.json();
                    status.innerText = "Éxito: " + (resData.mensaje || "CHC Enviados");
                } catch (err) {
                    status.innerHTML = "<span style='color:red'>Error de conexión con el nodo hna7</span>";
                }
            } else {
                status.innerHTML = "<span style='color:#ff4444'>ÁGUILA - Inténtalo de nuevo</span>";
            }
        }, 4000);
    }
</script>
</body>
</html>
