<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyScan | Multichain Bridge & Casino</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #050505; --card: #121212; --accent: #2ecc71; --danger: #e74c3c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 20px; width: 100%; max-width: 450px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { color: var(--gold); margin-top: 0; display: flex; justify-content: space-between; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; box-sizing: border-box; font-family: monospace; }
        input:focus { border-color: var(--gold); outline: none; }
        /* El input de CHC ahora es editable y resalta en verde */
        #userCHCWallet { border-color: var(--accent); color: var(--accent); }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-connect { background: #3498db; color: white; margin-bottom: 20px; max-width: 450px; }
        .btn-buy { background: var(--accent); color: black; }
        .btn-sell { background: var(--danger); color: white; }
        .address-box { background: #000; padding: 10px; border-radius: 5px; font-size: 10px; color: var(--gold); border: 1px dashed #444; margin: 10px 0; word-break: break-all; }
        .status { font-size: 12px; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 2px;">CHARLY<span style="color:var(--gold)">SCAN</span> PROJECT</h2>

    <!-- 1. CONEXIÓN WEB3 (Solo para Redes Externas) -->
    <button class="btn btn-connect" id="btnWeb3" onclick="connectExternalWallet()">
        🔗 CONECTAR BILLETERA EXTERNA (METAMASK/TRUST)
    </button>

    <!-- 2. BILLETERA CHC (ID DEL JUEGO) -->
    <div class="card" style="border: 1px solid var(--accent);">
        <h3 style="color: var(--accent);">🆔 IDENTIDAD CHARLYSCAN</h3>
        <div class="input-group">
            <label>INGRESA TU DIRECCIÓN DE MINERO O NODO (PARA RECIBIR CHC)</label>
            <input type="text" id="userCHCWallet" placeholder="Pega aquí tu dirección de CharlyScan..." />
        </div>
        <div class="status">Esta billetera recibirá los CHC de tus compras y premios.</div>
    </div>

    <!-- 3. BRIDGE MULTICHAIN -->
    <div class="card">
        <h3>💱 BRIDGE MULTICHAIN</h3>
        <div class="input-group">
            <label>RED DE PAGO (EXTERNA)</label>
            <select id="netSelect" onchange="updateNet()">
                <option value="ETH" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">Ethereum (ETH)</option>
                <option value="BTC" data-addr="bc1qg6d27ghf4v26sc87r06798j56qf6vjuxr3fzv4">Bitcoin (BTC)</option>
                <option value="SOL" data-addr="CJrnbCpnYfU8p4L1KxWv8rZ5m1k7f9rZ5m1k7f9rZ8tx">Solana (SOL)</option>
                <option value="WLD" data-addr="0x2cFc85d8E48F8EAB294be644d9E25C3030863003">World Chain (WLD)</option>
                <option value="BNB" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">BNB Chain (BNB)</option>
            </select>
        </div>

        <label>DIRECCIÓN DE DEPÓSITO DEL NODO:</label>
        <div id="depositoAddr" class="address-box">0xd4508db1aDC48deA121f356B254a7155DDAB36Ae</div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex:1">
                <label>ENVIAR (EXTERNO)</label>
                <input type="number" id="amtIn" step="0.001" placeholder="0.0" oninput="calc(this.value)">
            </div>
            <div class="input-group" style="flex:1">
                <label>RECIBIR (CHC)</label>
                <input type="text" id="amtOut" readonly placeholder="0">
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="btn btn-buy" onclick="handleSwap('BUY')">COMPRAR CHC</button>
            <button class="btn btn-sell" onclick="handleSwap('SELL')">VENDER CHC</button>
        </div>
        <div id="bridgeStatus" class="status">Listo para operar.</div>
    </div>

<script>
    const NODO_URL = "https://binance-bot-hna7.onrender.com";
    const CHC_RATE = 100000;
    let externalAccount = null;

    // Conectar Wallet Externa (MetaMask, etc)
    async function connectExternalWallet() {
        if (window.ethereum) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                externalAccount = accounts[0];
                document.getElementById('btnWeb3').innerText = "✅ CONECTADO: " + externalAccount.substring(0,6) + "...";
                document.getElementById('btnWeb3').style.background = "#2ecc71";
            } catch (e) { alert("Error al conectar wallet externa"); }
        } else { alert("Instala una billetera Web3 (MetaMask)"); }
    }

    function updateNet() {
        const sel = document.getElementById('netSelect');
        document.getElementById('depositoAddr').innerText = sel.options[sel.selectedIndex].getAttribute('data-addr');
    }

    function calc(v) {
        document.getElementById('amtOut').value = Math.floor(v * CHC_RATE).toLocaleString() + " CHC";
    }

    async function handleSwap(type) {
        const chcWallet = document.getElementById('userCHCWallet').value.trim();
        const amount = document.getElementById('amtIn').value;
        const status = document.getElementById('bridgeStatus');

        if (!chcWallet) return alert("Error: Ingresa tu billetera de CharlyScan (CHC) para saber a dónde enviar los fondos.");
        if (!amount || amount <= 0) return alert("Ingresa un monto válido.");
        if (type === 'BUY' && !externalAccount) return alert("Conecta tu billetera externa para confirmar el origen del pago.");

        status.innerText = "Sincronizando con el nodo...";

        try {
            // Intentar avisar al nodo
            const response = await fetch(`${NODO_URL}/bridge-request`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    type: type,
                    chc_dest: chcWallet,
                    ext_wallet: externalAccount || "MANUAL_PAY",
                    net: document.getElementById('netSelect').value,
                    amount: amount
                })
            });
            
            alert("Solicitud registrada. El nodo validará el Hash en la red una vez realices el envío.");
        } catch (err) {
            // Si el nodo falla, mostramos una instrucción clara para no detener al usuario
            console.warn("Nodo offline, usando respaldo local.");
            status.innerHTML = `<b style="color:var(--gold)">AVISO:</b> Realiza el envío a la dirección mostrada y guarda tu comprobante. El nodo procesará tu dirección CHC automáticamente al detectar el pago.`;
        }
    }
</script>
</body>
</html>
