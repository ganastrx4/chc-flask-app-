<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyScan | Casino & Liquidity Pool Bridge</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #050505; --card: #121212; --accent: #2ecc71; --danger: #e74c3c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        /* Contenedores */
        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 20px; width: 100%; max-width: 480px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { color: var(--gold); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* Juego de la Moneda */
        .coin-container { perspective: 1000px; width: 120px; height: 120px; margin: 15px auto; }
        #coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 3s cubic-bezier(0.1, 0.5, 0.1, 1); }
        .side { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 4px solid var(--gold); background: linear-gradient(135deg, var(--gold), #d4af37); color: black; }
        .aguila { transform: rotateY(180deg); background: #333; color: var(--gold); }

        /* Inputs y Botones */
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; box-sizing: border-box; font-family: monospace; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-web3 { background: #3498db; color: white; margin-bottom: 15px; }
        .btn-play { background: var(--gold); color: black; }
        .btn-bridge { background: var(--accent); color: black; }
        
        .status { font-size: 12px; margin-top: 10px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 2px;">CHARLY<span style="color:var(--gold)">SCAN</span> PROJECT</h2>

    <!-- 1. JUEGO DE LA MONEDA -->
    <div class="card">
        <h3>🎰 CASINO CHC</h3>
        <div class="coin-container">
            <div id="coin">
                <div class="side cara">CHC</div>
                <div class="side aguila">CASA</div>
            </div>
        </div>
        <div class="input-group">
            <label>DIRECCIÓN CHC DEL USUARIO (RECIBE PREMIOS)</label>
            <input type="text" id="userCHC" placeholder="Tu wallet CharlyScan...">
        </div>
        <div class="input-group">
            <label>APUESTA (1-300 CHC)</label>
            <input type="number" id="betAmount" value="1">
        </div>
        <button class="btn btn-play" onclick="lanzarMoneda()">APOSTAR Y LANZAR</button>
        <div id="gameStatus" class="status" style="color: #888;">Introduce tu wallet para jugar</div>
    </div>

    <!-- 2. BRIDGE POR TRANSFERENCIA DIRECTA -->
    <div class="card">
        <h3>💱 ENVÍO A POOL (BUY CHC)</h3>
        <button class="btn btn-web3" id="connectBtn" onclick="connectWeb3()">🔗 CONECTAR WALLET EXTERNA</button>
        
        <div class="input-group">
            <label>RED DE ENVÍO (USER -> POOL)</label>
            <select id="network" onchange="updatePool()">
                <option value="WLD" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">World Chain (WLD)</option>
                <option value="BNB" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">BNB Chain (BNB)</option>
                <option value="ETH" data-addr="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae">Ethereum (ETH)</option>
                <option value="SOL" data-addr="CJrnbCpnYfU8p4L1KxWv8rZ5m1k7f9rZ5m1k7f9rZ8tx">Solana (SOL)</option>
            </select>
        </div>

        <div class="input-group">
            <label>POOL DE RECEPCIÓN (CHARLYSCAN)</label>
            <input type="text" id="poolAddr" value="0xd4508db1aDC48deA121f356B254a7155DDAB36Ae" readonly style="color:var(--gold)">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex:1">
                <label>ENVIAR CRIPTO</label>
                <input type="number" id="sendAmt" step="0.001" placeholder="0.0" oninput="calcCHC(this.value)">
            </div>
            <div class="input-group" style="flex:1">
                <label>RECIBES CHC</label>
                <input type="text" id="receiveCHC" readonly placeholder="0">
            </div>
        </div>

        <button class="btn btn-bridge" onclick="transferirAPool()">AUTORIZAR ENVÍO Y COMPRAR</button>
        <div id="bridgeStatus" class="status">Detección de Hash activada</div>
    </div>

<script>
    const NODO_URL = "https://binance-bot-hna7.onrender.com";
    const RATE = 100000;
    let userExternalAccount = null;

    // --- LÓGICA WEB3 ---
    async function connectWeb3() {
        if (window.ethereum) {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userExternalAccount = accounts[0];
            document.getElementById('connectBtn').innerText = "✅ " + userExternalAccount.substring(0,10) + "...";
            document.getElementById('connectBtn').style.background = "#2ecc71";
        }
    }

    function updatePool() {
        const sel = document.getElementById('network');
        document.getElementById('poolAddr').value = sel.options[sel.selectedIndex].getAttribute('data-addr');
    }

    function calcCHC(v) {
        document.getElementById('receiveCHC').value = (v * RATE).toLocaleString() + " CHC";
    }

    // --- FUNCIÓN DE ENVÍO DIRECTO ---
    async function transferirAPool() {
        const amount = document.getElementById('sendAmt').value;
        const destPool = document.getElementById('poolAddr').value;
        const chcWallet = document.getElementById('userCHC Wallet').value;

        if (!userExternalAccount || !amount || !chcWallet) {
            return alert("Completa: Conexión Wallet, Monto y Dirección CHC de destino.");
        }

        try {
            // 1. Detectar el envío desde la Wallet del Usuario a la Pool
            const web3 = new Web3(window.ethereum);
            const weiValue = web3.utils.toWei(amount, 'ether');

            document.getElementById('bridgeStatus').innerText = "Esperando firma de envío...";

            const tx = await web3.eth.sendTransaction({
                from: userExternalAccount,
                to: destPool,
                value: weiValue
            });

            // 2. Al detectar el Hash de salida, notificamos al Nodo para que libere CHC
            if (tx.transactionHash) {
                document.getElementById('bridgeStatus').innerHTML = `ENVÍO DETECTADO: <br> <small>${tx.transactionHash}</small>`;
                
                await fetch(`${NODO_URL}/bridge-confirm`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        hash: tx.transactionHash,
                        from: userExternalAccount,
                        to: destPool,
                        chc_dest: chcWallet,
                        amount: amount,
                        network: document.getElementById('network').value
                    })
                });
                alert("Pago detectado por el Pool. El Nodo está enviando tus CHC.");
            }
        } catch (e) {
            document.getElementById('bridgeStatus').innerText = "Error en la transacción o usuario canceló.";
        }
    }

    // --- JUEGO DE LA MONEDA ---
    function lanzarMoneda() {
        const wallet = document.getElementById('userCHC').value;
        const bet = document.getElementById('betAmount').value;
        const coin = document.getElementById('coin');
        const status = document.getElementById('gameStatus');

        if (!wallet) return alert("Ingresa tu wallet CHC para jugar.");

        status.innerText = "Lanzando...";
        const gana = Math.random() > 0.5;
        const rotation = 1800 + (gana ? 0 : 180);
        
        coin.style.transform = `rotateY(${rotation}deg)`;

        setTimeout(async () => {
            status.innerHTML = gana ? `<span style="color:var(--accent)">GANASTE +${bet} CHC</span>` : `<span style="color:var(--danger)">CASA GANA -${bet} CHC</span>`;
            
            // Registrar en Nodo
            fetch(`${NODO_URL}/casino-result`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user: wallet, amount: bet, win: gana })
            });
        }, 3000);
    }
</script>
</body>
</html>
