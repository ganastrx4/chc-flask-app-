<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trading y Criptomonedas</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

h1{
    text-align:center;
    color:#38bdf8;
}

#videos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
    margin-top:30px;
}

.video{
    background:#1e293b;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.video:hover{
    transform:scale(1.03);
}

.video img{
    width:100%;
}

.info{
    padding:15px;
}

.title{
    font-size:18px;
    margin-bottom:10px;
}

.date{
    color:#94a3b8;
    font-size:14px;
}

a{
    text-decoration:none;
    color:white;
}

</style>
</head>

<body>

<h1>Videos de Trading y Criptomonedas</h1>

<div id="videos">
    Cargando videos...
</div>

<script>

// ===============================
// PALABRAS CLAVE
// ===============================

const keywords = [
    "trading",
    "bitcoin",
    "btc",
    "crypto",
    "criptomoneda",
    "criptomonedas",
    "ethereum",
    "mineria",
    "minería",
    "blockchain"
];

// ===============================
// RSS DEL CANAL
// ===============================

const CHANNEL_ID = "UC8M5R4M9fO4M4Y5f7zQ8K4Q";

const rss =
`https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;

// Proxy CORS
const url =
`https://api.allorigins.win/raw?url=${encodeURIComponent(rss)}`;

// ===============================
// CARGAR VIDEOS
// ===============================

async function cargarVideos(){

    try{

        const response = await fetch(url);

        const xmlText = await response.text();

        const parser = new DOMParser();

        const xml = parser.parseFromString(xmlText,"text/xml");

        const entries = xml.querySelectorAll("entry");

        const contenedor = document.getElementById("videos");

        contenedor.innerHTML = "";

        let encontrados = 0;

        entries.forEach(entry => {

            const title =
                entry.querySelector("title")?.textContent || "";

            const link =
                entry.querySelector("link")?.getAttribute("href") || "";

            const published =
                entry.querySelector("published")?.textContent || "";

            const videoId =
                entry.querySelector("videoId")?.textContent || "";

            const text = title.toLowerCase();

            const valido = keywords.some(keyword =>
                text.includes(keyword)
            );

            if(valido){

                encontrados++;

                const thumb =
                `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

                contenedor.innerHTML += `

                <a href="${link}" target="_blank">

                    <div class="video">

                        <img src="${thumb}">

                        <div class="info">

                            <div class="title">
                                ${title}
                            </div>

                            <div class="date">
                                ${new Date(published).toLocaleString()}
                            </div>

                        </div>

                    </div>

                </a>

                `;
            }

        });

        if(encontrados === 0){

            contenedor.innerHTML =
            "<h2>No hay videos relacionados.</h2>";
        }

    }catch(error){

        console.log(error);

        document.getElementById("videos").innerHTML =
        "<h2>Error cargando videos.</h2>";
    }
}

// ===============================
// INICIO
// ===============================

cargarVideos();

// ===============================
// ACTUALIZA CADA 5 MINUTOS
// ===============================

setInterval(cargarVideos, 300000);

</script>

</body>
</html>
```
