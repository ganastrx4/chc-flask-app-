<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Canal Crypto & Trading</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    font-family:'Poppins',sans-serif;
    color:white;
    padding:40px;
}

/* ========================= */
/* TITULO */
/* ========================= */

h1{
    text-align:center;
    font-size:42px;
    margin-bottom:40px;
    font-weight:700;
    background:linear-gradient(90deg,#00f0ff,#00ff88);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ========================= */
/* GRID */
/* ========================= */

#videos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,350px));
    justify-content:center;
    gap:30px;
}

/* ========================= */
/* CARD */
/* ========================= */

.card{
    width:350px;
    height:350px;
    background:#0f172a;
    border-radius:22px;
    overflow:hidden;
    position:relative;
    transition:0.35s;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
        0 10px 30px rgba(0,0,0,0.5),
        0 0 20px rgba(0,255,200,0.05);
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:
        0 20px 40px rgba(0,0,0,0.7),
        0 0 25px rgba(0,255,255,0.25);
}

/* ========================= */
/* IMAGEN */
/* ========================= */

.thumb{
    width:100%;
    height:200px;
    object-fit:cover;
}

/* ========================= */
/* INFO */
/* ========================= */

.info{
    padding:18px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    height:150px;
}

.title{
    font-size:18px;
    line-height:1.4;
    font-weight:600;
    color:white;

    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.date{
    margin-top:15px;
    color:#94a3b8;
    font-size:14px;
}

/* ========================= */
/* BOTON */
/* ========================= */

.watch{
    margin-top:15px;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    border:none;
    color:white;
    padding:10px 16px;
    border-radius:12px;
    font-weight:600;
    transition:0.3s;
    text-align:center;
}

.card:hover .watch{
    background:linear-gradient(90deg,#00ffae,#00b7ff);
}

/* ========================= */
/* LINKS */
/* ========================= */

a{
    text-decoration:none;
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:500px){

    body{
        padding:20px;
    }

    h1{
        font-size:28px;
    }

    #videos{
        grid-template-columns:1fr;
    }

    .card{
        width:100%;
    }

}

</style>

</head>

<body>

<h1>Trading & Criptomonedas</h1>

<div id="videos">

    Cargando videos...

</div>

<script>

// ==========================================
// RSS DEL CANAL
// ==========================================

const CHANNEL_ID = "UC8M5R4M9fO4M4Y5f7zQ8K4Q";

const rss =
`https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;

// Proxy CORS
const url =
`https://api.allorigins.win/raw?url=${encodeURIComponent(rss)}`;

// ==========================================
// CARGAR VIDEOS
// ==========================================

async function cargarVideos(){

    try{

        const response = await fetch(url);

        const xmlText = await response.text();

        const parser = new DOMParser();

        const xml = parser.parseFromString(xmlText,"text/xml");

        const entries = xml.querySelectorAll("entry");

        const contenedor = document.getElementById("videos");

        contenedor.innerHTML = "";

        entries.forEach(entry => {

            const title =
                entry.querySelector("title")?.textContent || "";

            const link =
                entry.querySelector("link")?.getAttribute("href") || "";

            const published =
                entry.querySelector("published")?.textContent || "";

            const videoId =
                entry.querySelector("videoId")?.textContent || "";

            const thumb =
                `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

            contenedor.innerHTML += `

            <a href="${link}" target="_blank">

                <div class="card">

                    <img class="thumb" src="${thumb}">

                    <div class="info">

                        <div>

                            <div class="title">
                                ${title}
                            </div>

                            <div class="date">
                                ${new Date(published).toLocaleDateString()}
                            </div>

                        </div>

                        <div class="watch">
                            VER VIDEO
                        </div>

                    </div>

                </div>

            </a>

            `;

        });

    }catch(error){

        console.log(error);

        document.getElementById("videos").innerHTML = `
            <h2 style="text-align:center;color:red;">
                Error cargando videos
            </h2>
        `;
    }
}

// ==========================================
// INICIO
// ==========================================

cargarVideos();

// ==========================================
// ACTUALIZA AUTOMATICAMENTE
// ==========================================

setInterval(cargarVideos,300000);

</script>

</body>

</html>
