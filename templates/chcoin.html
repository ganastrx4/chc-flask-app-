<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promociona tu Proyecto | Minería CHC</title>
  <style>
    body { text-align: center; padding: 20px; font-family: Arial, sans-serif; background: #f4f4f4; }
    #iframeContainer { width: 100%; height: 500px; border: 2px solid #ccc; margin-top: 20px; overflow: hidden; border-radius: 10px; background: white; }
    iframe { width: 100%; height: 100%; border: none; }
    
    .card-panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    input, button { margin: 10px; padding: 12px; width: 85%; border-radius: 5px; border: 1px solid #ccc; }
    
    button { background-color: #4CAF50; color: white; cursor: pointer; font-size: 16px; font-weight: bold; border: none; }
    button:hover { background-color: #45a049; }
    .btn-stop { background-color: #e74c3c; }
    
    .nota { color: #d35400; font-weight: bold; font-size: 0.9em; }
    .wallet-link { color: #2980b9; font-weight: bold; text-decoration: none; display: block; margin: 10px 0; }
    #statusMineria { font-weight: bold; color: #2c3e50; margin: 10px; }
  </style>
</head>
<body>

<div class="card-panel">
    <h2>Promociona tu Proyecto</h2>
    <p class="nota">Costo: 1 WLD o 135,371 CHUN</p>
    <p>Destino: <code>0xdc178d65c502f9589bb1a35af08b5723f85ec168</code></p>
    
    <input type="text" id="userWallet" placeholder="Tu Billetera CHC para recibir ganancias" />
    <a href="https://github.com/ganastrx4/binance-bot/releases/download/v1.0/charlycoin_miner.exe" class="wallet-link">
        ¿No tienes billetera? Descarga el Minero aquí (Usa Opción 3)
    </a>

    <input type="text" id="urlPromocion" placeholder="URL de tu sitio a promocionar" />
    <button onclick="guardarDatos()">Comprar Publicidad</button>
</div>

<div id="statusMineria">Minería Iniciada: 0 CHC ganados</div>

<div id="iframeContainer">
  <iframe id="iframeRedireccion" src=""></iframe>
</div>

<div style="margin-top: 20px; margin-bottom: 80px;">
    <button class="btn-stop" onclick="pararMineria()">Detener Minería y Reclamar</button>
    <button onclick="continuarMineria()">Continuar Minería</button>
</div>

<script>
  let tiempoTotal = 0;
  let interval;
  let minando = true;
  const NODO_URL = "https://binance-bot-hna7.onrender.com";
  const MASTER_PUBLIC = "93aab2b2ee274042d81954cd6569085ac3f1f660d600e6c7ca3aa11adbf94e62544ff783541316f3c7269d751079414e879f18804dde24c1b83c70c4e13cd4ee";

  const urls = [
    "https://tareasunamyunadm.blogspot.com",
    "https://faucentminialtcrypto.blogspot.com",
    "https://solotareasmex.blogspot.com",
    "https://juegospcmexico.blogspot.com"
  ];

  function redireccionAleatoria() {
    const urlRedireccion = urls[Math.floor(Math.random() * urls.length)];
    document.getElementById('iframeRedireccion').src = urlRedireccion;
    setTimeout(redireccionAleatoria, 15000);
  }
  redireccionAleatoria();

  // Función principal para enviar CHC desde el nodo
  async function pagarDesdeNodo(receptor, monto) {
    try {
      await fetch(`${NODO_URL}/transferir`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          emisor: MASTER_PUBLIC,
          receptor: receptor,
          monto: monto,
          firma: "WEB_MINER_DIRECT_PAY"
        })
      });
      console.log(`Pago de ${monto} CHC enviado a ${receptor}`);
    } catch (e) {
      console.error("Error al conectar con el nodo");
    }
  }

  function contarTiempo() {
    if (minando && !document.hidden) {
      tiempoTotal++;
      document.getElementById('statusMineria').innerText = `Minería Activa: ${Math.floor(tiempoTotal/100)} CHC acumulados`;
      
      // Pago directo cada 100 segundos
      if (tiempoTotal % 100 === 0) {
        const wallet = document.getElementById('userWallet').value.trim();
        if (wallet.length > 10) {
            pagarDesdeNodo(wallet, 1);
            alert("¡Has ganado 1 CHC! Enviado directamente a tu billetera.");
        } else {
            alert("¡Ganaste 1 CHC! Pero necesitas colocar tu billetera para recibirlo.");
        }
      }
    }
  }

  interval = setInterval(contarTiempo, 1000);

  function pararMineria() {
    minando = false;
    clearInterval(interval);
    const gananciaFinal = Math.floor(tiempoTotal / 100);
    alert(`Minería detenida. Total ganado esta sesión: ${gananciaFinal} CHC`);
  }

  function continuarMineria() {
    if (!minando) {
      minando = true;
      interval = setInterval(contarTiempo, 1000);
      alert("Minería reanudada.");
    }
  }

  function guardarDatos() {
    const wallet = document.getElementById('userWallet').value;
    const url = document.getElementById('urlPromocion').value;
    if (!wallet || !url) return alert('Completa tu billetera y la URL.');
    alert('Solicitud enviada. Procesa tu pago de 1 WLD para activar la publicidad.');
  }
</script>

<nav class="bottom-nav">
    <a href="#" class="nav-item"><span>DONA</span></a>
    <a href="#" class="nav-item"><span>GRAFICA</span></a>
    <a href="#" class="nav-item"><span>RECLAMA</span></a>
</nav>

<style>
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #2c2c3e; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--gold); }
    .nav-item { color: white; text-decoration: none; font-size: 14px; font-weight: bold; }
</style>

</body>
</html>
