<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CHC - CharlyCoin</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:#fff;
font-family:sans-serif;
}

.card{
width:300px;
padding:30px;
text-align:center;
border:1px solid #00bcd4;
border-radius:20px;
background:#111;
}

button{
width:100%;
padding:15px;
border-radius:50px;
border:none;
background:#00bcd4;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

#status{
margin-top:15px;
font-size:13px;
color:#00bcd4;
min-height:35px;
}
</style>
</head>
<body>

<div class="card">
<h1>CHC 🌍</h1>

<button id="btnLogin">ENTRAR</button>
<button id="btnSend">ENVIAR 0.1 WLD</button>

<div id="status">Iniciando...</div>
</div>

<script type="module">

import { MiniKit } from "https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js/+esm";

const status = document.getElementById("status");

async function init(){

try{

await MiniKit.install();

status.innerText = "MiniKit listo ✅";

}catch(e){

console.log(e);
status.innerText = "Error iniciando";

}

}

/* LOGIN FIX */
document.getElementById("btnLogin").onclick = async ()=>{

try{

status.innerText = "Abriendo login...";

/* requestId único SIEMPRE */
const result = await MiniKit.walletAuth({

nonce: Date.now().toString(),

requestId: "login-" + Date.now(),

expirationTime: new Date(Date.now()+5*60000).toISOString(),

notBefore: new Date().toISOString(),

statement: "Ingresar a CharlyCoin"

});

console.log(result);

/* respuesta real */
if(result?.finalPayload){

status.innerText = "Acceso correcto ✅";

setTimeout(()=>{
window.location.href="buscador2.html";
},1000);

}else{

status.innerText = "Cancelado";

}

}catch(e){

console.log(e);
status.innerText = "Error login";

}

};

/* PAY FIX */
document.getElementById("btnSend").onclick = async ()=>{

try{

status.innerText = "Abriendo pago...";

await MiniKit.pay({

reference:"pay-" + Date.now(),

to:"0xdc178d65c502f9589bb1a35af08b5723f85ec168",

tokens:[
{
symbol:"WLD",
token_amount:"0.1"
}
],

description:"Pago CHC"

});

status.innerText = "Pago enviado ✅";

}catch(e){

console.log(e);
status.innerText = "Pago cancelado";

}

};

init();

</script>
</body>
</html>
