<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CharlyCoin - World ID</title>

<script src="https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js@latest/dist/minikit.js"></script>

<style>
body {
    background: #080808;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.card {
    background: #111;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
}
button {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>CharlyCoin</h2>
    <p>Verifica tu humanidad con World ID</p>
    <button onclick="login()" id="btn">Conectar World ID</button>
</div>

<script>

// ==========================================
// 🔗 TU BACKEND (IMPORTANTE)
// ==========================================
const API = "https://binance-bot-2kbp.onrender.com";

// ==========================================
// INIT MINIKIT
// ==========================================
window.addEventListener("load", () => {
    if (window.MiniKit) {
        window.MiniKit.install('app_7686f9027d3e3c0b53d987a3caf1e111');
        console.log("MiniKit activo");
    } else {
        console.log("Modo navegador normal");
    }

    checkReturnFromWorld();
});

// ==========================================
// LOGIN HÍBRIDO (PRO)
// ==========================================
async function login() {

    const btn = document.getElementById("btn");
    btn.innerText = "Conectando...";
    btn.disabled = true;

    try {

        // ===============================
        // 🔥 MODO WORLD APP (walletAuth REAL)
        // ===============================
        if (window.MiniKit) {

            // 🔥 Obtener firma del backend
            const rp = await fetch(API + "/api/rp-signature", {
                method: "POST"
            }).then(r => r.json());

            // 🔥 DISPARA MODAL REAL (como ORO)
            const { finalPayload } = await MiniKit.commands.walletAuth({
                nonce: rp.nonce,
                requestId: crypto.randomUUID(),

                // 🔥 CLAVE PARA QUE NO FALLE
                signature: rp.signature,

                expirationTime: new Date(rp.expires_at * 1000),
                notBefore: new Date(rp.created_at * 1000),

                statement: "Login CharlyCoin"
            });

            if (finalPayload) {
                await verify(finalPayload);
            }

        }

        // ===============================
        // 🌍 MODO WEB NORMAL (fallback)
        // ===============================
        else {

            localStorage.setItem("verify", "1");

            const url = "https://worldcoin.org/verify?t=wld&i=cd209cbb-162b-4a11-adb7-5b3b1133ed34&k=FunGjCr3o%2Fm3zlUDif7q6jbxazyCgb9K6wd4vD8YFUY%3D";

            window.location.href = url;
        }

    } catch (e) {
        console.error(e);
        alert("Error en conexión");
    }

    btn.innerText = "Conectar World ID";
    btn.disabled = false;
}

// ==========================================
// 🔐 VERIFICAR BACKEND
// ==========================================
async function verify(payload) {

    const res = await fetch(API + "/api/verify-proof", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });

    const result = await res.json();

    if (result.success) {
        window.location.replace("/panel.html");
    } else {
        alert("Falló verificación");
    }
}

// ==========================================
// 🔁 DETECTAR REGRESO (WEB)
// ==========================================
async function checkReturnFromWorld() {

    const params = new URLSearchParams(window.location.search);
    const proof = params.get("proof");

    if (proof || localStorage.getItem("verify")) {

        localStorage.removeItem("verify");

        await fetch(API + "/api/verify-proof", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ proof })
        });

        window.location.replace("/panel.html");
    }
}

</script>

</body>
</html>
