<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>CHC - CharlyCoin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#111,#000 70%);
font-family:'Segoe UI',Arial,sans-serif;
color:#fff;
overflow:hidden;
}

/* Fondo app */
.card{
width:340px;
padding:34px 24px;
border-radius:26px;
background:rgba(18,18,18,.96);
border:1px solid rgba(0,188,212,.35);
box-shadow:0 0 28px rgba(0,188,212,.16);
text-align:center;
}

.logo{
font-size:40px;
margin-bottom:8px;
}

h1{
font-size:30px;
color:#00bcd4;
margin-bottom:8px;
}

.sub{
font-size:14px;
color:#aaa;
line-height:1.45;
}

/* MODAL BLANCO */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
justify-content:center;
align-items:flex-end;
z-index:999;
animation:fadeIn .25s ease;
}

.modal{
width:100%;
max-width:430px;
background:#fff;
color:#111;
border-radius:26px 26px 0 0;
padding:28px 22px 34px;
text-align:center;
box-shadow:0 -10px 35px rgba(0,0,0,.25);
animation:slideUp .28s ease;
}

.handle{
width:54px;
height:6px;
border-radius:99px;
background:#ddd;
margin:0 auto 18px;
}

.badge{
width:64px;
height:64px;
border-radius:50%;
background:#f3f3f3;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
margin:0 auto 14px;
}

.modal h2{
font-size:24px;
margin-bottom:8px;
}

.modal p{
font-size:15px;
color:#666;
line-height:1.45;
}

.check{
margin-top:16px;
font-size:14px;
color:#16a34a;
font-weight:700;
}

@keyframes slideUp{
from{transform:translateY(100%);}
to{transform:translateY(0);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.hide{
animation:fadeOut .25s forwards;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}
</style>
</head>

<body>

<div class="card">
<div class="logo">🌍</div>
<h1>CHC</h1>
<div class="sub">
Bienvenido a CharlyCoin<br>
Cargando experiencia segura...
</div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
<div class="modal">
<div class="handle"></div>
<div class="badge">🌍</div>
<h2>CharlyCoin</h2>
<p>Te damos la bienvenida a la app oficial.</p>
<div class="check">✔ Aplicación verificada</div>
</div>
</div>

<script type="module">

import { MiniKit } from "https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js/+esm";

const APP_ID = "app_7686f9027d3e3c0b53d987a3caf1e111";

async function start(){

try{
await MiniKit.install(APP_ID);
}catch(e){
console.log(e);
}

/* mostrar 2 segundos */
setTimeout(()=>{

document.getElementById("overlay").classList.add("hide");

/* ir a buscador2 */
setTimeout(()=>{
window.location.href = "buscador2.html";
},250);

},2000);

}

start();

</script>

</body>
</html>
