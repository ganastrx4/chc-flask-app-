<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyCoin - World ID 4.0</title>
    <style>
        body { margin: 0; height: 100vh; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        .card { padding: 40px; border-radius: 20px; border: 1px solid #00bcd4; text-align: center; }
        .btn { background: #00bcd4; border: none; padding: 15px; border-radius: 50px; cursor: pointer; width: 100%; font-weight: bold; }
        #status { margin-top: 20px; font-size: 0.8rem; color: #00bcd4; }
    </style>
</head>
<body>

<div class="card">
    <h1>CharlyCoin 🌍</h1>
    <button class="btn" id="btn-verify">Verificar con World ID 4.0</button>
    <p id="status"></p>
</div>

<script type="module">
    // Importamos IDKit Core para manejar el flujo manual de la 4.0
    import { IDKit, orbLegacy } from "https://esm.sh/@worldcoin/idkit-core";

    const btn = document.getElementById('btn-verify');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
        try {
            status.innerText = "Obteniendo firma del servidor...";

            // 1. Pedir firma al backend (Step 3)
            const sigRes = await fetch("/api/rp-signature", { method: "POST" });
            const rpSig = await sigRes.json();

            // 2. Iniciar solicitud a World ID (Step 4)
            status.innerText = "Conectando con World ID...";
            const request = await IDKit.request({
                app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
                action: "login",
                rp_context: {
                    rp_id: "TU_RP_ID_AQUI", // Reemplaza por el de tu panel
                    nonce: rpSig.nonce,
                    created_at: rpSig.created_at,
                    expires_at: rpSig.expires_at,
                    signature: rpSig.sig,
                },
                environment: "production" 
            }).preset(orbLegacy({ signal: "user-session-1" }));

            // 3. Abrir el modal y esperar (Step 4 & 5)
            // Nota: El conectorURI se genera aquí si necesitas mostrar un QR manual
            status.innerText = "Por favor, escanea el código en tu App World";
            
            const idkitResponse = await request.pollUntilCompletion();

            // 4. Enviar resultado al backend para validación final
            status.innerText = "Validando prueba...";
            const verifyRes = await fetch("/api/verify-proof", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(idkitResponse)
            });

            if (verifyRes.ok) {
                status.innerText = "¡Verificación Exitosa!";
                window.location.href = "buscador2.html";
            } else {
                status.innerText = "Error en la validación final.";
            }

        } catch (err) {
            console.error(err);
            status.innerText = "Error: " + err.message;
        }
    });
</script>
</body>
</html>
