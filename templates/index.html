<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyCoin (CHC) - Portal de Verificación</title>
    <!-- Cargando IDKit para el manejo de sesiones -->
    <script src="https://cdn.jsdelivr.net/npm/@worldcoin/idkit@latest/dist/idkit.js"></script>
    <style>
        :root {
            --bg-dark: #080808;
            --card-bg: #111111;
            --accent: #00d4ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .pro-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            border-radius: 28px;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .logo-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
            object-fit: cover;
        }

        .status-pill {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            font-size: 24px;
            margin: 10px 0;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn-verify {
            background: #ffffff;
            color: #000000;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        .btn-verify:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 10px;
            color: #333;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="pro-card">
        <div class="status-pill">Producción Activa • World ID 4.0</div>
        
        <div class="logo-container">
            <!-- Imagen restaurada según tu link -->
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrxQg1zxfSMxym0NKkic-2xp1gLjogCY4Bj1mnHI_DRYPtrObsqU7i2dVCNfvTag_mm_Muv8sPMVa557zUxLpOHYOT5Tw44s1P3ZkwxDiyRAD4MVpQGcf6QXCuUBcqJOWLC5-zVA5ujpnp0Qx3lxup8jo43wV5BciYd42eCHz27QFo1vtIsmFoBhfsp7RK/s1600-rw/CharlyCoin.JPG" 
                 alt="CharlyCoin Logo" 
                 class="logo-img">
        </div>

        <h1>CharlyCoin (CHC)</h1>
        <p>Bienvenido a la gestión oficial de CharlyCoin. Utiliza tu World ID para verificar que eres un humano real y acceder a tu panel de control seguro.</p>

        <button class="btn-verify" id="main-btn" onclick="handleAuth()">
            Verificar con World ID
        </button>

        <div class="footer-text">
            APP ID: app_7686f9027d3e3c0b53d987a3caf1e111<br>
            RP ID: rp_aa5ead0710fce1dc
        </div>
    </div>

    <script>
        const APP_ID = "app_7686f9027d3e3c0b53d987a3caf1e111";

        async function handleAuth() {
            const btn = document.getElementById('main-btn');
            btn.disabled = true;
            btn.innerText = "Iniciando sesión...";

            try {
                // Verificamos si ya existe una sesión guardada en el navegador
                const savedSession = localStorage.getItem('chc_session_id');

                if (savedSession) {
                    console.log("Probando sesión existente...");
                    await proveSession(savedSession);
                } else {
                    console.log("Creando nueva sesión...");
                    const sessionId = await createSession();
                    localStorage.setItem('chc_session_id', sessionId);
                }

                // Si todo sale bien, pasamos a la siguiente página
                window.location.href = "/next_page.html";

            } catch (error) {
                console.error(error);
                alert("Error de verificación: " + error.message);
                btn.disabled = false;
                btn.innerText = "Verificar con World ID";
            }
        }

        // Lógica CreateSession usando IDKit
        async function createSession() {
            const rpContext = await fetch("/api/worldid/rp-context").then((r) => r.json());

            const request = await IDKit.createSession({
                app_id: APP_ID,
                rp_context: rpContext,
            }); // Constraints se manejan según la versión de la librería

            const completion = await request.pollUntilCompletion({ timeout: 120000 });
            if (!completion.success) throw new Error(completion.error);

            const verify = await fetch("/api/worldid/verify", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(completion.result),
            }).then((r) => r.json());

            if (!verify.success) throw new Error("Verification failed");

            return completion.result.session_id;
        }

        // Lógica ProveSession
        async function proveSession(sessionId) {
            const rpContext = await fetch("/api/worldid/rp-context").then((r) => r.json());

            const request = await IDKit.proveSession(sessionId, {
                app_id: APP_ID,
                rp_context: rpContext,
            });

            const completion = await request.pollUntilCompletion({ timeout: 120000 });
            if (!completion.success) throw new Error(completion.error);

            const verify = await fetch("/api/worldid/verify", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(completion.result),
            }).then((r) => r.json());

            if (!verify.success) throw new Error("Verification failed");

            return verify;
        }
    </script>
</body>
</html>
