<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CharlyCoin 🌍</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,#0d1117,#000);
font-family:Arial,Helvetica,sans-serif;
color:#fff;
}

.card{
width:360px;
padding:35px;
border-radius:24px;
background:rgba(255,255,255,.05);
border:1px solid rgba(0,188,212,.35);
backdrop-filter:blur(12px);
box-shadow:0 0 30px rgba(0,188,212,.18);
text-align:center;
}

h1{
font-size:30px;
color:#00bcd4;
margin-bottom:10px;
}

.sub{
font-size:14px;
color:#bdbdbd;
margin-bottom:28px;
line-height:1.4;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:50px;
cursor:pointer;
font-size:16px;
font-weight:bold;
color:#fff;
background:linear-gradient(90deg,#00bcd4,#9c27b0);
margin-bottom:12px;
}

button:disabled{
background:#444;
cursor:not-allowed;
}

#status{
margin-top:12px;
min-height:42px;
font-size:14px;
line-height:1.4;
color:#00bcd4;
word-break:break-word;
}

.ok{color:#4caf50!important;}
.err{color:#ff5252!important;}
</style>
</head>

<body>

<div class="card">

<h1>CharlyCoin 🌍</h1>

<div class="sub">
Mini App oficial World App<br>
Login + Wallet + Tokens + Pools
</div>

<button id="btnLogin">Entrar con World App</button>

<button id="btnWallet">Ver Wallet</button>

<button id="btnPay">Transferir Token</button>

<button id="btnPool">Pools / Swap</button>

<div id="status">Esperando acción...</div>

</div>

<script type="module">

import { MiniKit } from "https://esm.sh/@worldcoin/minikit-js";

const status = document.getElementById("status");

const btnLogin  = document.getElementById("btnLogin");
const btnWallet = document.getElementById("btnWallet");
const btnPay    = document.getElementById("btnPay");
const btnPool   = document.getElementById("btnPool");

function setStatus(msg,type=""){
status.className="";
if(type) status.classList.add(type);
status.innerText=msg;
}

function insideWorldApp(){
return navigator.userAgent.toLowerCase().includes("world");
}

async function init(){

if(!insideWorldApp()){
setStatus("Abre esta app dentro de World App","err");
return false;
}

await MiniKit.install();

return true;
}

/* LOGIN VENTANITA REAL */
btnLogin.onclick = async ()=>{

try{

setStatus("Abriendo autorización...");

if(!await init()) return;

const res = await MiniKit.commands.walletAuth();

console.log(res);

setStatus("Acceso concedido","ok");

setTimeout(()=>{
window.location.href="buscador2.html";
},1200);

}catch(e){

console.log(e);
setStatus("Cancelado o error","err");

}

};

/* VER WALLET */
btnWallet.onclick = async ()=>{

try{

setStatus("Leyendo wallet...");

if(!await init()) return;

const user = await MiniKit.getUser();

console.log(user);

setStatus("Wallet conectada","ok");

}catch(e){

setStatus("No disponible","err");

}

};

/* TRANSFERIR TOKEN VENTANITA REAL */
btnPay.onclick = async ()=>{

try{

setStatus("Abriendo pago...");

if(!await init()) return;

const pay = await MiniKit.commands.pay({

reference:"charlycoin-transfer-" + Date.now(),

to:"0xdc178d65c502f9589bb1a35af08b5723f85ec168",

tokens:[
{
symbol:"WLD",
token_amount:"0.1"
}
],

description:"Transferencia CharlyCoin"

});

console.log(pay);

setStatus("Pago enviado","ok");

}catch(e){

console.log(e);
setStatus("Pago cancelado","err");

}

};

/* POOLS / SWAP */
btnPool.onclick = async ()=>{

try{

setStatus("Abriendo pools...");

if(!await init()) return;

/* puedes redirigir a pool propia */
window.location.href =
"https://www.geckoterminal.com/world-chain";

}catch(e){

setStatus("No disponible","err");

}

};

</script>

</body>
</html>
