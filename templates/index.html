<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>CHC - CharlyCoin</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; color: #fff; font-family: sans-serif; }
        .card { width: 320px; padding: 40px 20px; text-align: center; border: 1px solid #00bcd4; border-radius: 24px; background: #0a0a0a; }
        button { width: 100%; padding: 16px; border-radius: 50px; border: none; background: #00bcd4; color: #000; font-weight: 800; cursor: pointer; font-size: 16px; }
        #status { margin-top: 20px; font-size: 14px; color: #00bcd4; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="margin-bottom: 10px;">CHC 🌍</h1>
    <p style="color: #666; margin-bottom: 30px;">Identidad Digital Única</p>
    <button id="btnLogin">ENTRAR AHORA</button>
    <div id="status">Iniciando sistema...</div>
</div>

<script type="module">
    import { MiniKit } from "https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js/+esm";

    const APP_ID = "app_7686f9027d3e3c0b53d987a3caf1e111";
    const status = document.getElementById("status");

    async function init() {
        try {
            // Pasamos el ID y forzamos la instalación
            await MiniKit.install(APP_ID);
            status.innerText = "MiniKit Conectado ✅";
            
            // Listener para capturar la respuesta
            MiniKit.subscribe("walletAuth", (res) => {
                if (res.finalPayload) {
                    status.innerText = "¡Verificado! Entrando...";
                    setTimeout(() => { window.location.href = "buscador2.html"; }, 500);
                }
            });
        } catch (e) {
            status.innerText = "Error de carga";
        }
    }

    document.getElementById("btnLogin").onclick = async () => {
        try {
            status.innerText = "Abriendo World ID...";
            
            // Si MiniKit no está listo, re-intentamos instalar
            if (!MiniKit.isInstalled) { await MiniKit.install(APP_ID); }

            await MiniKit.walletAuth({
                nonce: Date.now().toString(),
                requestId: "login_chc",
                scope: ["uniqueness"], 
            });
        } catch (e) {
            status.innerText = "Error: Intenta de nuevo";
        }
    };

    init();
</script>
</body>
</html>
