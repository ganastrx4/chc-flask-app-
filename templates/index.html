<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CHC - CharlyCoin</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
}

.card{
width:310px;
padding:30px;
background:#111;
border:1px solid #00bcd4;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(0,188,212,.15);
}

h1{
margin-top:0;
color:#00bcd4;
font-size:28px;
}

.sub{
font-size:13px;
color:#bbb;
margin-bottom:20px;
line-height:1.4;
}

button{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:50px;
font-weight:bold;
font-size:15px;
cursor:pointer;
background:#00bcd4;
color:#000;
}

button:disabled{
background:#555;
color:#ccc;
cursor:not-allowed;
}

#status{
margin-top:14px;
font-size:13px;
color:#00bcd4;
min-height:35px;
line-height:1.4;
word-break:break-word;
}
</style>
</head>
<body>

<div class="card">

<h1>CHC 🌍</h1>

<div class="sub">
Mini App oficial CharlyCoin<br>
Compatible con World App
</div>

<button id="btnLogin">ENTRAR</button>

<button id="btnSend">ENVIAR 0.1 WLD</button>

<div id="status">Iniciando...</div>

</div>

<script type="module">

import { MiniKit } from "https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js/+esm";

const status = document.getElementById("status");
const btnLogin = document.getElementById("btnLogin");
const btnSend = document.getElementById("btnSend");

function setStatus(msg){
status.innerText = msg;
}

async function init(){

try{

/* Compatible con varias versiones */
try{
await MiniKit.install("app_7686f9027d3e3c0b53d987a3caf1e111");
}catch(e){
await MiniKit.install();
}

setStatus("MiniKit listo ✅");

}catch(e){

console.log(e);
setStatus("Error iniciando");

}

}

/* LOGIN */
btnLogin.onclick = async ()=>{

try{

setStatus("Abriendo login...");

const result = await MiniKit.walletAuth({

nonce: Date.now().toString(),

requestId: "login-" + Date.now()

});

console.log(result);

if(result?.finalPayload || result?.status === "success"){

setStatus("Acceso correcto ✅");

setTimeout(()=>{
window.location.href = "buscador2.html";
},1000);

}else{

setStatus("Cancelado");

}

}catch(e){

console.log(e);
setStatus("Error login");

}

};

/* PAGO */
btnSend.onclick = async ()=>{

try{

setStatus("Abriendo pago...");

const pay = await MiniKit.pay({

reference:"pay-" + Date.now(),

to:"0xdc178d65c502f9589bb1a35af08b5723f85ec168",

tokens:[
{
symbol:"WLD",
token_amount:"0.1"
}
],

description:"Pago CHC"

});

console.log(pay);

setStatus("Pago enviado ✅");

}catch(e){

console.log(e);
setStatus("Pago cancelado");

}

};

init();

</script>

</body>
</html>
