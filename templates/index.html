<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyCoin (CHC) - Verificación</title>
    <!-- Usamos MiniKit que es el estándar para Mini Apps en World App -->
    <script src="https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js@latest/dist/minikit.js"></script>
    <style>
        :root {
            --primary-bg: #0a0a0c;
            --accent-blue: #00d4ff;
            --text-white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 400px;
            padding: 2rem;
            background: #141417;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #222;
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            border: 2px solid var(--accent-blue);
        }

        .btn-worldid {
            background-color: var(--text-white);
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrxQg1zxfSMxym0NKic-2xp1gLjogCY4Bj1mnHI_DRYPtrObsqU7i2dVCNfvTag_mm_Muv8sPMVa557zUxLpOHYOT5Tw44s1P3ZkwxDiyRAD4MVpQGcf6QXCuUBcqJOWLC5-zVA5ujpnp0Qx3lxup8jo43wV5BciYd42eCHz27QFo1vtIsmFoBhfsp7RK/s320/CharlyCoin.JPG" 
             alt="CharlyCoin" class="logo">

        <h1>CharlyCoin (CHC)</h1>
        <p>Verifica tu identidad humana para acceder al panel seguro.</p>

        <button class="btn-worldid" id="btn-login" onclick="launchVerify()">
            Verificar con World ID
        </button>
    </div>

    <script>
        // Inicialización crítica para que la World App reconozca la Mini App
        window.addEventListener('load', () => {
            if (window.MiniKit) {
                window.MiniKit.install('app_7686f9027d3e3c0b53d987a3caf1e111');
            }
        });

        async function launchVerify() {
            const btn = document.getElementById('btn-login');
            btn.innerText = "Abriendo World ID...";

            try {
                // 1. Obtener la firma de tu backend (Python)
                const res = await fetch("/api/rp-signature", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "verify-account" })
                });
                const sigData = await res.json();

                // 2. Ejecutar el comando que abre el pop-up nativo de la World App
                const { finalPayload } = await window.MiniKit.commands.verify({
                    app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
                    action: "verify-account",
                    signal: "charlycoin_login", 
                    verification_level: "orb", 
                    rp_context: {
                        rp_id: "rp_aa5ead0710fce1dc",
                        nonce: sigData.nonce,
                        created_at: sigData.created_at,
                        expires_at: sigData.expires_at,
                        signature: sigData.sig,
                    }
                });

                // 3. Si el usuario se verificó en el pop-up, pasar a la siguiente página
                if (finalPayload) {
                    window.location.href = '/next_page.html';
                }
            } catch (e) {
                console.error(e);
                alert("Para abrir la verificación, usa la World App.");
            } finally {
                btn.innerText = "Verificar con World ID";
            }
        }
    </script>
</body>
</html>
