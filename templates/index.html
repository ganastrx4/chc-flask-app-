<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>CHC - CharlyCoin</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .card { width: 320px; padding: 40px 20px; text-align: center; border: 1px solid #00bcd4; border-radius: 24px; background: #0a0a0a; box-shadow: 0 0 20px rgba(0, 188, 212, 0.2); }
        h1 { color: #00bcd4; margin-bottom: 5px; font-size: 32px; }
        button { width: 100%; padding: 16px; border-radius: 50px; border: none; background: linear-gradient(90deg, #00bcd4, #9c27b0); color: #fff; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 20px; }
        #status { margin-top: 20px; font-size: 14px; color: #00bcd4; }
    </style>
</head>
<body>

<div class="card">
    <h1>CHC 🌍</h1>
    <p style="color:#666">World ID 4.0 Uniqueness</p>
    <button id="btnLogin">VERIFICAR IDENTIDAD</button>
    <div id="status">Esperando MiniKit...</div>
</div>

<script type="module">
    import { MiniKit } from "https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js/+esm";

    const APP_ID = "app_7686f9027d3e3c0b53d987a3caf1e111";
    const status = document.getElementById("status");

    async function init() {
        try {
            await MiniKit.install(APP_ID);
            status.innerText = "MiniKit Conectado ✅";

            // Suscripción para capturar el resultado del modal
            MiniKit.subscribe("walletAuth", (res) => {
                if (res.finalPayload) {
                    status.innerText = "¡Verificado! Entrando...";
                    setTimeout(() => { window.location.href = "buscador2.html"; }, 500);
                } else if (res.error) {
                    status.innerText = "Error en el modal: " + res.error.message;
                }
            });
        } catch (e) {
            status.innerText = "Error de inicio";
        }
    }

    document.getElementById("btnLogin").onclick = async () => {
        try {
            status.innerText = "Abriendo confirmación...";
            
            // Basado en el contrato de Verifier v4 que pasaste:
            // Necesitamos enviar 'action' y un 'nonce' claro.
            await MiniKit.walletAuth({
                nonce: Date.now().toString(), 
                requestId: "login_chc",
                scope: ["uniqueness"],
                // Definimos la acción para que el modal sepa qué mostrar
                action: "login-chc-v4", 
            });

        } catch (e) {
            status.innerText = "Error al lanzar modal";
        }
    };

    init();
</script>
</body>
</html>
