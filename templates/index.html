<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CharlyCoin 🌍</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#0d1117,#000);
    font-family:Arial,Helvetica,sans-serif;
    color:white;
}

.card{
    width:360px;
    padding:35px;
    border-radius:24px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(0,188,212,.35);
    backdrop-filter:blur(12px);
    box-shadow:0 0 30px rgba(0,188,212,.18);
    text-align:center;
}

.logo{
    font-size:34px;
    margin-bottom:8px;
}

h1{
    color:#00bcd4;
    font-size:28px;
    margin-bottom:8px;
}

.sub{
    color:#bdbdbd;
    font-size:14px;
    margin-bottom:28px;
    line-height:1.45;
}

button{
    width:100%;
    border:none;
    padding:16px;
    border-radius:60px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    color:#fff;
    background:linear-gradient(90deg,#00bcd4,#9c27b0);
}

button:disabled{
    background:#444;
    cursor:not-allowed;
}

#status{
    margin-top:18px;
    min-height:42px;
    font-size:14px;
    line-height:1.4;
    color:#00bcd4;
}

.ok{color:#4caf50!important;}
.err{color:#ff5252!important;}
</style>
</head>

<body>

<div class="card">
    <div class="logo">🌍</div>
    <h1>CharlyCoin</h1>
    <div class="sub">
        Acceso oficial con World App<br>
        Estilo UNO Mini App
    </div>

    <button id="btnLogin">
        Entrar con World ID
    </button>

    <div id="status">Esperando autenticación...</div>
</div>

<script type="module">

const btn = document.getElementById("btnLogin");
const status = document.getElementById("status");

/* CONFIG */
const APP_ID = "app_7686f9027d3e3c0b53d987a3caf1e111";

/* helpers */
function setStatus(msg,type=""){
    status.className="";
    if(type) status.classList.add(type);
    status.innerText = msg;
}

function lock(v=true){
    btn.disabled = v;
}

function insideWorldApp(){
    return navigator.userAgent.toLowerCase().includes("world");
}

/* fallback clásico */
async function fallbackLogin(){

    setStatus("Modo navegador detectado...");

    const mod = await import("https://esm.sh/@worldcoin/idkit-core");
    const IDKit = mod.IDKit;

    const result = await IDKit.verify({
        app_id: APP_ID,
        action: "login",
        signal: "charlycoin-user"
    });

    if(result.success){
        setStatus("Acceso correcto","ok");

        setTimeout(()=>{
            window.location.href="buscador2.html";
        },1200);
    }else{
        throw new Error("No autorizado");
    }
}

/* modo world app estilo UNO */
async function miniKitLogin(){

    const sdk = await import("https://esm.sh/@worldcoin/minikit-js");

    const MiniKit = sdk.MiniKit;

    await MiniKit.install();

    setStatus("Abriendo ventana segura...");

    /* ESTO ABRE LA VENTANA ABAJO */
    const result = await MiniKit.commands.verify({
        action: "login",
        signal: "charlycoin-user"
    });

    if(result.finalPayload?.status === "success" || result.status === "success"){

        setStatus("Verificación exitosa","ok");

        setTimeout(()=>{
            window.location.href="buscador2.html";
        },1200);

    }else{
        throw new Error("Autenticación cancelada");
    }
}

/* main */
btn.addEventListener("click", async ()=>{

    try{

        lock(true);

        if(insideWorldApp()){

            setStatus("World App detectada");

            await miniKitLogin();

        }else{

            await fallbackLogin();

        }

    }catch(err){

        console.error(err);
        setStatus("Error: " + err.message,"err");
        lock(false);

    }

});

</script>

</body>
</html>
