<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CHC World ID v4</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
font-family:Arial;
color:#fff;
}
.card{
width:320px;
padding:30px;
border-radius:22px;
background:#111;
border:1px solid #00bcd4;
text-align:center;
}
button{
width:100%;
padding:16px;
border:none;
border-radius:50px;
background:#00bcd4;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}
#status{
margin-top:15px;
font-size:13px;
color:#00bcd4;
min-height:30px;
}
</style>
</head>
<body>

<div class="card">

<h1>CHC 🌍</h1>

<button id="login">ENTRAR CON WORLD ID</button>

<div id="status">Listo...</div>

</div>

<script type="module">

import { MiniKit } from "https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js/+esm";

const APP_ID = "app_7686f9027d3e3c0b53d987a3caf1e111";

const status = document.getElementById("status");

await MiniKit.install(APP_ID);

status.innerText = "MiniKit conectado";

document.getElementById("login").onclick = async ()=>{

try{

status.innerText = "Abriendo World ID...";

const verify = await MiniKit.verify({
 action:"login",
 signal:"charlycoin"
});

console.log(verify);

status.innerText = "Validando backend...";

const r = await fetch("/api/verify-proof",{
 method:"POST",
 headers:{
   "Content-Type":"application/json"
 },
 body:JSON.stringify(verify)
});

const j = await r.json();

console.log(j);

if(j.success){

status.innerText = "Éxito ✅";

setTimeout(()=>{
 location.href="buscador2.html";
},1000);

}else{

status.innerText = "Login rechazado";

}

}catch(e){

console.log(e);

status.innerText = "Error login";

}

};

</script>
</body>
</html>
