<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>CHC - World ID 4.0</title>
    <style>
        body { 
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: #000; color: #fff; font-family: sans-serif; 
        }
        .card { 
            width: 320px; padding: 30px; text-align: center; border-radius: 20px;
            background: #111; border: 1px solid #00bcd4;
        }
        button { 
            width: 100%; padding: 15px; border-radius: 50px; border: none; 
            background: #00bcd4; color: #000; font-weight: bold; cursor: pointer; 
        }
        #status { margin-top: 15px; font-size: 14px; color: #00bcd4; }
    </style>
</head>
<body>

<div class="card">
    <h1>CHC 🌍</h1>
    <p style="color: #888; margin-bottom: 20px;">World ID 4.0 Ready</p>
    <button id="btnLogin">ENTRAR</button>
    <div id="status">Esperando MiniKit...</div>
</div>

<script type="module">
    import { MiniKit } from "https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js/+esm";

    const APP_ID = "app_7686f9027d3e3c0b53d987a3caf1e111";
    const status = document.getElementById("status");

    async function init() {
        try {
            await MiniKit.install(APP_ID);
            status.innerText = "MiniKit Conectado ✅";
        } catch (e) {
            status.innerText = "Error de conexión";
        }
    }

    document.getElementById("btnLogin").onclick = async () => {
        try {
            status.innerText = "Iniciando World ID 4.0...";

            // Configuramos la solicitud según el punto 2 que pasaste:
            const authResponse = await MiniKit.commands.walletAuth({
                nonce: Date.now().toString(),
                requestId: "login_chc",
                // Esto es CRUCIAL para World ID 4.0:
                scope: ["uniqueness"], // Pedimos prueba de que es un humano único
            });

            // Si la World App nos devuelve el paquete (finalPayload)
            if (authResponse.finalPayload) {
                status.innerText = "Verificación exitosa...";
                
                // Redirigir como querías
                setTimeout(() => {
                    window.location.href = "buscador2.html";
                }, 1000);
            } else {
                status.innerText = "Cancelado por el usuario";
            }
        } catch (e) {
            console.error(e);
            status.innerText = "Error: " + (e.message || "Fallo al autenticar");
        }
    };

    init();
</script>
</body>
</html>
