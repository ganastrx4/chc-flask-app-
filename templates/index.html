<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>CHC - World ID 4.0</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .card { width: 320px; padding: 40px 20px; text-align: center; border: 1px solid #00bcd4; border-radius: 24px; background: #0a0a0a; box-shadow: 0 0 20px rgba(0, 188, 212, 0.2); }
        h1 { color: #00bcd4; margin-bottom: 5px; font-size: 32px; }
        button { width: 100%; padding: 16px; border-radius: 50px; border: none; background: linear-gradient(90deg, #00bcd4, #9c27b0); color: #fff; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 20px; }
        #status { margin-top: 20px; font-size: 13px; color: #00bcd4; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <h1>CHC 🌍</h1>
    <p style="color:#666">Verificación Uniqueness v4</p>
    <button id="btnLogin">VERIFICAR CON WORLD ID</button>
    <div id="status">Esperando MiniKit...</div>
</div>

<script type="module">
    import { MiniKit } from "https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js/+esm";

    const APP_ID = "app_7686f9027d3e3c0b53d987a3caf1e111";
    const status = document.getElementById("status");

    async function init() {
        try {
            await MiniKit.install(APP_ID);
            status.innerText = "MiniKit Conectado ✅";

            // Escuchamos la respuesta del modal (IDKit Result)
            MiniKit.subscribe("walletAuth", (res) => {
                if (res.finalPayload) {
                    console.log("Datos para el Backend:", res.finalPayload);
                    status.innerText = "¡Prueba v4 generada con éxito!";
                    
                    // Aquí es donde el mapeo que pasaste entra en juego:
                    // El payload ya trae el nullifier, proof, y signal_hash
                    setTimeout(() => { 
                        window.location.href = "buscador2.html"; 
                    }, 800);
                } else if (res.error) {
                    status.innerText = "Error: " + res.error.message;
                }
            });
        } catch (e) {
            status.innerText = "Error de inicio";
        }
    }

    document.getElementById("btnLogin").onclick = async () => {
        try {
            status.innerText = "Abriendo IDKit...";
            
            // Según tu mapeo, necesitamos un nonce y un signalHash
            // El signalHash suele ser el walletAddress o un string del usuario
            const userSignal = "user_" + Date.now();

            await MiniKit.walletAuth({
                nonce: Date.now().toString(), // nonce de nivel superior
                requestId: "login_chc_v4",
                scope: ["uniqueness"],
                action: "login", // Esto se hashea a uint256 en el contrato
                signal: userSignal // Esto genera el signalHash que pide tu mapeo
            });

        } catch (e) {
            status.innerText = "Error al lanzar el modal";
        }
    };

    init();
</script>
</body>
</html>
