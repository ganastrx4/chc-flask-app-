<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CharlyCoin 🌍</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#0d1117,#000);
    font-family:Arial,Helvetica,sans-serif;
    color:#fff;
}

.card{
    width:350px;
    padding:35px;
    border-radius:22px;
    background:rgba(255,255,255,.05);
    border:1px solid #00bcd4;
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(0,188,212,.2);
    text-align:center;
}

h1{
    color:#00bcd4;
    font-size:30px;
    margin-bottom:10px;
}

.sub{
    color:#bbb;
    font-size:14px;
    margin-bottom:25px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:#fff;
    font-weight:bold;
    font-size:16px;
    background:linear-gradient(90deg,#00bcd4,#9c27b0);
}

button:disabled{
    background:#444;
}

#status{
    margin-top:18px;
    min-height:40px;
    font-size:14px;
    color:#00bcd4;
    line-height:1.4;
}

.ok{color:#4caf50!important;}
.err{color:#ff5252!important;}
</style>
</head>

<body>

<div class="card">
    <h1>CharlyCoin 🌍</h1>
    <div class="sub">Acceso Universal World ID</div>

    <button id="btnLogin">
        Entrar con World ID
    </button>

    <div id="status">Listo para verificar</div>
</div>

<script type="module">

const btn = document.getElementById("btnLogin");
const status = document.getElementById("status");

const APP_ID = "app_7686f9027d3e3c0b53d987a3caf1e111";
const ACTION = "login";
const RP_ID  = "rp_aa5ead0710fce1dc";

function setStatus(msg,type=""){
    status.className="";
    if(type) status.classList.add(type);
    status.innerText=msg;
}

function lock(v=true){
    btn.disabled=v;
}

/* Detecta World App */
function insideWorldApp(){
    return navigator.userAgent.toLowerCase().includes("worldapp");
}

/* FLOW NORMAL WORLD ID */
async function classicFlow(){

    const mod = await import("https://esm.sh/@worldcoin/idkit-core");
    const IDKit = mod.IDKit;
    const orbLegacy = mod.orbLegacy;

    setStatus("Solicitando firma...");

    const sigRes = await fetch("/api/rp-signature",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        }
    });

    const sigData = await sigRes.json();

    if(!sigRes.ok){
        throw new Error(sigData.error || "Error backend");
    }

    setStatus("Abriendo World ID...");

    const request = await IDKit.request({

        app_id: APP_ID,
        action: ACTION,
        allow_legacy_proofs: true,

        rp_context:{
            rp_id: RP_ID,
            nonce: sigData.nonce,
            created_at: sigData.created_at,
            expires_at: sigData.expires_at,
            signature: sigData.sig
        },

        environment:"production"

    }).preset(
        orbLegacy({
            signal:"charlycoin-login"
        })
    );

    setStatus("Escanea con World App...");

    const proof = await request.pollUntilCompletion();

    setStatus("Validando identidad...");

    const verifyRes = await fetch("/api/verify-proof",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(proof)
    });

    const verifyData = await verifyRes.json();

    if(verifyRes.ok && verifyData.success){

        setStatus("Verificación exitosa","ok");

        setTimeout(()=>{
            window.location.href="buscador2.html";
        },1200);

    }else{
        throw new Error(
            verifyData.error ||
            verifyData.detail ||
            "No validado"
        );
    }
}

/* FLOW FALLBACK */
async function smartLogin(){

    try{

        lock(true);

        if(insideWorldApp()){

            setStatus("World App detectada.");

            try{
                await classicFlow();
                return;
            }catch(e){

                if(String(e).includes("MiniKit") ||
                   String(e).includes("compatible")){

                    setStatus("MiniKit antiguo. Usa modo web...");
                    await classicFlow();
                    return;
                }

                throw e;
            }

        }else{

            setStatus("Navegador detectado.");
            await classicFlow();
        }

    }catch(err){

        console.error(err);
        setStatus("Error: " + err.message,"err");
        lock(false);

    }

}

btn.addEventListener("click", smartLogin);

</script>

</body>
</html>
