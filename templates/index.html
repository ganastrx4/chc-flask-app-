<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CharlyCoin Ecosystem</title>

    <style>
        :root {
            --bg: #050505;
            --accent: #00d4ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        html, body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            overscroll-behavior: none;
        }

        .intro-container {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
            padding: 20px;
            max-width: 400px;
            width: 90%;
            box-sizing: border-box;
        }

        .logo-glow {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin-bottom: 25px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            object-fit: cover;
            animation: pulse 3s infinite;
        }

        h1 {
            font-size: 2.2rem;
            margin: 10px 0;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #aaa;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 35px;
        }

        .enter-button {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px 40px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
            font-family: inherit;
        }

        .enter-button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
            50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.5); }
            100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        }
    </style>
</head>
<body>

    <div class="intro-container">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrxQg1zxfSMxym0NKkic-2xp1gLjogCY4Bj1mnHI_DRYPtrObsqU7i2dVCNfvTag_mm_Muv8sPMVa557zUxLpOHYOT5Tw44s1P3ZkwxDiyRAD4MVpQGcf6QXCuUBcqJOWLC5-zVA5ujpnp0Qx3lxup8jo43wV5BciYd42eCHz27QFo1vtIsmFoBhfsp7RK/s1600-rw/CharlyCoin.JPG" 
             alt="CharlyCoin Logo" class="logo-glow">
        
        <h1>CharlyCoin</h1>
        <p>Access the decentralized automated trading dashboard instantly.</p>

        <button id="btn-enter" class="enter-button">Enter Dashboard</button>
    </div>

    <script>
        document.getElementById('btn-enter').addEventListener('click', () => {
            const button = document.getElementById('btn-enter');
            button.innerText = "Connecting...";
            button.style.opacity = "0.7";

            console.log("🚀 Bypassing World ID... Requesting direct session setup.");

            // Petición directa a tu backend de Flask
            fetch('/api/verify-proof', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nullifier_hash: "charly_bypass_secure_" + Date.now()
                })
            })
            .then(response => {
                // Si responde exitoso o redirección, avanzamos al panel
                if (response.ok || response.redirected) {
                    window.location.href = response.redirected ? response.url : "/";
                } else {
                    return response.json();
                }
            })
            .then(data => {
                if (data && data.success) {
                    console.log("🔓 Session established. Access granted.");
                    window.location.href = "/";
                } else if (data) {
                    console.warn("Backend dynamic response error, breaking through anyway...");
                    window.location.href = "/";
                }
            })
            .catch(error => {
                console.error("Network notice:", error);
                // Si el backend tarda o el fetch falla por CORS, forzamos la entrada al index raíz/panel
                window.location.href = "/";
            });
        });
    </script>
</body>
</html>
