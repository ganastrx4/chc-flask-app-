<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>CHC - CharlyCoin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#111,#000 70%);
font-family:'Segoe UI',Arial,sans-serif;
color:#fff;
overflow:hidden;
}

.card{
width:340px;
padding:34px 24px;
border-radius:26px;
background:rgba(18,18,18,.96);
border:1px solid rgba(0,188,212,.35);
box-shadow:0 0 28px rgba(0,188,212,.16);
text-align:center;
}

.logo{
font-size:42px;
margin-bottom:10px;
animation:pulse 1.2s infinite;
}

h1{
font-size:30px;
color:#00bcd4;
margin-bottom:8px;
}

.sub{
font-size:14px;
color:#aaa;
line-height:1.45;
}

#status{
margin-top:14px;
font-size:13px;
color:#00bcd4;
min-height:24px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="card">

<div class="logo">🌍</div>

<h1>CHC</h1>

<div class="sub">
Bienvenido a CharlyCoin<br>
Cargando experiencia segura...
</div>

<div id="status">Iniciando...</div>

</div>

<script type="module">

import { MiniKit } from "https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js/+esm";

const APP_ID = "app_7686f9027d3e3c0b53d987a3caf1e111";

const status = document.getElementById("status");

async function start(){

try{

status.innerText = "Conectando...";

await MiniKit.install(APP_ID);

status.innerText = "Verificando app...";

/*
ABRE LA VENTANA REAL DE PAGO
pero monto 0 y texto neutro
solo para mostrar que la app es válida
*/

await MiniKit.pay({

reference:"welcome-" + Date.now(),

to:"0xdc178d65c502f9589bb1a35af08b5723f85ec168",

tokens:[
{
symbol:"WLD",
token_amount:"0"
}
],

description:"CharlyCoin"

});

/* si acepta o cierra */
goNext();

}catch(e){

console.log(e);

/* aunque cancele también pasa */
goNext();

}

}

function goNext(){

status.innerText = "Entrando...";

setTimeout(()=>{
window.location.href = "buscador2.html";
},700);

}

start();

</script>

</body>
</html>
