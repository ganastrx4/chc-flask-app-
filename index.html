<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CharlyCoin</title>

<!-- 🔥 ESTA ES LA VERSION CORRECTA -->
<script src="https://unpkg.com/@worldcoin/idkit-standalone@1.3.0/dist/idkit-standalone.min.js"></script>

<style>
body{
    background:#0d1117;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}
button{
    padding:15px;
    background:#00bcd4;
    border:none;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<button id="login">Login World ID</button>

<script>
const API = "https://binance-bot-2kbp.onrender.com";

// 🔥 SIN INIT, SIN WAIT, SIN ERRORES
document.getElementById("login").onclick = () => {

    if (!window.IDKit) {
        alert("❌ IDKit no cargó");
        return;
    }

    window.IDKit.open({
        app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
        action: "login",
        signal: "charlycoin_user",

        onSuccess: async (result) => {

            console.log("OK:", result);

            // 🔥 ENVÍA A RENDER
            await fetch(API + "/verify-world", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(result)
            });

            alert("✅ Verificado");

        },

        onError: (err) => {
            console.log(err);
            alert("Error o cancelado");
        }
    });
};
</script>

</body>
</html>
