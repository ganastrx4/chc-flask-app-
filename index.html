<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyCoin - Multi-Wallet Access</title>

    <!-- TU LIBRERÍA ORIGINAL -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <!-- 🔥 NUEVO: REOWN -->
    <script type="module">
        import { createAppKit } from "https://esm.sh/@reown/appkit";

        window.appKit = createAppKit({
            projectId: "TU_PROJECT_ID_AQUI",
            networks: ["eip155:1","eip155:56"],
            metadata: {
                name: "CharlyCoin",
                description: "Login seguro",
                url: window.location.origin,
                icons: []
            }
        });
    </script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0d1117, #000);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #00bcd4;
            text-align: center;
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
        }
        .wallet-option {
            background: rgba(255, 255, 255, 0.08);
            margin: 15px 0;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        #status { margin-top: 20px; color: #00bcd4; }
    </style>
</head>
<body>

<div class="card">
    <h1>CharlyCoin 🌍</h1>
    <p>Selecciona tu billetera</p>

    <div class="wallet-option" onclick="handleWallet('metamask')">MetaMask</div>
    <div class="wallet-option" onclick="handleWallet('trust')">Trust Wallet</div>
    <div class="wallet-option" onclick="handleWallet('binance')">Binance Wallet</div>

    <p id="status"></p>
</div>

<script>
const statusText = document.getElementById('status');

async function handleWallet(type) {
    const isMobile = /Android|iPhone/i.test(navigator.userAgent);

    // 🔥 SI NO HAY ETHEREUM → USAR REOWN (SOLUCIÓN REAL)
    if (typeof window.ethereum === 'undefined') {
        try {
            statusText.innerText = "Abriendo selector de wallets...";

            const session = await window.appKit.connect();

            // Obtener dirección
            const address = session?.accounts?.[0] || "desconocido";

            // 🔥 FIRMA (igual que tu sistema)
            const signature = await window.appKit.signMessage({
                message: "Acceso CharlyCoin\nID: " + Math.floor(Math.random()*100000)
            });

            statusText.innerText = "Wallet conectada ✅";

            console.log(address, signature);

        } catch (err) {
            statusText.innerText = "Cancelado o error";
            console.error(err);
        }
        return;
    }

    // ✅ TU CÓDIGO ORIGINAL (NO SE TOCA)
    try {
        statusText.innerText = "Conectando...";
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        const address = await signer.getAddress();

        statusText.innerText = "Firma requerida...";
        const mensaje = "Acceso seguro\nID: " + Math.random();
        const firma = await signer.signMessage(mensaje);

        statusText.innerText = "Éxito ✅";

        console.log(address, firma);

    } catch (err) {
        statusText.innerText = "Error";
        console.error(err);
    }
}
</script>

</body>
</html>
