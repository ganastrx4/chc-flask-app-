<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CharlyCoin (CHC)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://developer.worldcoin.org/idkit.js"></script>

  <style>
    body {
      background: radial-gradient(circle at center, #0f0f1a, #000000);
      font-family: 'Poppins', sans-serif;
    }
    .fade-in {
      animation: fadeIn 2s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95);}
      to { opacity: 1; transform: scale(1);}
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">

  <div class="text-center fade-in px-4">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgs4uyyEce9czJNopvAJUC-EuqRY0GilYfi7dguE0OEkUjTcrn6PVYsIFXo2NbemRvavHvVWsD8ru9ZGJXUpfhSVsUyrNYeJri7NP2XU6-9NUjbyrVjQtYUNjt7N9dUaouupuqlczAJlDqpYVhdArBcT7MRvEAwVfQv8JeOKD-EWAecMuSsfAE4gizyojtT/s1024-rw/0ed01250-9b4a-4d44-924c-7c0011004aa0.webp" 
         alt="CharlyCoin Logo" 
         class="mx-auto w-48 drop-shadow-lg mb-6 rounded-2xl">

    <h1 class="text-4xl font-bold mb-4">
      Bienvenido a <span class="text-cyan-400">CharlyCoin (CHC)</span>
    </h1>

    <p class="text-lg max-w-2xl mx-auto mb-6 text-gray-300">
      <b>CharlyCoin (CHC)</b> es un token en la red 
      <span class="text-purple-400">World Chain</span>. Verifica tu identidad para acceder al ecosistema.
    </p>

    <button id="world-id-button" 
       class="bg-gradient-to-r from-cyan-500 to-purple-600 text-white px-10 py-3 rounded-2xl shadow-lg hover:scale-105 transition transform duration-300 text-lg font-semibold inline-block">
      🚀 Ingresar con World ID
    </button>

    <div class="mt-8 bg-gray-900/50 p-4 rounded-xl border border-gray-700 text-sm">
        <h3 class="font-bold text-cyan-400 mb-2">Datos del Proyecto</h3>
        <p><strong>Contrato:</strong> 0x6b2bA...eDb</p>
        <p><strong>Red:</strong> World Chain (Anvil Local)</p>
    </div>
  </div>

  <script>
    // CONFIGURACIÓN DE WORLD ID
    IDKit.init({
      app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
      action: "login",
      onSuccess: (result) => {
        console.log("Verificación exitosa:", result);
        // Aquí redirigimos a tu buscador2.html después de que el usuario se verifique
        window.location.href = "https://ganastrx4.github.io/chc-flask-app-/buscador2.html";
      },
    });

    // Abrir el modal al hacer clic
    document.getElementById("world-id-button").onclick = () => {
      IDKit.open();
    };
  </script>

</body>
</html>
