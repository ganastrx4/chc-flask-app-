<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CharlyCoin - NewWorld Network</title>
    <script src="https://unpkg.com/@worldcoin/idkit-standalone@1.3.0/dist/idkit-standalone.js"></script>
</head>
<body>

    <button id="world-id-button" style="display:none; padding: 15px; background: #00bcd4; color: white; border-radius: 10px; border: none; cursor: pointer;">
        Verificar con World ID
    </button>
    <p id="loading-msg">Cargando sistema de seguridad...</p>

    <script>
        // Función para esperar a que IDKit aparezca en el sistema
        function iniciarCuandoEsteListo() {
            if (window.IDKit) {
                console.log("IDKit detectado correctamente.");
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('world-id-button').style.display = 'block';

                window.IDKit.init({
                    app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
                    action: "login",
                    onSuccess: (result) => {
                        console.log("Éxito:", result);
                        window.location.href = "buscador2.html";
                    },
                    verification_level: "device",
                });
            } else {
                // Si no está listo, reintentar en 100 milisegundos
                setTimeout(iniciarCuandoEsteListo, 100);
            }
        }

        // Lanzar la comprobación
        iniciarCuandoEsteListo();

        // Configurar el clic del botón
        document.getElementById("world-id-button").addEventListener("click", () => {
            if (window.IDKit) {
                window.IDKit.open();
            } else {
                alert("El sistema de World ID aún no está listo. Reintenta en un segundo.");
            }
        });
    </script>
</body>
</html>
