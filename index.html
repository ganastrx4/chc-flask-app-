<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CharlyCoin</title>

<script src="https://unpkg.com/@worldcoin/idkit@latest/dist/index.js"></script>

<style>
body{
    background:#0d1117;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}
button{
    padding:15px;
    background:#00bcd4;
    border:none;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<button id="login">Login World ID</button>

<script>
const API = "https://binance-bot-2kbp.onrender.com";

// 🔥 CLICK DIRECTO SIN ESPERAS
document.getElementById("login").onclick = async () => {

    try {

        const result = await window.IDKit.open({
            app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
            action: "login",
            signal: "charlycoin_user"
        });

        console.log("RESULT:", result);

        // 🔥 AQUÍ YA DEBE LLEGAR A RENDER
        await fetch(`${API}/verify-world`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(result)
        });

        alert("✅ Verificado");

    } catch (err) {
        console.error(err);
        alert("Error o cancelado");
    }

};
</script>

</body>
</html>
