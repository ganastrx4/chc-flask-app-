<script>
let idkit;

function iniciarWorldID() {
    if (window.IDKit) {

        idkit = window.IDKit.init({
            app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
            action: "login",
            verification_level: "device",
            signal: "charlycoin_login",

            onSuccess: (result) => {
                console.log("Verificado:", result);
                document.getElementById("status").innerText = "✅ Verificado correctamente";
                
                // Redirección después de validar
                setTimeout(() => {
                    window.location.href = "buscador2.html";
                }, 1500);
            },

            onError: (error) => {
                console.error(error);
                document.getElementById("status").innerText = "❌ Error en verificación";
            }
        });

        console.log("IDKit listo");

    } else {
        setTimeout(iniciarWorldID, 100);
    }
}

iniciarWorldID();

// BOTÓN
document.getElementById("world-id-btn").addEventListener("click", () => {
    if (idkit) {
        idkit.open(); // 🔥 ESTE ES EL QUE TE FALTABA
    }
});
</script>
