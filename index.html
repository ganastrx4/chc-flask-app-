<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CharlyCoin Login</title>

<script src="https://unpkg.com/@worldcoin/idkit-standalone@1.3.0/dist/idkit-standalone.js"></script>

<style>
body{
    background:#0d1117;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}
.card{
    background:#111;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
}
button{
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#00bcd4;
    color:black;
    font-weight:bold;
    cursor:pointer;
}
#status{
    margin-top:15px;
    color:#00e5ff;
}
</style>
</head>

<body>

<div class="card">
    <h2>CharlyCoin 🌍</h2>
    <button id="loginBtn">Conectar World ID</button>
    <p id="status">Listo...</p>
</div>

<script>
const API = "https://binance-bot-2kbp.onrender.com";

let idkit = null;

// 🔥 ESPERAR A QUE CARGUE IDKIT BIEN
function waitIDKit() {
    if (window.IDKit) {
        initIDKit();
    } else {
        setTimeout(waitIDKit, 300);
    }
}

function initIDKit() {

    idkit = window.IDKit.init({
        app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
        action: "login",
        signal: "charlycoin_user",

        onSuccess: async (proof) => {

            document.getElementById("status").innerText = "Verificando...";

            try {
                const res = await fetch(`${API}/verify-world`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(proof)
                });

                const data = await res.json();

                if (data.success) {
                    document.getElementById("status").innerText = "✅ Verificado correctamente";

                    // 🔥 AQUÍ YA FUNCIONA COMO PUF
                    setTimeout(()=>{
                        window.location.href = "buscador2.html";
                    }, 1500);

                } else {
                    document.getElementById("status").innerText = "❌ Falló verificación";
                }

            } catch (e) {
                document.getElementById("status").innerText = "❌ Error servidor";
            }
        }
    });

    document.getElementById("status").innerText = "World ID listo";
}

// 🔥 CLICK
document.getElementById("loginBtn").onclick = () => {

    if (!idkit) {
        document.getElementById("status").innerText = "Cargando World ID...";
        return;
    }

    idkit.open();
};

// INICIAR
waitIDKit();
</script>

</body>
</html>
