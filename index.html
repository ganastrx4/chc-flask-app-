<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyCoin - Multi-Wallet Access</title>

    <!-- ETHERS (TU SISTEMA ORIGINAL) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <!-- REOWN -->
    <script type="module">
        import { createAppKit } from "https://esm.sh/@reown/appkit";

        window.appKit = createAppKit({
            projectId: "TU_PROJECT_ID_AQUI", // 👈 PON TU ID
            networks: ["eip155:1","eip155:56"],
            metadata: {
                name: "CharlyCoin",
                description: "Login seguro",
                url: window.location.origin,
                icons: []
            }
        });
    </script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0d1117, #000);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #00bcd4;
            text-align: center;
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
        }
        .wallet-option {
            background: rgba(255, 255, 255, 0.08);
            margin: 15px 0;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: 0.3s;
        }
        .wallet-option:hover {
            background: rgba(0, 188, 212, 0.2);
        }
        #status {
            margin-top: 20px;
            color: #00bcd4;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>CharlyCoin 🌍</h1>
    <p>Selecciona tu billetera</p>

    <div class="wallet-option" onclick="handleWallet()">Conectar Wallet</div>

    <p id="status"></p>
</div>

<script>
const statusText = document.getElementById('status');

async function handleWallet() {

    // 🔥 CASO 1: WALLET NORMAL (MetaMask en PC o navegador wallet)
    if (typeof window.ethereum !== 'undefined') {
        try {
            statusText.innerText = "Conectando...";

            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            const signer = provider.getSigner();
            const address = await signer.getAddress();

            const mensaje = "Acceso seguro CharlyCoin\nID: " + Math.floor(Math.random()*1000000);

            statusText.innerText = "Firma requerida...";
            const firma = await signer.signMessage(mensaje);

            statusText.innerText = "Validando...";

            const res = await fetch('/api/validar_billetera', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    address: address,
                    firma: firma,
                    mensaje: mensaje
                })
            });

            const data = await res.json();

            if (data.success) {
                statusText.innerText = "¡Éxito! Entrando...";
                setTimeout(() => {
                    window.location.href = "buscador2.html";
                }, 1000);
            } else {
                statusText.innerText = "Error de validación";
            }

        } catch (err) {
            statusText.innerText = "Error o cancelado";
            console.error(err);
        }

        return;
    }

    // 🔥 CASO 2: CELULAR / SIN ETHEREUM → REOWN
    try {
        statusText.innerText = "Abriendo wallets...";

        const session = await window.appKit.connect();
        const address = session?.accounts?.[0];

        const mensaje = "Acceso seguro CharlyCoin\nID: " + Math.floor(Math.random()*1000000);

        const firma = await window.appKit.signMessage({
            message: mensaje
        });

        statusText.innerText = "Validando...";

        const res = await fetch('/api/validar_billetera', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                address: address,
                firma: firma,
                mensaje: mensaje
            })
        });

        const data = await res.json();

        if (data.success) {
            statusText.innerText = "¡Éxito! Entrando...";
            setTimeout(() => {
                window.location.href = "buscador2.html";
            }, 1000);
        } else {
            statusText.innerText = "Error de validación";
        }

    } catch (err) {
        statusText.innerText = "Cancelado o error";
        console.error(err);
    }
}
</script>

</body>
</html>
