<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlyCoin - Acceso Seguro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    
    <script src="https://unpkg.com/@worldcoin/idkit-standalone@1.3.0/dist/idkit-standalone.js"></script>

    <style>
        body { margin: 0; height: 100vh; background: radial-gradient(circle at center, #0d1117, #000); color: #fff; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; border: 1px solid #00bcd4; text-align: center; backdrop-filter: blur(10px); width: 90%; max-width: 400px; box-shadow: 0 0 20px rgba(0, 188, 212, 0.2); }
        h1 { color: #00bcd4; margin-bottom: 10px; }
        .btn-wallet, .btn-world { border: none; color: white; padding: 15px 30px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-bottom: 10px; }
        .btn-wallet { background: linear-gradient(90deg, #00bcd4, #9c27b0); }
        .btn-world { background: #ffffff; color: #000; display: none; }
        #status { margin-top: 20px; color: #00bcd4; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

<div class="card">
    <h1>CharlyCoin 🌍</h1>
    <p>NewWorld Network</p>
    <button class="btn-wallet" id="open-modal">1. Conectar Wallet</button>
    <button class="btn-world" id="world-id-btn">2. Verificar con World ID</button>
    <p id="status"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js@latest/dist/minikit.js"></script>

<script>
  // Inicializar el MiniKit
  window.onload = async () => {
    const { MiniKit } = window.MiniKit;
    MiniKit.install(); // Esto activa la conexión con la ventanita de la imagen
  };

  async function solicitarPago() {
    const { MiniKit } = window.MiniKit;

    // Esto es lo que dispara la ventana de "Permitir transacción"
    const { finalPayload } = await MiniKit.commands.pay({
      reference: "pago_charlycoin_001",
      to: "0xTuDireccionDeBilletera", // Tu wallet donde recibes
      tokens: [
        {
          symbol: "WLD",
          amount: "0.142208", // Como en tu imagen
        }
      ],
      description: "Recibir CHC - NewWorld Network",
    });

    if (finalPayload.status === "success") {
      alert("¡Transacción permitida!");
    }
  }
</script>

</body>
</html>
