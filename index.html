<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CharlyCoin Login</title>

<script src="https://unpkg.com/@worldcoin/idkit-standalone@1.3.0/dist/idkit-standalone.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>
body {
    background: #0d1117;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
}
.card {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}
button {
    padding: 12px;
    margin: 10px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #00bcd4;
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>
<div class="card">
    <h2>CharlyCoin 🌍</h2>

    <button id="verify">Verificar con World ID</button>
    <button id="wallet" style="display:none;">Conectar Wallet</button>

    <p id="status">Esperando...</p>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const API = "https://binance-bot-hna7.onrender.com";

let idkit;
let proofGlobal = null;
let verificado = false;

// 🔹 INIT WORLD ID
function initID() {
    if (window.IDKit) {

        idkit = window.IDKit.init({
            app_id: "app_7686f9027d3e3c0b53d987a3caf1e111",
            action: "login",
            signal: "charlycoin_user",

            onSuccess: async (proof) => {

                document.getElementById("status").innerText = "Verificando servidor...";

                // 🔥 VALIDAR EN TU BACKEND (RENDER)
                const res = await fetch(`${API}/verify-world`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(proof)
                });

                const data = await res.json();

                if (data.success) {
                    verificado = true;
                    proofGlobal = proof;

                    document.getElementById("status").innerText = "✅ Humano verificado";
                    document.getElementById("wallet").style.display = "block";
                } else {
                    document.getElementById("status").innerText = "❌ Falló verificación";
                }
            }
        });

    } else {
        setTimeout(initID, 100);
    }
}

initID();

// 🔹 BOTÓN WORLD ID
document.getElementById("verify").onclick = () => {
    idkit.open();
};

// 🔹 WALLET + GUARDADO
document.getElementById("wallet").onclick = async () => {

    if (!verificado) {
        document.getElementById("status").innerText = "Primero verifica con World ID";
        idkit.open();
        return;
    }

    try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        const address = await signer.getAddress();

        document.getElementById("status").innerText = "Firmando...";

        const mensaje = "Login CharlyCoin " + Date.now();
        const firma = await signer.signMessage(mensaje);

        document.getElementById("status").innerText = "Validando servidor...";

        // 🔥 ENVÍO COMPLETO AL BACKEND
        const res = await fetch(`${API}/guardar_usuario`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                wallet: address,
                firma: firma,
                mensaje: mensaje,
                nullifier: proofGlobal.nullifier_hash
            })
        });

        const data = await res.json();

        if (data.success) {
            document.getElementById("status").innerText = "🎉 Acceso concedido";
            
            setTimeout(() => {
                window.location.href = "buscador2.html";
            }, 1500);

        } else {
            document.getElementById("status").innerText = "❌ " + (data.msg || "Error");
        }

    } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "❌ Error wallet";
    }
};

});
</script>

</body>
</html>
