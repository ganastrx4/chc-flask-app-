<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Scanner Binance - SOLO FUTUROS GLOBAL</title>
  <style>
    body { background:#0d0d0d; color:#eee; font-family:Arial, sans-serif; margin:0; padding: 20px; }
    .dashboard { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .stats-panel, .analysis-panel { 
      background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; min-width: 300px; 
    }
    .analysis-panel { border-color: #f39c12; }
    .stat-box { font-size: 0.9em; color: #888; text-align: center; }
    .stat-box span { display: block; font-weight: bold; font-size: 1.4em; color: #f39c12; }
    
    table { width:100%; border-collapse: collapse; font-size: 0.8em; background: #151515; }
    th { background:#252525; color: #f39c12; padding: 10px; position: sticky; top: 0; z-index: 10; }
    td { border-bottom: 1px solid #222; padding: 8px; text-align: center; }
    .up { color: #2ecc71; font-weight: bold; }
    .down { color: #e74c3c; font-weight: bold; }
    .price-val { font-family: monospace; color: #aaa; }
    
    #loading-status { color: #f1c40f; margin-bottom: 10px; font-weight: bold; }
    .badge-fut { background: #f39c12; color: #000; padding: 2px 5px; border-radius: 3px; font-weight: bold; font-size: 0.8em; }
  </style>
</head>
<body>

  <h2>Scanner Global: <span style="color: #f39c12;">Solo Futuros USDT</span></h2>
  <div id="loading-status">Buscando pares de futuros disponibles...</div>

  <div class="dashboard">
    <div class="stats-panel">
      <div class="stat-box">Señales Futuros <span id="total-signals">0</span></div>
      <div class="stat-box">Pnl Promedio <span id="avg-perf">0.00%</span></div>
    </div>
    <div class="analysis-panel">
      <div class="stat-box">Sentimiento Mercado <span id="market-sent">ESPERANDO</span></div>
      <div class="stat-box">Estrategia Short/Long <span id="market-action" style="color:white">--</span></div>
    </div>
  </div>

  <table id="resultsTable">
    <thead>
      <tr>
        <th>Hora</th>
        <th>Tipo</th>
        <th>Par</th>
        <th>TF</th>
        <th>Entrada</th>
        <th>Actual</th>
        <th>Mínimo (Para Short)</th>
        <th>Máximo (Para Long)</th>
        <th>Estado Actual %</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

<script>
// --- CONFIGURACIÓN TOTAL ---
const timeframes = ["1m", "5m", "15m", "30m", "1h", "2h", "4h", "6h", "8h", "12h", "1d"];
const futWsBaseUrl = "wss://fstream.binance.com/ws/";
let activeSignals = {};
let allFutPairs = [];

// --- OBTENER PARES DE FUTUROS ---
async function getAllFutPairs() {
    try {
        const futRes = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');
        const futData = await futRes.json();
        allFutPairs = futData.symbols
            .filter(s => s.symbol.endsWith('USDT') && s.status === 'TRADING')
            .map(s => s.symbol);

        document.getElementById('loading-status').textContent = `Escaneando ${allFutPairs.length} pares en ${timeframes.length} temporalidades (FUTUROS)...`;
    } catch (e) {
        console.error("Error cargando pares de futuros:", e);
    }
}

// --- INDICADORES ---
function EMA(values, period) {
    if (values.length < period) return [];
    let k = 2 / (period + 1);
    let emaArray = [values[0]];
    for (let i = 1; i < values.length; i++) {
        emaArray.push(values[i] * k + emaArray[i - 1] * (1 - k));
    }
    return emaArray;
}

function getMACD(closes) {
    const ema12 = EMA(closes, 12);
    const ema26 = EMA(closes, 26);
    if (ema26.length < 26) return { lastHist: 0, prevHist: 0 };
    const macdLine = ema12.map((v, i) => v - ema26[i]);
    const signalLine = EMA(macdLine.slice(26), 9);
    const lastHist = macdLine.at(-1) - (signalLine.at(-1) || 0);
    const prevHist = macdLine.at(-2) - (signalLine.at(-2) || 0);
    return { lastHist, prevHist };
}

// --- TRACKING EN VIVO ---
function startTracking(symbol, entryPrice, tf) {
    const id = `${symbol}-FUT-${tf}`;
    if (activeSignals[id]) return;

    activeSignals[id] = { entryPrice, currentPrice: entryPrice, minPrice: entryPrice, maxPrice: entryPrice, currentPct: 0 };

    const tbody = document.getElementById('table-body');
    const row = tbody.insertRow(0);
    row.id = `row-${id}`;
    row.innerHTML = `
        <td>${new Date().toLocaleTimeString()}</td>
        <td><span class="badge-fut">FUT</span></td>
        <td><strong>${symbol}</strong></td>
        <td>${tf}</td>
        <td class="price-val">${entryPrice}</td>
        <td id="price-${id}">${entryPrice}</td>
        <td class="down"><span id="minP-${id}">${entryPrice}</span><br><small id="minPct-${id}">0%</small></td>
        <td class="up"><span id="maxP-${id}">${entryPrice}</span><br><small id="maxPct-${id}">0%</small></td>
        <td id="curPct-${id}" style="font-size:1.1em">0%</td>
    `;

    const ws = new WebSocket(`${futWsBaseUrl}${symbol.toLowerCase()}@ticker`);

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const price = parseFloat(data.c);
        const s = activeSignals[id];
        s.currentPrice = price;
        if (price < s.minPrice) s.minPrice = price;
        if (price > s.maxPrice) s.maxPrice = price;
        s.currentPct = ((price - s.entryPrice) / s.entryPrice) * 100;

        document.getElementById(`price-${id}`).textContent = price.toFixed(4);
        document.getElementById(`curPct-${id}`).textContent = s.currentPct.toFixed(2) + "%";
        document.getElementById(`curPct-${id}`).className = s.currentPct >= 0 ? 'up' : 'down';
        
        document.getElementById(`minP-${id}`).textContent = s.minPrice.toFixed(4);
        document.getElementById(`minPct-${id}`).textContent = ((s.minPrice-s.entryPrice)/s.entryPrice*100).toFixed(2) + "%";
        
        document.getElementById(`maxP-${id}`).textContent = s.maxPrice.toFixed(4);
        document.getElementById(`maxPct-${id}`).textContent = ((s.maxPrice-s.entryPrice)/s.entryPrice*100).toFixed(2) + "%";
        updateStats();
    };
}

function updateStats() {
    const keys = Object.keys(activeSignals);
    if (keys.length === 0) return;
    let total = 0;
    keys.forEach(k => total += activeSignals[k].currentPct);
    const avg = total / keys.length;
    
    document.getElementById('total-signals').textContent = keys.length;
    document.getElementById('avg-perf').textContent = avg.toFixed(2) + "%";
    
    const sent = document.getElementById('market-sent');
    const act = document.getElementById('market-action');
    
    if(avg < -0.10) {
        sent.textContent = "CORRECCIÓN EN CURSO"; sent.style.color = "#e74c3c";
        act.textContent = "BUSCAR ENTRADAS SHORT";
    } else if(avg > 0.10) {
        sent.textContent = "IMPULSO ALCISTA"; sent.style.color = "#2ecc71";
        act.textContent = "MANTENER O LONG";
    } else {
        sent.textContent = "RANGO LATERAL"; sent.style.color = "#f1c40f";
        act.textContent = "ESPERAR CONFIRMACIÓN";
    }
}

// --- ESCÁNER DE MERCADO ---
async function scanFuturos() {
    for (const sym of allFutPairs) {
        for (const tf of timeframes) {
            try {
                const res = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${sym}&interval=${tf}&limit=50`);
                const data = await res.json();
                if (!data || data.length < 35) continue;
                
                const closes = data.map(d => parseFloat(d[4]));
                const { lastHist, prevHist } = getMACD(closes);

                // Lógica MACD: Cruce alcista (Golden Cross en histograma)
                if (prevHist < 0 && lastHist > 0) {
                    startTracking(sym, closes.at(-1), tf);
                }
            } catch (e) {}
            // Pausa mínima para evitar baneo de IP
            await new Promise(r => setTimeout(r, 40));
        }
    }
}

async function startApp() {
    await getAllFutPairs();
    scanFuturos();
}

startApp();
// Re-escanea cada 5 minutos para buscar nuevas señales de cruce
setInterval(scanFuturos, 300000);
</script>
</body>
</html>
